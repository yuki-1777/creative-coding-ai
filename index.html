<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Coding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper:    #f3f0e8;
      --graphite: #1c1a16;
      --mid:      #7a7468;
      --dim:      #b2ada5;
      --rule:     #ddd9d0;
      --hover-bg: #edeae1;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--graphite);
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 22px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--rule);
      background: var(--paper);
      z-index: 200;
    }

    .header-left {
      display: flex;
      align-items: baseline;
      gap: 20px;
    }

    .site-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.05rem;
      letter-spacing: 0.06em;
      color: var(--graphite);
    }

    .site-count {
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      color: var(--dim);
    }

    /* ─── FILTER ─── */
    .filter-bar {
      display: flex;
      gap: 28px;
      align-items: center;
    }

    .tag-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      border: none;
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }

    .tag-btn.active,
    .tag-btn:hover {
      color: var(--graphite);
    }

    /* ─── MAIN ─── */
    main {
      padding-top: 65px;
    }

    /* ─── LIST ─── */
    .work-list {
      list-style: none;
    }

    .work-item {
      position: relative;
      border-bottom: 1px solid var(--rule);
      transition: background 0.2s ease;
    }

    .work-item[data-hidden] {
      display: none;
    }

    /* Pencil stroke on hover — left edge */
    .work-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0;
      width: 2px;
      height: 100%;
      background: var(--graphite);
      transform: scaleY(0);
      transform-origin: top;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 1;
    }

    .work-item:hover::before {
      transform: scaleY(1);
    }

    .work-item:hover {
      background: var(--hover-bg);
    }

    .work-link {
      display: flex;
      align-items: baseline;
      gap: 0;
      padding: 26px 48px;
      text-decoration: none;
      color: inherit;
    }

    .work-num {
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      color: var(--dim);
      width: 44px;
      flex-shrink: 0;
      padding-top: 0.3em; /* optical align to title baseline */
    }

    .work-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.65rem;
      letter-spacing: 0.01em;
      color: var(--graphite);
      flex: 1;
      transition: letter-spacing 0.4s ease;
    }

    .work-item:hover .work-title {
      letter-spacing: 0.04em;
    }

    .work-meta {
      display: flex;
      align-items: center;
      gap: 32px;
      margin-left: auto;
      padding-left: 32px;
      flex-shrink: 0;
    }

    .work-tech {
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      color: var(--mid);
    }

    .work-date {
      font-size: 0.55rem;
      letter-spacing: 0.08em;
      color: var(--dim);
      min-width: 90px;
      text-align: right;
    }

    /* ─── HOVER CARD ─── */
    .hover-card {
      position: fixed;
      width: 260px;
      pointer-events: none;
      z-index: 500;
      opacity: 0;
      transition: opacity 0.2s ease;
      border: 1px solid var(--rule);
      background: var(--paper);
    }

    .hover-card.visible {
      opacity: 1;
    }

    .hover-card-thumb {
      width: 100%;
      height: 154px;
      object-fit: cover;
      display: block;
      border-bottom: 1px solid var(--rule);
    }

    .hover-card-num {
      width: 100%;
      height: 154px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--rule);
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 5rem;
      color: var(--rule);
      letter-spacing: -0.02em;
      font-style: italic;
    }

    .hover-card-desc {
      padding: 14px 16px;
      font-size: 0.55rem;
      line-height: 1.75;
      color: var(--mid);
      letter-spacing: 0.04em;
    }

    /* ─── EMPTY STATE ─── */
    .empty {
      display: none;
      padding: 80px 48px;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: var(--dim);
    }

    /* ─── FOOTER ─── */
    footer {
      padding: 22px 48px;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer span {
      font-size: 0.52rem;
      letter-spacing: 0.14em;
      color: var(--dim);
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      header { padding: 18px 24px; }
      .filter-bar { gap: 18px; }
      .work-link { padding: 20px 24px; }
      .work-num { width: 32px; }
      .work-title { font-size: 1.3rem; }
      .work-date { display: none; }
      footer { padding: 18px 24px; }
      .hover-card { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="site-name">Creative Coding</div>
    <div class="site-count"><span id="work-count">0</span> works</div>
  </div>
  <nav class="filter-bar">
    <button class="tag-btn active" data-filter="all">all</button>
    <button class="tag-btn" data-filter="p5.js">p5.js</button>
    <button class="tag-btn" data-filter="three.js">three.js</button>
    <button class="tag-btn" data-filter="glsl">glsl</button>
    <button class="tag-btn" data-filter="canvas">canvas</button>
  </nav>
</header>

<!-- Floating hover card -->
<div class="hover-card" id="hover-card">
  <div class="hover-card-num" id="hover-card-num"></div>
  <img class="hover-card-thumb" id="hover-card-thumb" src="" alt="" style="display:none">
  <div class="hover-card-desc" id="hover-card-desc"></div>
</div>

<main>
  <ul class="work-list" id="gallery">
    <li class="empty" id="empty-state">no works found</li>
  </ul>
</main>

<footer>
  <span>generative art / creative coding</span>
  <span>ai doodle sketchbook</span>
</footer>

<script>
  const card     = document.getElementById('hover-card');
  const cardNum  = document.getElementById('hover-card-num');
  const cardThumb = document.getElementById('hover-card-thumb');
  const cardDesc = document.getElementById('hover-card-desc');

  // Card follows cursor
  document.addEventListener('mousemove', e => {
    let x = e.clientX + 28;
    let y = e.clientY - 80;
    if (x + 260 > window.innerWidth)  x = e.clientX - 288;
    if (y < 8)                         y = 8;
    if (y + 300 > window.innerHeight)  y = window.innerHeight - 310;
    card.style.left = x + 'px';
    card.style.top  = y + 'px';
  });

  function showCard(work) {
    const thumb = localStorage.getItem(`thumb_${work.num}`);
    cardNum.textContent = work.num;

    if (thumb) {
      cardThumb.src = thumb;
      cardThumb.style.display = 'block';
      cardNum.style.display   = 'none';
    } else {
      cardThumb.style.display = 'none';
      cardNum.style.display   = 'flex';
    }

    cardDesc.textContent = work.description || '';
    card.classList.add('visible');
  }

  function hideCard() {
    card.classList.remove('visible');
  }

  function formatDate(d) {
    return d.replace(/-/g, '.');
  }

  function renderWorks(works) {
    const gallery    = document.getElementById('gallery');
    const emptyState = document.getElementById('empty-state');

    works.forEach(w => {
      const li = document.createElement('li');
      li.className = 'work-item';
      li.dataset.tech = w.tech;

      li.innerHTML = `
        <a class="work-link" href="${w.path}" aria-label="${w.title} — ${w.tech}">
          <span class="work-num">${w.num}</span>
          <span class="work-title">${w.title}</span>
          <span class="work-meta">
            <span class="work-tech">${w.tech}</span>
            <span class="work-date">${formatDate(w.date)}</span>
          </span>
        </a>
      `;

      li.addEventListener('mouseenter', () => showCard(w));
      li.addEventListener('mouseleave', hideCard);

      gallery.insertBefore(li, emptyState);
    });

    document.getElementById('work-count').textContent = works.length;
  }

  fetch('works.json')
    .then(r => r.json())
    .then(works => {
      renderWorks(works);

      const items = () => document.querySelectorAll('.work-item[data-tech]');

      document.querySelectorAll('.tag-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');

          const filter = btn.dataset.filter;
          let visible = 0;
          items().forEach(item => {
            const match = filter === 'all' || item.dataset.tech === filter;
            item.toggleAttribute('data-hidden', !match);
            if (match) visible++;
          });

          document.getElementById('empty-state').style.display =
            visible === 0 ? 'block' : 'none';
        });
      });
    });
</script>

</body>
</html>
