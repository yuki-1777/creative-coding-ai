<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Coding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --text: #e8e8e8;
      --text-dim: #404040;
      --text-ghost: #222222;
      --border: #141414;
      --cell-h: 65vh;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 200;
      min-height: 100vh;
      cursor: crosshair;
    }

    a, button { cursor: crosshair; }

    /* ─── HEADER ─── */
    header {
      position: fixed;
      top: 0;
      left: 0;
      padding: 28px 32px;
      z-index: 100;
      pointer-events: none;
    }

    .site-name {
      font-size: 0.55rem;
      font-weight: 300;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .site-count {
      margin-top: 5px;
      font-size: 0.42rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-ghost);
    }

    /* ─── FILTER ─── */
    .filter-bar {
      position: fixed;
      top: 28px;
      right: 32px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .tag-btn {
      font-family: 'Inter', sans-serif;
      font-weight: 200;
      font-size: 0.42rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border: none;
      background: transparent;
      color: var(--text-ghost);
      cursor: crosshair;
      padding: 0;
      position: relative;
      transition: color 0.3s ease;
    }

    .tag-btn.active {
      color: var(--text-dim);
    }

    .tag-btn.active::before {
      content: '·';
      position: absolute;
      left: -8px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
    }

    .tag-btn:hover {
      color: var(--text-dim);
    }

    /* ─── GALLERY ─── */
    .work-list {
      list-style: none;
    }

    .work-item[data-hidden] {
      display: none;
    }

    .work-item {
      position: relative;
      width: 100%;
      height: var(--cell-h);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      background: #0f0f0f;
    }

    /* Noise layer for cells without thumbnail */
    .work-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 60%, rgba(255,255,255,0.025) 0%, transparent 70%),
        radial-gradient(ellipse at 80% 30%, rgba(255,255,255,0.015) 0%, transparent 60%);
      z-index: 1;
      transition: opacity 0.6s ease;
    }

    /* Dark veil over thumbnail images */
    .work-item.has-thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 1;
      transition: background 0.5s ease;
    }

    .work-item.has-thumb:hover::after {
      background: rgba(0, 0, 0, 0.25);
    }

    /* Page load stagger */
    .work-item {
      opacity: 0;
      transform: translateY(20px);
      animation: revealCell 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes revealCell {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Full-cell link */
    .work-link {
      position: absolute;
      inset: 0;
      z-index: 3;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    /* ─── TEXT OVERLAY ─── */
    .work-info {
      position: absolute;
      bottom: 40px;
      left: 40px;
      z-index: 4;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
    }

    .work-item:hover .work-info {
      opacity: 1;
      transform: translateY(0);
    }

    .work-num {
      font-size: 0.42rem;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .work-title {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 200;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 14px;
    }

    .work-meta {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .work-tech {
      font-size: 0.42rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 300;
    }

    .work-date {
      font-size: 0.42rem;
      letter-spacing: 0.1em;
      color: var(--text-ghost);
    }

    /* Arrow hint, top-right of cell */
    .work-arrow {
      position: absolute;
      top: 36px;
      right: 36px;
      z-index: 4;
      opacity: 0;
      transform: translate(-4px, 4px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
    }

    .work-item:hover .work-arrow {
      opacity: 1;
      transform: translate(0, 0);
    }

    .work-arrow svg {
      width: 16px;
      height: 16px;
      stroke: var(--text-dim);
    }

    /* ─── EMPTY STATE ─── */
    .empty {
      height: 40vh;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 0.45rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-ghost);
    }

    /* ─── FOOTER ─── */
    footer {
      padding: 20px 32px;
      border-top: 1px solid var(--border);
    }

    footer span {
      font-size: 0.4rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-ghost);
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {
      :root { --cell-h: 55vh; }
      .filter-bar { top: 22px; right: 20px; gap: 14px; }
      header { padding: 22px 20px; }
      .work-info { left: 20px; bottom: 24px; }
      footer { padding: 16px 20px; }
    }
  </style>
</head>
<body>

<header>
  <div class="site-name">Creative Coding</div>
  <div class="site-count"><span id="work-count">0</span> works</div>
</header>

<div class="filter-bar">
  <button class="tag-btn active" data-filter="all">all</button>
  <button class="tag-btn" data-filter="p5.js">p5.js</button>
  <button class="tag-btn" data-filter="three.js">three.js</button>
  <button class="tag-btn" data-filter="glsl">glsl</button>
  <button class="tag-btn" data-filter="canvas">canvas</button>
</div>

<ul class="work-list" id="gallery">

  <!-- ▼ 作品を追加するときはここに li を足す ▼ -->

  <li class="work-item" data-tech="p5.js" data-date="2026-03-14" style="animation-delay: 0.1s">
    <div class="work-info">
      <div class="work-num">01</div>
      <div class="work-title">Playground</div>
      <div class="work-meta">
        <span class="work-tech">p5.js</span>
        <span class="work-date">2026–03–14</span>
      </div>
    </div>
    <div class="work-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="19" x2="19" y2="5"/>
        <polyline points="9 5 19 5 19 15"/>
      </svg>
    </div>
    <a class="work-link" href="sketches/01_playground/" aria-label="Playground (p5.js)"></a>
  </li>

  <!-- ▲ ここまで ▲ -->

  <li class="empty" id="empty-state">no works found</li>
</ul>

<footer>
  <span>generative art / creative coding</span>
</footer>

<script>
  // サムネイルを背景として適用
  document.querySelectorAll('.work-item[data-tech]').forEach(item => {
    const num = item.querySelector('.work-num').textContent.trim();
    const saved = localStorage.getItem(`thumb_${num}`);
    if (saved) {
      item.style.backgroundImage = `url(${saved})`;
      item.style.backgroundSize = 'cover';
      item.style.backgroundPosition = 'center';
      item.classList.add('has-thumb');
    }
  });

  // 作品数カウント
  const items = document.querySelectorAll('.work-item[data-tech]');
  document.getElementById('work-count').textContent = items.length;

  // フィルター
  document.querySelectorAll('.tag-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const filter = btn.dataset.filter;
      let visible = 0;

      items.forEach(item => {
        const match = filter === 'all' || item.dataset.tech === filter;
        item.toggleAttribute('data-hidden', !match);
        if (match) visible++;
      });

      const emptyState = document.getElementById('empty-state');
      emptyState.style.display = visible === 0 ? 'flex' : 'none';
    });
  });
</script>

</body>
</html>
