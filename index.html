<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Coding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300&family=Inter:wght@200;300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f7f5;
      --text: #1a1a1a;
      --text-dim: #aaa;
      --text-muted: #ccc;
      --border: rgba(0,0,0,0.08);
      --col-w: 680px;
      --preview-size: 340px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 200;
      min-height: 100vh;
    }

    /* ─── LAYOUT ─── */
    .col {
      max-width: var(--col-w);
      margin: 0 auto;
      padding: 0 40px;
    }

    /* ─── HEADER ─── */
    header {
      padding: 88px 0 40px;
      border-bottom: 1px solid var(--border);
    }

    .site-name {
      font-family: 'Cormorant', serif;
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text);
    }

    .site-sub {
      margin-top: 6px;
      font-size: 0.58rem;
      color: var(--text-dim);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 200;
    }

    /* ─── FILTER ─── */
    .filter-bar {
      padding: 18px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .filter-label {
      font-size: 0.55rem;
      color: var(--text-muted);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      font-weight: 300;
    }

    .tag-btn {
      font-family: 'Inter', sans-serif;
      font-weight: 200;
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      padding: 0;
      border: none;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      text-transform: lowercase;
      transition: color 0.2s;
      position: relative;
    }

    .tag-btn::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--text);
      transition: width 0.25s ease;
    }

    .tag-btn:hover { color: var(--text); }

    .tag-btn.active {
      color: var(--text);
    }

    .tag-btn.active::after {
      width: 100%;
    }

    /* ─── WORK LIST ─── */
    .work-list {
      list-style: none;
    }

    .work-item[data-hidden] {
      display: none;
    }

    .work-link {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      align-items: baseline;
      gap: 0 28px;
      padding: 26px 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: opacity 0.2s;
    }

    .work-item:hover .work-link {
      opacity: 0.55;
    }

    .work-num {
      font-size: 0.55rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      font-weight: 200;
      padding-top: 3px;
    }

    .work-title {
      font-family: 'Cormorant', serif;
      font-weight: 300;
      font-size: 1.25rem;
      letter-spacing: 0.02em;
      color: var(--text);
      line-height: 1;
    }

    .work-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }

    .work-tech {
      font-size: 0.55rem;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 300;
    }

    .work-date {
      font-size: 0.55rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      font-weight: 200;
    }

    /* ─── PREVIEW PANEL ─── */
    #preview-panel {
      position: fixed;
      right: calc(50% - var(--col-w)/2 - var(--preview-size) - 48px);
      top: 50%;
      transform: translateY(-50%);
      width: var(--preview-size);
      aspect-ratio: 1;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.8s ease;
      z-index: 50;
    }

    #preview-panel.visible {
      opacity: 1;
    }

    #preview-content {
      width: 100%;
      height: 100%;
    }

    #preview-content img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .preview-placeholder {
      width: 100%;
      height: 100%;
      background: #eeece9;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview-placeholder svg {
      width: 28px;
      height: 28px;
      opacity: 0.2;
      color: #999;
    }

    /* ─── EMPTY ─── */
    .empty {
      padding: 72px 0;
      font-size: 0.58rem;
      color: var(--text-muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      display: none;
    }

    /* ─── FOOTER ─── */
    footer {
      padding: 36px 0 72px;
      display: flex;
      justify-content: space-between;
    }

    footer span {
      font-size: 0.55rem;
      color: var(--text-muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 200;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 1100px) {
      #preview-panel {
        right: 24px;
        --preview-size: 260px;
      }
    }

    @media (max-width: 720px) {
      #preview-panel { display: none; }
      .col { padding: 0 24px; }
      header { padding: 56px 0 28px; }
    }
  </style>
</head>
<body>

<!-- ホバープレビュー（固定） -->
<div id="preview-panel">
  <div id="preview-content">
    <div class="preview-placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.75">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </div>
  </div>
</div>

<div class="col">

  <header>
    <div class="site-name">Creative Coding</div>
    <div class="site-sub"><span id="work-count">0</span> works</div>
  </header>

  <div class="filter-bar">
    <span class="filter-label">filter</span>
    <button class="tag-btn active" data-filter="all">all</button>
    <button class="tag-btn" data-filter="p5.js">p5.js</button>
    <button class="tag-btn" data-filter="three.js">three.js</button>
    <button class="tag-btn" data-filter="glsl">glsl</button>
    <button class="tag-btn" data-filter="canvas">canvas</button>
  </div>

  <ul class="work-list" id="gallery">

    <!-- ▼ 作品を追加するときはここに li を足す ▼ -->

    <li class="work-item" data-tech="p5.js" data-date="2026-03-14">
      <a class="work-link" href="sketches/01_playground/">
        <span class="work-num">01</span>
        <span class="work-title">Playground</span>
        <div class="work-right">
          <span class="work-tech">p5.js</span>
          <span class="work-date">2026–03–14</span>
        </div>
      </a>
    </li>

    <!-- ▲ ここまで ▲ -->

    <li class="empty" id="empty-state">no works found</li>
  </ul>

  <footer>
    <span>generative art / creative coding</span>
    <span id="footer-count"></span>
  </footer>

</div>

<script>
  const panel   = document.getElementById('preview-panel');
  const content = document.getElementById('preview-content');

  // サムネイルをデータとして保持
  const thumbs = {};
  document.querySelectorAll('.work-item[data-tech]').forEach(item => {
    const num = item.querySelector('.work-num').textContent.trim();
    const saved = localStorage.getItem(`thumb_${num}`);
    thumbs[num] = saved || null;
  });

  // プレビューパネル制御
  let hideTimer = null;

  document.querySelectorAll('.work-item[data-tech]').forEach(item => {
    item.addEventListener('mouseenter', () => {
      clearTimeout(hideTimer);

      const num = item.querySelector('.work-num').textContent.trim();
      const src = thumbs[num];

      if (src) {
        content.innerHTML = `<img src="${src}" alt="">`;
      } else {
        content.innerHTML = `<div class="preview-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.75">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>`;
      }

      // フェードイン（1.8s）
      panel.style.transition = 'opacity 1.8s ease';
      panel.classList.add('visible');
    });

    item.addEventListener('mouseleave', () => {
      // フェードアウト（早め）
      panel.style.transition = 'opacity 0.4s ease';
      panel.classList.remove('visible');
    });
  });

  // 作品数カウント
  const items = document.querySelectorAll('.work-item[data-tech]');
  document.getElementById('work-count').textContent = items.length;
  document.getElementById('footer-count').textContent =
    `${items.length} work${items.length !== 1 ? 's' : ''}`;

  // フィルター
  document.querySelectorAll('.tag-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const filter = btn.dataset.filter;
      let visible = 0;

      items.forEach(item => {
        const match = filter === 'all' || item.dataset.tech === filter;
        item.toggleAttribute('data-hidden', !match);
        if (match) visible++;
      });

      document.getElementById('empty-state').style.display =
        visible === 0 ? 'block' : 'none';
    });
  });
</script>

</body>
</html>
