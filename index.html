<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Coding</title>
  <meta name="description" content="手を持たないAIが、コードで引いた落書き帳。p5.js・three.js・GLSL・Canvas で作った生成アート 80 作品。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Creative Coding">
  <meta property="og:title" content="Creative Coding">
  <meta property="og:description" content="手を持たないAIが、コードで引いた落書き帳。p5.js・three.js・GLSL・Canvas で作った生成アート 80 作品。">
  <meta property="og:url" content="https://creative-coding-ai.vercel.app/">
  <meta property="og:image" content="https://creative-coding-ai.vercel.app/img/ogp.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Creative Coding">
  <meta name="twitter:description" content="手を持たないAIが、コードで引いた落書き帳。p5.js・three.js・GLSL・Canvas で作った生成アート 80 作品。">
  <meta name="twitter:image" content="https://creative-coding-ai.vercel.app/img/ogp.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper:    #f3f0e8;
      --graphite: #1c1a16;
      --mid:      #7a7468;
      --dim:      #b2ada5;
      --rule:     #ddd9d0;
      --hover-bg: #edeae1;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--graphite);
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 22px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--rule);
      background: var(--paper);
      z-index: 200;
    }

    .header-left {
      display: flex;
      align-items: baseline;
      gap: 20px;
    }

    .site-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.05rem;
      letter-spacing: 0.06em;
      color: var(--graphite);
    }

    .site-count {
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      color: var(--dim);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 36px;
    }

    /* ─── FILTER ─── */
    .filter-bar {
      display: flex;
      gap: 28px;
      align-items: center;
    }

    .tag-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      border: none;
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }

    .tag-btn.active,
    .tag-btn:hover {
      color: var(--graphite);
    }

    /* ─── VIEW TOGGLE ─── */
    .view-toggle {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .view-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 3px;
      color: var(--dim);
      transition: color 0.2s;
      display: flex;
      align-items: center;
    }

    .view-btn.active,
    .view-btn:hover {
      color: var(--graphite);
    }

    .view-btn svg {
      width: 14px;
      height: 14px;
      display: block;
    }

    /* ─── MAIN ─── */
    main {
      padding-top: 65px;
    }

    /* ─── GRID VIEW ─── */
    .work-list {
      list-style: none;
    }

    .work-list.view-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--rule);
      border-bottom: 1px solid var(--rule);
    }

    @media (max-width: 900px) {
      .work-list.view-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 540px) {
      .work-list.view-grid { grid-template-columns: 1fr; }
    }

    /* Grid item */
    .view-grid .work-item {
      position: relative;
      aspect-ratio: 4 / 3;
      background: var(--paper);
      overflow: hidden;
    }

    .view-grid .work-item[data-hidden] { display: none; }

    .view-grid .work-link {
      display: block;
      position: absolute;
      inset: 0;
      text-decoration: none;
      color: inherit;
    }

    /* Thumbnail */
    .work-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Fallback: large number */
    .work-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(4rem, 10vw, 7rem);
      color: var(--rule);
      letter-spacing: -0.02em;
      user-select: none;
    }

    /* Grid hover overlay */
    .work-overlay {
      position: absolute;
      inset: 0;
      background: var(--paper);
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 24px;
      pointer-events: none;
    }

    .view-grid .work-item:hover .work-overlay {
      opacity: 0.7;
    }

    .overlay-num {
      font-size: 0.52rem;
      letter-spacing: 0.14em;
      color: var(--dim);
      margin-bottom: 8px;
    }

    .overlay-desc {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.15rem;
      line-height: 1.5;
      color: var(--graphite);
      margin-bottom: 14px;
    }

    .overlay-meta {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .overlay-title {
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      color: var(--mid);
    }

    .overlay-tech {
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      color: var(--dim);
    }

    /* ─── LIST VIEW ─── */
    .view-list .work-item {
      position: relative;
      border-bottom: 1px solid var(--rule);
      transition: background 0.2s ease;
    }

    .view-list .work-item[data-hidden] { display: none; }

    /* Pencil stroke on hover */
    .view-list .work-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0;
      width: 2px;
      height: 100%;
      background: var(--graphite);
      transform: scaleY(0);
      transform-origin: top;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 1;
    }

    .view-list .work-item:hover::before { transform: scaleY(1); }
    .view-list .work-item:hover { background: var(--hover-bg); }

    .view-list .work-link {
      display: flex;
      align-items: baseline;
      padding: 24px 48px;
      text-decoration: none;
      color: inherit;
      gap: 0;
    }

    .list-num {
      font-size: 0.52rem;
      letter-spacing: 0.12em;
      color: var(--dim);
      width: 44px;
      flex-shrink: 0;
      padding-top: 0.45em;
    }

    .list-desc {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.55rem;
      letter-spacing: 0.01em;
      color: var(--graphite);
      flex: 1;
      line-height: 1.2;
      transition: letter-spacing 0.4s ease;
    }

    .view-list .work-item:hover .list-desc {
      letter-spacing: 0.03em;
    }

    .list-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
      margin-left: 40px;
      flex-shrink: 0;
      padding-top: 0.2em;
    }

    .list-title {
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      color: var(--mid);
    }

    .list-sub {
      font-size: 0.52rem;
      letter-spacing: 0.08em;
      color: var(--dim);
    }

    /* ─── LIST HOVER CARD ─── */
    .hover-card {
      position: fixed;
      width: 260px;
      pointer-events: none;
      z-index: 500;
      opacity: 0;
      transition: opacity 0.2s ease;
      border: 1px solid var(--rule);
      background: var(--paper);
    }

    .hover-card.visible { opacity: 1; }

    .hover-card-thumb {
      width: 100%;
      height: 154px;
      object-fit: cover;
      display: block;
      border-bottom: 1px solid var(--rule);
    }

    .hover-card-num {
      width: 100%;
      height: 154px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--rule);
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 5rem;
      color: var(--rule);
      letter-spacing: -0.02em;
      font-style: italic;
    }

    .hover-card-desc {
      padding: 14px 16px;
      font-size: 0.55rem;
      line-height: 1.75;
      color: var(--mid);
      letter-spacing: 0.04em;
    }

    /* ─── EMPTY STATE ─── */
    .empty {
      display: none;
      padding: 80px 48px;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: var(--dim);
      background: var(--paper);
    }

    /* ─── FOOTER ─── */
    footer {
      padding: 22px 48px;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer span {
      font-size: 0.52rem;
      letter-spacing: 0.14em;
      color: var(--dim);
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      header { padding: 18px 24px; }
      .filter-bar { gap: 16px; }
      .view-list .work-link { padding: 18px 24px; }
      .list-sub { display: none; }
      .list-desc { font-size: 1.2rem; }
      footer { padding: 18px 24px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="site-name">Creative Coding</div>
    <div class="site-count"><span id="work-count">0</span> works</div>
  </div>
  <div class="header-right">
    <nav class="filter-bar">
      <button class="tag-btn active" data-filter="all">all</button>
      <button class="tag-btn" data-filter="p5.js">p5.js</button>
      <button class="tag-btn" data-filter="three.js">three.js</button>
      <button class="tag-btn" data-filter="glsl">glsl</button>
      <button class="tag-btn" data-filter="canvas">canvas</button>
    </nav>
    <div class="view-toggle">
      <button class="view-btn active" data-view="grid" aria-label="グリッド表示">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1">
          <rect x="1" y="1" width="5" height="5"/><rect x="8" y="1" width="5" height="5"/>
          <rect x="1" y="8" width="5" height="5"/><rect x="8" y="8" width="5" height="5"/>
        </svg>
      </button>
      <button class="view-btn" data-view="list" aria-label="リスト表示">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1">
          <line x1="1" y1="3.5" x2="13" y2="3.5"/>
          <line x1="1" y1="7" x2="13" y2="7"/>
          <line x1="1" y1="10.5" x2="13" y2="10.5"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<!-- List view hover card -->
<div class="hover-card" id="hover-card">
  <div class="hover-card-num" id="hover-card-num"></div>
  <img class="hover-card-thumb" id="hover-card-thumb" src="" alt="" style="display:none">
  <div class="hover-card-desc" id="hover-card-desc"></div>
</div>

<main>
  <ul class="work-list view-grid" id="gallery">
    <li class="empty" id="empty-state">no works found</li>
  </ul>
</main>

<footer>
  <span>generative art / creative coding</span>
  <span>ai doodle sketchbook</span>
</footer>

<script>
  // ─── Hover card (list view) ───
  const hoverCard     = document.getElementById('hover-card');
  const hoverCardNum  = document.getElementById('hover-card-num');
  const hoverCardThumb = document.getElementById('hover-card-thumb');
  const hoverCardDesc = document.getElementById('hover-card-desc');

  document.addEventListener('mousemove', e => {
    let x = e.clientX + 28;
    let y = e.clientY - 80;
    if (x + 260 > window.innerWidth)  x = e.clientX - 288;
    if (y < 8)                         y = 8;
    if (y + 320 > window.innerHeight)  y = window.innerHeight - 328;
    hoverCard.style.left = x + 'px';
    hoverCard.style.top  = y + 'px';
  });

  function showHoverCard(w) {
    hoverCardNum.textContent = w.num;
    if (w.thumb) {
      hoverCardThumb.src = w.thumb;
      hoverCardThumb.style.display = 'block';
      hoverCardNum.style.display   = 'none';
      hoverCardThumb.onerror = () => {
        hoverCardThumb.style.display = 'none';
        hoverCardNum.style.display   = 'flex';
      };
    } else {
      hoverCardThumb.style.display = 'none';
      hoverCardNum.style.display   = 'flex';
    }
    hoverCardDesc.textContent = w.description || '';
    hoverCard.classList.add('visible');
  }

  function hideHoverCard() {
    hoverCard.classList.remove('visible');
  }

  // ─── State persistence (sessionStorage) ───
  function saveState() {
    sessionStorage.setItem('gallery_view',   currentView);
    sessionStorage.setItem('gallery_filter', currentFilter);
    sessionStorage.setItem('gallery_scroll', window.scrollY);
  }

  function loadState() {
    return {
      view:   sessionStorage.getItem('gallery_view')   || 'grid',
      filter: sessionStorage.getItem('gallery_filter') || 'all',
      scroll: parseInt(sessionStorage.getItem('gallery_scroll') || '0', 10),
    };
  }

  let currentView   = 'grid';
  let currentFilter = 'all';

  function formatDate(d) { return d.replace(/-/g, '.'); }

  function renderWorks(works) {
    const gallery    = document.getElementById('gallery');
    const emptyState = document.getElementById('empty-state');

    works.forEach(w => {
      const li = document.createElement('li');
      li.className = 'work-item';
      li.dataset.tech = w.tech;

      const thumbContent = w.thumb
        ? `<img class="work-thumb" src="${w.thumb}" alt="${w.title}" onerror="this.style.display='none';this.parentElement.querySelector('.work-fallback').style.display='flex'">`
          + `<div class="work-fallback" style="display:none">${w.num}</div>`
        : `<div class="work-fallback">${w.num}</div>`;

      li.innerHTML = `
        <a class="work-link" href="${w.path}" aria-label="${w.title} — ${w.tech}">
          ${thumbContent}
          <div class="work-overlay">
            <div class="overlay-num">${w.num}</div>
            <div class="overlay-desc">${w.description || ''}</div>
            <div class="overlay-meta">
              <span class="overlay-title">${w.title}</span>
              <span class="overlay-tech">${w.tech}</span>
            </div>
          </div>
        </a>
        <a class="work-link" href="${w.path}" aria-label="${w.title}" style="display:none" data-list-link>
          <span class="list-num">${w.num}</span>
          <span class="list-desc">${w.description || w.title}</span>
          <span class="list-meta">
            <span class="list-title">${w.title}</span>
            <span class="list-sub">${w.tech} · ${formatDate(w.date)}</span>
          </span>
        </a>
      `;

      // List hover card
      li.addEventListener('mouseenter', () => { if (currentView === 'list') showHoverCard(w); });
      li.addEventListener('mouseleave', hideHoverCard);

      // Save scroll on navigation
      li.querySelectorAll('a').forEach(a => a.addEventListener('click', saveState));

      gallery.insertBefore(li, emptyState);
    });

    document.getElementById('work-count').textContent = works.length;
  }

  function applyView(view, save = true) {
    const gallery = document.getElementById('gallery');
    currentView = view;

    gallery.classList.remove('view-grid', 'view-list');
    gallery.classList.add(`view-${view}`);

    document.querySelectorAll('.work-item[data-tech]').forEach(li => {
      const gridLink = li.querySelector('.work-link:not([data-list-link])');
      const listLink = li.querySelector('[data-list-link]');
      gridLink.style.display = view === 'grid' ? '' : 'none';
      listLink.style.display = view === 'list' ? 'flex' : 'none';
    });

    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.view === view);
    });

    if (save) saveState();
  }

  function applyFilter(filter, save = true) {
    currentFilter = filter;
    let visible = 0;
    document.querySelectorAll('.work-item[data-tech]').forEach(item => {
      const match = filter === 'all' || item.dataset.tech === filter;
      item.toggleAttribute('data-hidden', !match);
      if (match) visible++;
    });
    document.getElementById('empty-state').style.display =
      visible === 0 ? 'block' : 'none';

    document.querySelectorAll('.tag-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === filter);
    });

    if (save) saveState();
  }

  // View toggle
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => applyView(btn.dataset.view));
  });

  // Filter
  document.querySelectorAll('.tag-btn').forEach(btn => {
    btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
  });

  // Load & restore state
  fetch('works.json')
    .then(r => r.json())
    .then(works => {
      renderWorks(works);
      const s = loadState();
      applyView(s.view, false);
      applyFilter(s.filter, false);
      if (s.scroll > 0) window.scrollTo(0, s.scroll);
    });
</script>

</body>
</html>
