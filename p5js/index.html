<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>p5.js Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e0e;
      color: #eee;
      font-family: 'Helvetica Neue', sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 48px 48px 32px;
      border-bottom: 1px solid #222;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fff;
    }

    header p {
      margin-top: 6px;
      font-size: 0.8rem;
      color: #555;
      letter-spacing: 0.05em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2px;
      padding: 2px;
      margin-top: 2px;
    }

    .card {
      position: relative;
      aspect-ratio: 1;
      background: #1a1a1a;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      display: block;
    }

    .card:hover .card-overlay {
      opacity: 1;
    }

    .card-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* サムネイルがない場合のプレースホルダー */
    .card-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      color: #333;
      font-size: 3rem;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .card-overlay h2 {
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: #fff;
    }

    .card-overlay p {
      margin-top: 4px;
      font-size: 0.75rem;
      color: #aaa;
    }

    .card-num {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 0.7rem;
      color: #444;
      letter-spacing: 0.08em;
      font-family: monospace;
    }
  </style>
</head>
<body>

<header>
  <h1>p5.js Gallery</h1>
  <p>generative art playground</p>
</header>

<div class="grid" id="gallery">

  <!-- ▼ スケッチを追加するときはここにカードを足す -->

  <a class="card" href="sketches/01_playground/index.html">
    <span class="card-num">01</span>
    <div class="card-placeholder">◎</div>
    <div class="card-overlay">
      <h2>Playground</h2>
      <p>mouse trail — getting started</p>
    </div>
  </a>

  <!-- ▲ ここまで -->

</div>

</body>
</html>
