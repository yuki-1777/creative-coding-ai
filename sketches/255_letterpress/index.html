<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letterpress</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0ede8; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', { preserveDrawingBuffer: true });

if (!gl) {
  document.body.innerHTML = '<p style="padding:2em">WebGL not supported</p>';
}

const VS = `
attribute vec2 a_pos;
void main() {
  gl_Position = vec4(a_pos, 0.0, 1.0);
}
`;

const FS = `
precision highp float;

uniform vec2  u_res;
uniform float u_time;
uniform vec2  u_mouse;
uniform float u_pressure; // 0..1
uniform float u_pressed;

// Hash
float hash(vec2 p) {
  p = fract(p * vec2(234.34, 435.346));
  p += dot(p, p + 34.23);
  return fract(p.x * p.y);
}

// Value noise
float vnoise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  vec2 u = f * f * (3.0 - 2.0 * f);
  float a = hash(i);
  float b = hash(i + vec2(1,0));
  float c = hash(i + vec2(0,1));
  float d = hash(i + vec2(1,1));
  return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
}

float fbm(vec2 p) {
  float v = 0.0;
  float a = 0.5;
  for (int i = 0; i < 4; i++) {
    v += a * vnoise(p);
    p = p * 2.1 + vec2(1.7, 9.2);
    a *= 0.5;
  }
  return v;
}

// Paper grain texture
float grain(vec2 uv) {
  float g = 0.0;
  g += 0.5 * vnoise(uv * 80.0);
  g += 0.25 * vnoise(uv * 160.0);
  g += 0.125 * vnoise(uv * 320.0);
  return g;
}

// SDF for a single block stamp shape (roughly rectangular with noise edges)
float stampSDF(vec2 uv, vec2 center, vec2 size, float noise) {
  vec2 d = abs(uv - center) - size * 0.5;
  float base = length(max(d, 0.0)) + min(max(d.x, d.y), 0.0);
  // distort edges with fbm
  float edge = fbm(uv * 6.0 + center * 3.0) * noise;
  return base - edge * 0.03;
}

void main() {
  vec2 uv = gl_FragCoord.xy / u_res;
  uv.y = 1.0 - uv.y;

  vec2 aspect = vec2(u_res.x / u_res.y, 1.0);
  vec2 p = uv * aspect;
  vec2 mouse = vec2(u_mouse.x / u_res.x, 1.0 - u_mouse.y / u_res.y) * aspect;

  // Paper base color — warm off-white with subtle grain
  float g = grain(uv) * 0.5 + 0.5; // remap 0..1 to 0.5..1.0
  vec3 paperColor = vec3(0.936 + g * 0.02, 0.926 + g * 0.018, 0.912 + g * 0.015);

  // Ink color — very dark warm brown (almost black)
  vec3 inkColor = vec3(0.12, 0.10, 0.09);

  float totalInk = 0.0;

  // Grid of stamp blocks — different sizes, rotations, offsets
  // Each block has a "press position" determined by mouse during press
  // The blocks are predefined layout — 4x5 grid with variation
  float pressEffect = u_pressure;

  // Block layout parameters
  int blockIdx = 0;
  float blockW = 0.11 * aspect.x;
  float blockH = 0.08;
  float spacingX = blockW * 1.35;
  float spacingY = blockH * 1.6;
  float startX = 0.5 * aspect.x - 1.5 * spacingX;
  float startY = 0.15;

  // Accumulated ink from all blocks
  for (int row = 0; row < 4; row++) {
    for (int col = 0; col < 4; col++) {
      float fi = float(row * 4 + col);

      vec2 blockCenter = vec2(startX + float(col) * spacingX, startY + float(row) * spacingY);

      // Each block has unique offset and size variation
      float seed = fi * 0.371 + 1.234;
      float noiseSeed = fract(seed * 7.63) * 2.0 - 1.0;
      blockCenter += vec2(fract(seed * 3.17) - 0.5, fract(seed * 5.23) - 0.5) * 0.02;

      vec2 bSize = vec2(blockW, blockH);
      bSize *= 0.7 + fract(seed * 2.91) * 0.4; // vary size

      // Distance from mouse to this block
      float distToMouse = length(mouse - blockCenter);
      float mouseInfluence = smoothstep(0.4, 0.0, distToMouse);

      // Press amount: stronger near mouse when pressed
      float blockPressure = pressEffect * (0.3 + 0.7 * mouseInfluence);
      // Time-based slow press accumulation per block
      // Idle state: each block has its own ambient "ghost" impression
      float idlePhase = sin(u_time * 0.15 + fi * 1.23) * 0.5 + 0.5; // 0..1
      float idlePressure = 0.06 + idlePhase * 0.05; // subtle ghost at rest
      float timePressure = smoothstep(0.0, 1.0, u_pressure * 0.8 + sin(u_time * 0.3 + fi * 0.8) * 0.1);

      float p2 = max(blockPressure, max(timePressure * 0.25, idlePressure));
      if (p2 < 0.02) continue;

      // Ink spreading: larger blocks spread more
      float spread = p2 * 0.015;
      vec2 sizeWithPressure = bSize + vec2(spread);

      // Edge noise varies per block
      float edgeNoise = 0.5 + fract(seed * 4.13) * 0.8;

      float d = stampSDF(p, blockCenter, sizeWithPressure, edgeNoise);

      // Ink coverage: more pressure = more solid center, noisy edges
      float inkEdge = 0.004 + (1.0 - p2) * 0.012;
      float inkAmount = smoothstep(inkEdge, -inkEdge, d);

      // Ink density varies with pressure — underpressure = lighter
      float inkDensity = p2 * (0.5 + 0.5 * fract(seed * 6.17));

      // Halftone-like variation — lighter in center with too much pressure
      float centerDist = length(p - blockCenter) / length(bSize * 0.5);
      float squeeze = 1.0;
      if (p2 > 0.7) {
        squeeze = 1.0 - smoothstep(0.4, 1.2, centerDist) * 0.3;
      }

      totalInk = max(totalInk, inkAmount * inkDensity * squeeze);
    }
  }

  // Paper grain absorbs ink
  float grainAbsorb = 0.85 + grain(uv * 2.0) * 0.3;
  totalInk *= grainAbsorb;
  totalInk = clamp(totalInk, 0.0, 1.0);

  // Bleed effect at edges
  float bleed = fbm(p * 20.0 + vec2(u_time * 0.05)) * 0.08;
  totalInk = clamp(totalInk + bleed * (totalInk > 0.05 ? 0.3 : 0.0), 0.0, 1.0);

  vec3 col = mix(paperColor, inkColor, totalInk);

  // Subtle vignette (paper edge)
  vec2 vigUv = uv * 2.0 - 1.0;
  float vig = 1.0 - dot(vigUv, vigUv) * 0.05;
  col *= vig;

  gl_FragColor = vec4(col, 1.0);
}
`;

function compileShader(gl, type, src) {
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(sh));
    return null;
  }
  return sh;
}

const vs = compileShader(gl, gl.VERTEX_SHADER, VS);
const fs = compileShader(gl, gl.FRAGMENT_SHADER, FS);
const prog = gl.createProgram();
gl.attachShader(prog, vs);
gl.attachShader(prog, fs);
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uRes      = gl.getUniformLocation(prog, 'u_res');
const uTime     = gl.getUniformLocation(prog, 'u_time');
const uMouse    = gl.getUniformLocation(prog, 'u_mouse');
const uPressure = gl.getUniformLocation(prog, 'u_pressure');
const uPressed  = gl.getUniformLocation(prog, 'u_pressed');

let W = 0, H = 0;
let mouseX = 0, mouseY = 0;
let pressure = 0;
let isPressed = false;
let t0 = performance.now();

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  gl.viewport(0, 0, W, H);
}
window.addEventListener('resize', resize);
resize();

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});
canvas.addEventListener('mousedown', () => { isPressed = true; });
canvas.addEventListener('mouseup', () => { isPressed = false; });
canvas.addEventListener('mouseleave', () => { isPressed = false; });

// Touch support
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
}, { passive: false });
canvas.addEventListener('touchstart', e => {
  isPressed = true;
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
});
canvas.addEventListener('touchend', () => { isPressed = false; });

function render() {
  const t = (performance.now() - t0) / 1000;
  gl.clearColor(0.941, 0.929, 0.910, 1.0);
  gl.clear(gl.COLOR_BUFFER_BIT);

  // Pressure builds when pressed, releases when not
  if (isPressed) {
    pressure = Math.min(1.0, pressure + 0.025);
  } else {
    pressure = Math.max(0.0, pressure - 0.015);
  }

  gl.uniform2f(uRes, W, H);
  gl.uniform1f(uTime, t);
  gl.uniform2f(uMouse, mouseX, mouseY);
  gl.uniform1f(uPressure, pressure);
  gl.uniform1f(uPressed, isPressed ? 1.0 : 0.0);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}
render();
</script>

<script>
window.SKETCH_META = {
  num:    '255',
  title:  'Letterpress',
  detail: 'マウスボタンを押したまま動かすと、活版印刷の版が紙に押しつけられる。長く押すほどインクが広がり、縁がにじむ。離すと少しずつ薄れる。文字は使っていない。圧力の形跡だけが残る。'
};
</script>
<script src="../../js/sketch-ui.js"></script>
</body>
</html>
