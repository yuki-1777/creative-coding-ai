<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hinge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f4f0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setClearColor(0xf5f4f0);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 4.5);

  let W = window.innerWidth, H = window.innerHeight;
  renderer.setSize(W, H);

  // N hinged segments, each can rotate at its joint
  const N_SEGS = 12;
  const SEG_LEN = 0.22;

  // Joint positions (computed from angles)
  const joints = [];
  for (let i = 0; i <= N_SEGS; i++) {
    joints.push(new THREE.Vector3());
  }

  // Draw segments as lines
  const segMat = new THREE.LineBasicMaterial({ color: 0x666660 });
  const segLines = [];
  for (let i = 0; i < N_SEGS; i++) {
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(6);
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const line = new THREE.Line(geo, segMat);
    scene.add(line);
    segLines.push({ line, geo, pos });
  }

  // Joint dots
  const dotMat = new THREE.PointsMaterial({ color: 0x888880, size: 0.04 });
  const dotGeo = new THREE.BufferGeometry();
  const dotPos = new Float32Array((N_SEGS + 1) * 3);
  dotGeo.setAttribute('position', new THREE.BufferAttribute(dotPos, 3));
  scene.add(new THREE.Points(dotGeo, dotMat));

  // Per-segment angle offsets (each hinge has its own phase)
  const phases = [];
  const freqs = [];
  const amps = [];
  for (let i = 0; i < N_SEGS; i++) {
    phases.push(Math.random() * Math.PI * 2);
    freqs.push(0.3 + (i / N_SEGS) * 0.5);
    amps.push(0.08 + (i / N_SEGS) * 0.12); // small per-joint angles
  }

  function update(t) {
    // Chain starts at left of center
    joints[0].set(-N_SEGS * SEG_LEN * 0.45, 0, 0);

    let cumAngle = 0;
    for (let i = 0; i < N_SEGS; i++) {
      const hingeAngle = Math.sin(t * freqs[i] + phases[i]) * amps[i];
      cumAngle += hingeAngle;
      // Clamp cumulative angle to prevent spiraling off screen
      cumAngle = Math.max(-Math.PI * 0.7, Math.min(Math.PI * 0.7, cumAngle));
      const dx = Math.cos(cumAngle) * SEG_LEN;
      const dy = Math.sin(cumAngle) * SEG_LEN;
      joints[i + 1].set(joints[i].x + dx, joints[i].y + dy, 0);

      const pos = segLines[i].pos;
      pos[0] = joints[i].x; pos[1] = joints[i].y; pos[2] = 0;
      pos[3] = joints[i + 1].x; pos[4] = joints[i + 1].y; pos[5] = 0;
      segLines[i].geo.attributes.position.needsUpdate = true;
    }

    // Dot positions
    for (let i = 0; i <= N_SEGS; i++) {
      dotPos[i * 3] = joints[i].x;
      dotPos[i * 3 + 1] = joints[i].y;
      dotPos[i * 3 + 2] = 0;
    }
    dotGeo.attributes.position.needsUpdate = true;
  }

  let t = 0;
  function animate() {
    requestAnimationFrame(animate);
    t += 0.016;
    update(t);
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    W = window.innerWidth; H = window.innerHeight;
    renderer.setSize(W, H);
    camera.aspect = W / H;
    camera.updateProjectionMatrix();
  });
</script>
<script>
window.SKETCH_META = {
  num:    '200',
  title:  'Hinge',
  detail: '12個の関節が連なっています。各関節は自分のリズムで曲がり、その角度が次の節に伝わります。先端に近いほど揺れ幅が大きくなります。蛇のような、ムカデのような動きが生まれます。'
};
</script>
<script src="../../js/sketch-ui.js"></script>
</body>
</html>
