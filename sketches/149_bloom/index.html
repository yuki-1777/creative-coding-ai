<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>149 — Bloom</title>
  <meta name="description" content="花を描こうとしたら、花びらが数学になった。">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #F5F3EE; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 7);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0xF5F3EE);
    document.body.appendChild(renderer.domElement);

    // 花びらを複数の薄い面として表現
    // 花びらはLaTex風のパラメトリック曲面
    const PETAL_COUNT = 7;
    const PETAL_SEGS = 40;
    const petals = [];

    function buildPetalGeo(petalIndex, openAmount, totalPetals) {
      const positions = [];
      const angle = (petalIndex / totalPetals) * Math.PI * 2;

      // 花びら形状：端は尖り、中央は膨らむ
      for (let i = 0; i <= PETAL_SEGS; i++) {
        const t = i / PETAL_SEGS;
        // 花びらの長さ方向
        const petalLen = Math.sin(t * Math.PI);
        const r = t * 1.8 * openAmount;
        const width = petalLen * 0.5 * openAmount;

        // 花びら面の縁（外周）
        const localX = r;
        const localY = width;
        const localZ = petalLen * 0.3; // 少し立体感

        const cos = Math.cos(angle);
        const sin = Math.sin(angle);

        // 各ポイント(左右の縁 + 中心)
        positions.push(
          cos * localX - sin * localY,
          sin * localX + cos * localY,
          localZ
        );
        positions.push(
          cos * localX + sin * localY,
          sin * localX - cos * localY,
          localZ
        );
      }
      // 中心線も追加
      for (let i = 0; i <= PETAL_SEGS; i++) {
        const t = i / PETAL_SEGS;
        const r = t * 1.8 * openAmount;
        const z = Math.sin(t * Math.PI) * 0.3;
        positions.push(Math.cos(angle) * r, Math.sin(angle) * r, z);
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      return geo;
    }

    for (let i = 0; i < PETAL_COUNT; i++) {
      const isAccent = i === 0 || i === PETAL_COUNT - 1;
      const mat = new THREE.LineBasicMaterial({
        color: isAccent ? 0x8A7055 : 0x2A2826,
        transparent: true,
        opacity: isAccent ? 0.65 : 0.4,
      });
      const geo = buildPetalGeo(i, 1.0, PETAL_COUNT);
      const line = new THREE.LineSegments(geo, mat);
      petals.push({ line, index: i, mat });
      scene.add(line);
    }

    // 花芯（中心の点群）
    const stamenGeo = new THREE.BufferGeometry();
    const stamenPositions = [];
    for (let i = 0; i < 40; i++) {
      const a = (i / 40) * Math.PI * 2;
      const r = 0.1 + (i % 7) * 0.04;
      stamenPositions.push(Math.cos(a) * r, Math.sin(a) * r, 0.05);
    }
    stamenGeo.setAttribute('position', new THREE.Float32BufferAttribute(stamenPositions, 3));
    const stamenLine = new THREE.Line(stamenGeo, new THREE.LineBasicMaterial({ color: 0x8A7055, opacity: 0.8, transparent: true }));
    scene.add(stamenLine);

    // マウス
    const mouse = { x: 0, y: 0 };
    window.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
      mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
    });

    let time = 0;
    let open = 0.5;

    function animate() {
      requestAnimationFrame(animate);
      time += 0.008;

      // 開花量：時間とマウスY
      open = 0.5 + 0.5 * Math.sin(time * 0.4) + mouse.y * 0.25;
      open = Math.max(0.15, Math.min(1.1, open));

      petals.forEach(({ line, index }) => {
        const geo = buildPetalGeo(index, open, PETAL_COUNT);
        line.geometry.dispose();
        line.geometry = geo;
      });

      // 花全体が少し回転
      scene.rotation.z = time * 0.04 + mouse.x * 0.3;
      scene.rotation.x = mouse.y * 0.15;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
  <script>
  window.SKETCH_META = {
    num:   '149',
    title: 'Bloom',
    detail: '7枚の花びらがゆっくり開いたり閉じたりしている。マウスを上に動かすと花が大きく開き、下に動かすと閉じる。左右に動かすと花全体が回転する。線だけで描いた花。'
  };
  </script>
  <script src="../../js/sketch-ui.js"></script>
</body>
</html>
