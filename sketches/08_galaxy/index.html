<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Galaxy</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 6, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

const COUNT = 60000;
const ARMS = 3;
const positions = new Float32Array(COUNT * 3);
const colors = new Float32Array(COUNT * 3);

const colorInner = new THREE.Color(0xffd6a0);
const colorOuter = new THREE.Color(0x3366ff);

for (let i = 0; i < COUNT; i++) {
  const arm = (i % ARMS) * (Math.PI * 2 / ARMS);
  const r = Math.pow(Math.random(), 1.5) * 8;
  const spin = r * 0.6;
  const angle = arm + spin;
  const spread = (Math.random() - 0.5) * (0.4 + (1 - r / 8) * 0.3);
  const spreadY = (Math.random() - 0.5) * 0.15 * (1 - r / 8);

  positions[i * 3]     = Math.cos(angle + spread) * r;
  positions[i * 3 + 1] = spreadY + (Math.random() - 0.5) * 0.1;
  positions[i * 3 + 2] = Math.sin(angle + spread) * r;

  const mixT = r / 8;
  const c = colorInner.clone().lerp(colorOuter, mixT);
  const bright = 0.7 + 0.3 * Math.random();
  colors[i * 3]     = c.r * bright;
  colors[i * 3 + 1] = c.g * bright;
  colors[i * 3 + 2] = c.b * bright;
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const mat = new THREE.PointsMaterial({
  size: 0.05,
  vertexColors: true,
  sizeAttenuation: true,
  transparent: true,
  opacity: 0.85,
});

const galaxy = new THREE.Points(geo, mat);
scene.add(galaxy);

const coreCount = 1000;
const corePos = new Float32Array(coreCount * 3);
const coreCol = new Float32Array(coreCount * 3);
for (let i = 0; i < coreCount; i++) {
  const r = Math.pow(Math.random(), 3) * 1.2;
  const phi = Math.acos(2 * Math.random() - 1);
  const theta = Math.random() * Math.PI * 2;
  corePos[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
  corePos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta) * 0.3;
  corePos[i * 3 + 2] = r * Math.cos(phi);
  coreCol[i * 3]     = 1.0;
  coreCol[i * 3 + 1] = 0.95;
  coreCol[i * 3 + 2] = 0.8;
}
const coreGeo = new THREE.BufferGeometry();
coreGeo.setAttribute('position', new THREE.BufferAttribute(corePos, 3));
coreGeo.setAttribute('color', new THREE.BufferAttribute(coreCol, 3));
const core = new THREE.Points(coreGeo, new THREE.PointsMaterial({
  size: 0.08, vertexColors: true, sizeAttenuation: true,
}));
scene.add(core);

let frameCount = 0;
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  galaxy.rotation.y = t * 0.05;
  core.rotation.y = t * 0.05;

  controls.update();
  renderer.render(scene, camera);

  frameCount++;
  if (frameCount === 60) {
    try {
      renderer.render(scene, camera);
      localStorage.setItem('thumb_08', renderer.domElement.toDataURL());
    } catch (e) {}
  }
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

animate();
</script>
<script>
window.SKETCH_META = {
  num:   '08',
  title: 'Galaxy',
  desc:  '対数螺旋と乱数で銀河の星分布を近似し、数万点のパーティクルをThree.jsのPointsで描画。渦巻き腕の形成・中心部の輝度集中・星の色温度分布を簡易的にシミュレーションしている。'
};
</script>
<script src="../../js/sketch-ui.js"></script>
</body>
</html>
