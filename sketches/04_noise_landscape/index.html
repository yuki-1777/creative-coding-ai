<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Noise Landscape</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <style>
    body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const COLS = 60;
const ROWS = 60;
let terrain = [];
let flying = 0;
let rotX = 0.55;
let rotY = 0;
let targetRotX = 0.55;
let targetRotY = 0;

function setup() {
  createCanvas(800, 800, WEBGL);
  colorMode(HSB, 360, 100, 100, 100);
  noiseDetail(8, 0.5);
  for (let i = 0; i <= ROWS; i++) {
    terrain[i] = [];
    for (let j = 0; j <= COLS; j++) {
      terrain[i][j] = 0;
    }
  }
}

function draw() {
  background(230, 20, 5);
  flying -= 0.008;

  let yoff = flying;
  for (let i = 0; i <= ROWS; i++) {
    let xoff = 0;
    for (let j = 0; j <= COLS; j++) {
      terrain[i][j] = map(noise(xoff, yoff), 0, 1, -160, 160);
      xoff += 0.15;
    }
    yoff += 0.15;
  }

  targetRotX = map(mouseY, 0, height, 0.3, 0.85);
  targetRotY = map(mouseX, 0, width, -0.3, 0.3);
  rotX = lerp(rotX, targetRotX, 0.05);
  rotY = lerp(rotY, targetRotY, 0.05);

  rotateX(rotX);
  rotateY(rotY);
  translate(-width * 0.35, -50, 0);

  let W = width * 0.7 / COLS;
  let H = height * 0.7 / ROWS;

  for (let i = 0; i < ROWS; i++) {
    beginShape(TRIANGLE_STRIP);
    for (let j = 0; j <= COLS; j++) {
      let h1 = terrain[i][j];
      let h2 = terrain[i + 1][j];

      let hue1 = map(h1, -160, 160, 200, 40);
      let sat1 = map(abs(h1), 0, 160, 20, 85);
      let bri1 = map(h1, -160, 160, 15, 90);

      let hue2 = map(h2, -160, 160, 200, 40);
      let sat2 = map(abs(h2), 0, 160, 20, 85);
      let bri2 = map(h2, -160, 160, 15, 90);

      stroke(hue1, sat1 * 0.4, bri1 * 0.5, 60);
      strokeWeight(0.3);
      fill(hue1, sat1, bri1, 85);
      vertex(j * W, i * H, h1);

      fill(hue2, sat2, bri2, 85);
      stroke(hue2, sat2 * 0.4, bri2 * 0.5, 60);
      vertex(j * W, (i + 1) * H, h2);
    }
    endShape();
  }

  if (frameCount === 60) {
    try {
      localStorage.setItem('thumb_04', document.querySelector('canvas').toDataURL());
    } catch(e) {}
  }
}
</script>
<script>
window.SKETCH_META = {
  num:   '04',
  title: 'Noise Landscape',
  desc:  '2次元Perlinノイズを地形の標高データとして解釈し、等高線と色グラデーションで擬似地形を描画。ノイズオフセットを時間軸で動かすことで、カメラが地表を流れていくような視覚効果を生む。'
};
</script>
<script src="../../js/sketch-ui.js"></script>
</body>
</html>
