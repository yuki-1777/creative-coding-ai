<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>133 — Skeleton</title>
  <meta name="description" content="関節の繋がりだけ描いた。人の動きに似ているが、人ではない。">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #F5F3EE; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0xF5F3EE);
    document.body.appendChild(renderer.domElement);

    // ボーン構造を定義（ベクトルで相対位置を定義）
    // 人体に近いが、少しずれた構造
    // 関節名と親インデックス
    const jointDefs = [
      // 脊椎
      { name: 'root',       parent: -1,  pos: [0,    0,    0   ] }, // 0
      { name: 'spine1',     parent:  0,  pos: [0,    0.35, 0   ] }, // 1
      { name: 'spine2',     parent:  1,  pos: [0,    0.35, 0   ] }, // 2
      { name: 'neck',       parent:  2,  pos: [0,    0.25, 0   ] }, // 3
      { name: 'head',       parent:  3,  pos: [0,    0.30, 0   ] }, // 4
      // 左腕
      { name: 'l_shoulder', parent:  2,  pos: [-0.40, 0.1, 0  ] }, // 5
      { name: 'l_elbow',    parent:  5,  pos: [-0.38, -0.05, 0 ] }, // 6
      { name: 'l_wrist',    parent:  6,  pos: [-0.32, -0.08, 0 ] }, // 7
      // 右腕
      { name: 'r_shoulder', parent:  2,  pos: [0.40,  0.1, 0  ] }, // 8
      { name: 'r_elbow',    parent:  8,  pos: [0.38, -0.05, 0  ] }, // 9
      { name: 'r_wrist',    parent:  9,  pos: [0.32, -0.08, 0  ] }, // 10
      // 左脚
      { name: 'l_hip',      parent:  0,  pos: [-0.20, -0.05, 0 ] }, // 11
      { name: 'l_knee',     parent: 11,  pos: [-0.05, -0.45, 0 ] }, // 12
      { name: 'l_ankle',    parent: 12,  pos: [0.04,  -0.45, 0 ] }, // 13
      // 右脚
      { name: 'r_hip',      parent:  0,  pos: [0.20, -0.05, 0  ] }, // 14
      { name: 'r_knee',     parent: 14,  pos: [0.05, -0.45, 0  ] }, // 15
      { name: 'r_ankle',    parent: 15,  pos: [-0.04, -0.45, 0 ] }, // 16
    ];

    const N = jointDefs.length;

    // ワールド座標（計算用）
    const worldPos = Array.from({ length: N }, () => new THREE.Vector3());

    // 関節の揺れ用パラメータ
    const phases = jointDefs.map((_, i) => ({
      px: Math.random() * Math.PI * 2,
      py: Math.random() * Math.PI * 2,
      pz: Math.random() * Math.PI * 2,
      fx: 0.3 + Math.random() * 0.4,
      fy: 0.2 + Math.random() * 0.3,
      fz: 0.2 + Math.random() * 0.3,
      amp: 0.02 + Math.random() * 0.06,
    }));

    // 骨格線のジオメトリ
    const EDGE_COUNT = N - 1; // 各関節は1つの親と接続
    const boneMat = new THREE.LineBasicMaterial({
      color: 0x2A2826,
      transparent: true,
      opacity: 0.6,
    });
    const bonePosArr = new Float32Array(EDGE_COUNT * 2 * 3);
    const boneGeo = new THREE.BufferGeometry();
    boneGeo.setAttribute('position', new THREE.BufferAttribute(bonePosArr, 3));
    boneGeo.setDrawRange(0, EDGE_COUNT * 2);
    const boneLines = new THREE.LineSegments(boneGeo, boneMat);
    scene.add(boneLines);

    // 関節の点（小さな球）
    const jointGeo = new THREE.SphereGeometry(0.04, 6, 6);
    const jointMat = new THREE.MeshBasicMaterial({ color: 0x2A2826 });
    const instancedJoints = new THREE.InstancedMesh(jointGeo, jointMat, N);
    scene.add(instancedJoints);

    // 頭部（少し大きい）
    const headGeo = new THREE.SphereGeometry(0.14, 8, 8);
    const headMat = new THREE.MeshBasicMaterial({
      color: 0x2A2826,
      wireframe: true,
    });
    const headMesh = new THREE.Mesh(headGeo, headMat);
    scene.add(headMesh);

    const dummy = new THREE.Object3D();

    // マウス
    const mouse = { x: 0, y: 0 };
    window.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
      mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
    });

    // 全体の揺れ（歩行に似た周期運動）
    function getJointOffset(i, t) {
      const ph = phases[i];
      const name = jointDefs[i].name;

      // 脚の往復
      if (name === 'l_hip' || name === 'l_knee' || name === 'l_ankle') {
        return new THREE.Vector3(
          ph.amp * Math.sin(t * 1.2 + ph.px),
          ph.amp * 0.5 * Math.cos(t * 1.2 + ph.py),
          ph.amp * 1.5 * Math.sin(t * 1.2 + ph.pz)
        );
      }
      if (name === 'r_hip' || name === 'r_knee' || name === 'r_ankle') {
        return new THREE.Vector3(
          ph.amp * Math.sin(t * 1.2 + ph.px + Math.PI),
          ph.amp * 0.5 * Math.cos(t * 1.2 + ph.py + Math.PI),
          ph.amp * 1.5 * Math.sin(t * 1.2 + ph.pz + Math.PI)
        );
      }
      // 腕の揺れ
      if (name === 'l_shoulder' || name === 'l_elbow' || name === 'l_wrist') {
        return new THREE.Vector3(
          ph.amp * 0.5 * Math.sin(t * 1.2 + ph.px + Math.PI),
          ph.amp * Math.sin(t * 0.8 + ph.py),
          ph.amp * Math.sin(t * 1.2 + ph.pz + Math.PI)
        );
      }
      if (name === 'r_shoulder' || name === 'r_elbow' || name === 'r_wrist') {
        return new THREE.Vector3(
          ph.amp * 0.5 * Math.sin(t * 1.2 + ph.px),
          ph.amp * Math.sin(t * 0.8 + ph.py),
          ph.amp * Math.sin(t * 1.2 + ph.pz)
        );
      }
      // 脊椎・頭は穏やかに揺れる
      return new THREE.Vector3(
        ph.amp * 0.3 * Math.sin(t * ph.fx + ph.px),
        ph.amp * 0.2 * Math.sin(t * ph.fy + ph.py),
        ph.amp * 0.3 * Math.sin(t * ph.fz + ph.pz)
      );
    }

    const group = new THREE.Group();
    scene.add(group);
    group.add(boneLines);
    group.add(instancedJoints);
    group.add(headMesh);

    let time = 0;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.012;

      // 各関節のワールド座標を計算
      for (let i = 0; i < N; i++) {
        const def = jointDefs[i];
        const offset = getJointOffset(i, time);
        const local = new THREE.Vector3(def.pos[0], def.pos[1], def.pos[2]);
        local.add(offset);

        if (def.parent === -1) {
          worldPos[i].copy(local);
        } else {
          worldPos[i].copy(worldPos[def.parent]).add(local);
        }
      }

      // 骨格線の更新
      let boneIdx = 0;
      for (let i = 1; i < N; i++) {
        const p = jointDefs[i].parent;
        bonePosArr[boneIdx * 6 + 0] = worldPos[p].x;
        bonePosArr[boneIdx * 6 + 1] = worldPos[p].y;
        bonePosArr[boneIdx * 6 + 2] = worldPos[p].z;
        bonePosArr[boneIdx * 6 + 3] = worldPos[i].x;
        bonePosArr[boneIdx * 6 + 4] = worldPos[i].y;
        bonePosArr[boneIdx * 6 + 5] = worldPos[i].z;
        boneIdx++;
      }
      boneGeo.attributes.position.needsUpdate = true;

      // 関節点の更新
      for (let i = 0; i < N; i++) {
        dummy.position.copy(worldPos[i]);
        dummy.updateMatrix();
        instancedJoints.setMatrixAt(i, dummy.matrix);
      }
      instancedJoints.instanceMatrix.needsUpdate = true;

      // 頭の位置
      headMesh.position.copy(worldPos[4]);

      // グループ全体をマウスで回転
      group.rotation.y += (mouse.x * 1.2 - group.rotation.y) * 0.04;
      group.rotation.x += (mouse.y * 0.4 - group.rotation.x) * 0.04;
      // 上下に揺れる
      group.position.y = 0.05 * Math.sin(time * 1.2);

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
  <script>
  window.SKETCH_META = {
    num:   '133',
    title: 'Skeleton',
    desc:  '関節の繋がりだけ描いた。人の動きに似ているが、人ではない。マウスで向きを変えられる。',
    detail: '17個の関節を骨格として定義し、それぞれが独自のリズムで揺れる。脚は歩行に近い往復運動、腕は逆位相で振れる。人体の構造を参照しているが、形は省いた。関節の繋がりだけが動いている。'
  };
  </script>
  <script src="../../js/sketch-ui.js"></script>
</body>
</html>
