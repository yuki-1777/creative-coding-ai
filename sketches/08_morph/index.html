<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0xF5F3EE);
    document.body.appendChild(renderer.domElement);

    // Hash-based smooth noise
    function hash(n) {
      n = Math.sin(n) * 43758.5453123;
      return n - Math.floor(n);
    }
    function smoothNoise(x, y, z) {
      const ix = Math.floor(x), iy = Math.floor(y), iz = Math.floor(z);
      const fx = x - ix, fy = y - iy, fz = z - iz;
      const ux = fx * fx * (3 - 2 * fx);
      const uy = fy * fy * (3 - 2 * fy);
      const uz = fz * fz * (3 - 2 * fz);
      const h = (a, b, c) => hash(a + b * 137 + c * 919);
      return h(ix,iy,iz)*(1-ux)*(1-uy)*(1-uz)
           + h(ix+1,iy,iz)*ux*(1-uy)*(1-uz)
           + h(ix,iy+1,iz)*(1-ux)*uy*(1-uz)
           + h(ix+1,iy+1,iz)*ux*uy*(1-uz)
           + h(ix,iy,iz+1)*(1-ux)*(1-uy)*uz
           + h(ix+1,iy,iz+1)*ux*(1-uy)*uz
           + h(ix,iy+1,iz+1)*(1-ux)*uy*uz
           + h(ix+1,iy+1,iz+1)*ux*uy*uz;
    }

    const RADIUS = 1.4;
    const DETAIL = 4;
    const geo = new THREE.SphereGeometry(RADIUS, 32 * DETAIL, 24 * DETAIL);

    // Store original positions
    const originalPos = geo.attributes.position.array.slice();

    const mat = new THREE.MeshBasicMaterial({
      color: 0x2A2A2A,
      wireframe: true,
      transparent: true,
      opacity: 0.45
    });
    const mesh = new THREE.Mesh(geo, mat);
    scene.add(mesh);

    let time = 0;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.006;

      const posAttr = geo.attributes.position;
      const arr = posAttr.array;

      for (let i = 0; i < arr.length; i += 3) {
        const ox = originalPos[i];
        const oy = originalPos[i + 1];
        const oz = originalPos[i + 2];

        // Normalize to get direction on sphere
        const len = Math.sqrt(ox * ox + oy * oy + oz * oz);
        const nx = ox / len;
        const ny = oy / len;
        const nz = oz / len;

        // Multi-layer noise for organic deformation
        const scale = 1.1;
        const t = time * 0.4;
        const n1 = smoothNoise(nx * scale + t, ny * scale, nz * scale) * 2 - 1;
        const n2 = smoothNoise(nx * scale * 2.1 - t * 0.5, ny * scale * 2.1 + 0.3, nz * scale * 2.1) * 2 - 1;

        // Subtle sin wave ripple
        const angle = Math.atan2(oy, ox);
        const sinWave = Math.sin(angle * 3 + time * 1.5) * 0.04;

        const displacement = n1 * 0.18 + n2 * 0.08 + sinWave;
        const newR = RADIUS + displacement;

        arr[i]     = nx * newR;
        arr[i + 1] = ny * newR;
        arr[i + 2] = nz * newR;
      }

      posAttr.needsUpdate = true;
      geo.computeVertexNormals();

      // Very slow rotation
      mesh.rotation.y += 0.003;
      mesh.rotation.x += 0.001;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>

  window.SKETCH_META = {

    desc:  '球に揺らぎを与えたら、生き物みたいになった。',
    detail: '球体の表面を格子状の線で描き、その格子の各点をランダムな「地形ノイズ」で凸凹に押し出している。2種類の揺らぎが異なる速さで重なり合うため、表面が絶えず変形し続け、まるで水に濡れた風船や生き物の皮膚のように見える。ゆっくり自転しながら形が変わり続ける。'
  };
  </script>
