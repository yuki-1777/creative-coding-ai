<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f3ef; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let mouseX = canvas.width / 2;
let mouseY = canvas.height / 2;
canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

// Candle parameters
const waxColor = '#ddd8cc';
const waxDarkColor = '#c8c2b4';

// Flame particles
const FLAME_COUNT = 80;
let particles = [];

function resetParticle(p) {
  const cx = canvas.width / 2;
  const candleTop = canvas.height * 0.55;
  p.x = cx + (Math.random() - 0.5) * 8;
  p.y = candleTop;
  p.vx = (Math.random() - 0.5) * 0.5;
  p.vy = -(Math.random() * 1.5 + 1.0);
  p.life = 0;
  p.maxLife = Math.random() * 60 + 40;
  p.size = Math.random() * 2 + 1;
}

for (let i = 0; i < FLAME_COUNT; i++) {
  const p = {};
  resetParticle(p);
  p.life = Math.random() * 100;
  particles.push(p);
}

// Drip wax
let drips = [];
function maybeAddDrip() {
  if (Math.random() < 0.003) {
    const cx = canvas.width / 2;
    const candleW = 28;
    const side = Math.random() < 0.5 ? -1 : 1;
    drips.push({
      x: cx + side * (candleW * 0.5 - 2),
      y: canvas.height * 0.55 + 5,
      vy: 0.3 + Math.random() * 0.3,
      length: 0,
      maxLength: 20 + Math.random() * 40,
      width: 4 + Math.random() * 4,
      stopped: false,
      stopY: 0
    });
  }
}

let t = 0;

function drawCandle() {
  const cx = canvas.width / 2;
  const candleTop = canvas.height * 0.55;
  const candleBottom = canvas.height * 0.85;
  const candleW = 28;

  // Candle body — minimal outline
  ctx.beginPath();
  ctx.roundRect(cx - candleW / 2, candleTop, candleW, candleBottom - candleTop, 3);
  ctx.fillStyle = 'rgba(220,216,208,0.5)';
  ctx.fill();
  ctx.strokeStyle = '#8c8680';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Wick
  ctx.beginPath();
  ctx.moveTo(cx, candleTop);
  ctx.lineTo(cx + 1, candleTop - 14);
  ctx.strokeStyle = '#3a2a1a';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function drawDrips() {
  drips.forEach(d => {
    if (!d.stopped) {
      d.length += d.vy;
      if (d.length >= d.maxLength) {
        d.stopped = true;
        d.stopY = d.y + d.length;
      }
    }
    const endY = d.stopped ? d.stopY : d.y + d.length;
    ctx.beginPath();
    ctx.moveTo(d.x, d.y);
    ctx.lineTo(d.x, endY);
    ctx.strokeStyle = '#b0aca4';
    ctx.lineWidth = d.width * 0.45;
    ctx.lineCap = 'round';
    ctx.stroke();
  });
}

function drawFlame() {
  const cx = canvas.width / 2;
  const wickTop = canvas.height * 0.55 - 14;

  // Wind from mouse
  const windX = (mouseX - canvas.width / 2) * 0.003;

  particles.forEach(p => {
    p.life++;
    if (p.life > p.maxLife) {
      resetParticle(p);
    }
    const windInfluence = p.life / p.maxLife;
    p.x += p.vx + windX * windInfluence * 2;
    p.y += p.vy * (1 - windInfluence * 0.3);
    p.vx += (Math.random() - 0.5) * 0.08;

    const progress = p.life / p.maxLife;
    const alpha = progress < 0.3
      ? progress / 0.3
      : 1 - (progress - 0.3) / 0.7;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (1 + progress * 0.5), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(160,128,68,${(alpha * 0.65).toFixed(2)})`;
    ctx.fill();
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background warm tint
  ctx.fillStyle = '#f5f3ef';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  maybeAddDrip();
  drawCandle();
  drawDrips();
  drawFlame();

  t++;
  requestAnimationFrame(draw);
}

draw();
</script>

<script>
window.SKETCH_META = {
  num:    '214',
  title:  'Candle',
  detail: 'マウスを左右に動かすと、炎が風で揺れます。溶けた蝋が垂れてくることもあります。炎は細い粒子の集まりで描いていて、ウィックから上に向かうにつれて色と透明度が変わります。'
};
</script>
<script src="../../js/sketch-ui.js"></script>
</body>
</html>
