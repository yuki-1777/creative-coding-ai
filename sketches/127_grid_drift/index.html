<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
const COLS = 28;
const ROWS = 20;
const DRIFT_AMP = 32;
const DRIFT_SPEED = 0.008;
const RESET_DURATION = 80;

let points = [];
let resetMode = false;
let resetTimer = 0;
let t = 0;

function initPoints() {
  const spacex = width / (COLS + 1);
  const spacey = height / (ROWS + 1);
  points = [];
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const ox = spacex * (col + 1);
      const oy = spacey * (row + 1);
      points.push({ ox, oy, x: ox, y: oy, row, col });
    }
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  initPoints();
  noStroke();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  initPoints();
}

function mousePressed() {
  resetMode = true;
  resetTimer = 0;
}

function touchStarted() {
  resetMode = true;
  resetTimer = 0;
  return false;
}

function draw() {
  background('#F5F3EE');
  t += DRIFT_SPEED;

  if (resetMode) {
    resetTimer++;
    if (resetTimer > RESET_DURATION) resetMode = false;
  }

  for (const p of points) {
    // p5.js noise() for smooth drift
    const nx = p.col * 0.4;
    const ny = p.row * 0.4;
    const driftX = (noise(nx, ny, t) * 2 - 1) * DRIFT_AMP;
    const driftY = (noise(nx + 100, ny + 100, t) * 2 - 1) * DRIFT_AMP;

    let targetX, targetY;
    if (resetMode) {
      const ease = 1 - pow(1 - resetTimer / RESET_DURATION, 3);
      targetX = p.ox + driftX * (1 - ease);
      targetY = p.oy + driftY * (1 - ease);
    } else {
      targetX = p.ox + driftX;
      targetY = p.oy + driftY;
    }

    p.x += (targetX - p.x) * 0.08;
    p.y += (targetY - p.y) * 0.08;

    const dx = p.x - p.ox;
    const dy = p.y - p.oy;
    const dist = sqrt(dx * dx + dy * dy);
    const alpha = 0.18 + (dist / DRIFT_AMP) * 0.45;
    const radius = 1.2 + (dist / DRIFT_AMP) * 0.8;

    fill(42, 42, 42, alpha * 255);
    ellipse(p.x, p.y, radius * 2);
  }
}
</script>

};
</script>
