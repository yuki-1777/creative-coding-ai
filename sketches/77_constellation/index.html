<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  init();
}
window.addEventListener('resize', resize);

let mx = 0, my = 0;
canvas.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
canvas.addEventListener('click', () => { init(); });

const NUM_STARS = 80;
let stars = [];
let connections = [];
let connectPhase = 0; // how many connections revealed
let connectTimer = 0;

function init() {
  stars = [];
  connections = [];
  connectPhase = 0;

  // Generate star positions with some clustering
  for (let i = 0; i < NUM_STARS; i++) {
    const margin = 60;
    stars.push({
      x: margin + Math.random() * (W - margin * 2),
      y: margin + Math.random() * (H - margin * 2),
      r: 0.8 + Math.random() * 1.8,
      brightness: 0.3 + Math.random() * 0.5,
      twinklePhase: Math.random() * Math.PI * 2,
      twinkleSpeed: 0.02 + Math.random() * 0.02,
      vx: (Math.random() - 0.5) * 0.04,
      vy: (Math.random() - 0.5) * 0.04,
    });
  }

  // Build constellation connections (Delaunay-like: connect nearby stars)
  buildConnections();
}

function buildConnections() {
  connections = [];
  const maxDist = Math.min(W, H) * 0.18;

  for (let i = 0; i < stars.length; i++) {
    let nearCount = 0;
    for (let j = i + 1; j < stars.length; j++) {
      if (nearCount >= 3) break;
      const dx = stars[i].x - stars[j].x;
      const dy = stars[i].y - stars[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < maxDist) {
        connections.push({ i, j, dist, revealed: false, progress: 0 });
        nearCount++;
      }
    }
  }

  // Sort connections by distance for natural reveal order
  connections.sort((a, b) => a.dist - b.dist);
}

function draw() {
  requestAnimationFrame(draw);

  ctx.fillStyle = 'rgba(245, 243, 238, 0.3)';
  ctx.fillRect(0, 0, W, H);

  const t = Date.now() * 0.001;

  // Slowly move stars
  for (const s of stars) {
    s.x += s.vx;
    s.y += s.vy;
    // Bounce within bounds
    if (s.x < 40 || s.x > W - 40) s.vx *= -1;
    if (s.y < 40 || s.y > H - 40) s.vy *= -1;
  }

  // Mouse proximity: attract nearest stars slightly
  for (const s of stars) {
    const dx = mx - s.x;
    const dy = my - s.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 120 && dist > 0) {
      s.x += (dx / dist) * 0.15;
      s.y += (dy / dist) * 0.15;
    }
  }

  // Reveal connections over time
  connectTimer++;
  if (connectTimer % 8 === 0 && connectPhase < connections.length) {
    connections[connectPhase].revealed = true;
    connectPhase++;
  }

  // Draw connections
  for (const c of connections) {
    if (!c.revealed) continue;
    c.progress = Math.min(1, c.progress + 0.04);

    const s1 = stars[c.i];
    const s2 = stars[c.j];
    const ex = s1.x + (s2.x - s1.x) * c.progress;
    const ey = s1.y + (s2.y - s1.y) * c.progress;

    // Alpha based on distance: closer = more visible
    const alpha = 0.06 + (1 - c.dist / (Math.min(W, H) * 0.18)) * 0.12;

    ctx.beginPath();
    ctx.moveTo(s1.x, s1.y);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = `rgba(42, 42, 42, ${alpha})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Draw stars
  for (const s of stars) {
    const twinkle = 0.8 + Math.sin(t * s.twinkleSpeed * 60 + s.twinklePhase) * 0.2;
    const alpha = s.brightness * twinkle;

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r * twinkle, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(42, 42, 42, ${alpha})`;
    ctx.fill();
  }
}

resize();
draw();
</script>
