<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>147 — Vortex</title>
  <meta name="description" content="渦を描いたら、吸い込まれた。">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #F5F3EE; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 6, 6);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0xF5F3EE);
    document.body.appendChild(renderer.domElement);

    // 複数の螺旋アームを持つ渦
    const ARM_COUNT = 5;
    const POINTS_PER_ARM = 200;
    const spirals = [];

    function buildSpiralGeometry(armIndex, twistAmount) {
      const positions = [];
      const totalArms = ARM_COUNT;
      const armOffset = (armIndex / totalArms) * Math.PI * 2;

      for (let i = 0; i < POINTS_PER_ARM; i++) {
        const t = i / (POINTS_PER_ARM - 1);
        const radius = t * 3.5;
        const angle = armOffset + t * Math.PI * 6 * twistAmount;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        const y = (1 - t) * 1.5 * Math.sin(t * Math.PI * 3);
        positions.push(x, y, z);
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      return geo;
    }

    for (let i = 0; i < ARM_COUNT; i++) {
      const isAccent = i === 0;
      const mat = new THREE.LineBasicMaterial({
        color: isAccent ? 0x8A7055 : 0x2A2826,
        transparent: true,
        opacity: isAccent ? 0.7 : 0.35,
      });
      const geo = buildSpiralGeometry(i, 1.0);
      const line = new THREE.Line(geo, mat);
      spirals.push({ line, armIndex: i, mat });
      scene.add(line);
    }

    // マウス
    const mouse = { x: 0, y: 0 };
    window.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
      mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
    });

    let time = 0;
    let twist = 1.0;

    function animate() {
      requestAnimationFrame(animate);
      time += 0.01;

      // マウスX でねじれ具合を変化
      twist = 0.5 + (mouse.x + 1) * 0.75;

      spirals.forEach(({ line, armIndex }) => {
        const geo = buildSpiralGeometry(armIndex, twist);
        line.geometry.dispose();
        line.geometry = geo;
      });

      // 渦全体を回転
      scene.rotation.y = time * 0.15 + mouse.x * 0.5;

      // カメラ高さをマウスYで変化
      camera.position.y = 6 + mouse.y * 2;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
  <script>
  window.SKETCH_META = {
    num:   '147',
    title: 'Vortex',
    detail: '5本のアームが中心から外へ螺旋を描いている。マウスを左右に動かすとアームのねじれ具合が変わり、上下に動かすと見る角度が変わる。中心に近いほど密で、外へ向かうほど広がる。'
  };
  </script>
  <script src="../../js/sketch-ui.js"></script>
</body>
</html>
