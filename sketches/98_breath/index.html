<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

let mx = W / 2, my = H / 2;
let mouseActive = false;
canvas.addEventListener('mousemove', e => {
  mx = e.clientX;
  my = e.clientY;
  mouseActive = true;
});
canvas.addEventListener('mouseleave', () => { mouseActive = false; });

// Center of the breathing form
let cx = W / 2, cy = H / 2;
let targetX, targetY;

const RINGS = 12;
const BASE_RADIUS = 18;
const RING_GAP = 22;
const BREATH_PERIOD = 220; // frames

let frame = 0;

function easeInOut(t) {
  return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
}

function draw() {
  requestAnimationFrame(draw);
  frame++;

  // Smooth center toward mouse when active
  const tx = mouseActive ? mx : W / 2;
  const ty = mouseActive ? my : H / 2;
  cx += (tx - cx) * 0.02;
  cy += (ty - cy) * 0.02;

  ctx.fillStyle = '#F5F3EE';
  ctx.fillRect(0, 0, W, H);

  // Breathing phase: 0 to 1 and back
  const t = (frame % BREATH_PERIOD) / BREATH_PERIOD;
  const breathPhase = Math.sin(t * Math.PI * 2);
  const breathScale = 1 + breathPhase * 0.22;

  for (let i = RINGS; i >= 1; i--) {
    const baseR = BASE_RADIUS + i * RING_GAP;
    // Each ring has a slight phase offset — inner rings lead
    const phaseOffset = (RINGS - i) * 0.05;
    const ringPhase = Math.sin((t + phaseOffset) * Math.PI * 2);
    const scale = 1 + ringPhase * 0.18;
    const r = baseR * scale;

    // Distort into ellipse slightly based on breath direction
    const wobbleX = 1 + ringPhase * 0.06;
    const wobbleY = 1 - ringPhase * 0.04;

    const alpha = 0.06 + (1 - i / RINGS) * 0.1;
    const weight = 0.4 + (1 - i / RINGS) * 0.5;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(wobbleX, wobbleY);
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(42, 42, 42, ${alpha})`;
    ctx.lineWidth = weight;
    ctx.stroke();
    ctx.restore();
  }

  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, 2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(42, 42, 42, 0.3)';
  ctx.fill();
}

draw();
</script>
