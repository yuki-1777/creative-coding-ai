<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Flow Field</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <style>
    body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
let particles = [];
const NUM = 1200;
const SCALE = 12;
let cols, rows;
let field = [];
let zOff = 0;

function setup() {
  createCanvas(800, 800);
  colorMode(HSB, 360, 100, 100, 100);
  cols = floor(width / SCALE);
  rows = floor(height / SCALE);
  for (let i = 0; i < NUM; i++) {
    particles.push({
      x: random(width),
      y: random(height),
      px: 0,
      py: 0,
      hue: random(180, 260),
      speed: random(1.5, 3.5),
      life: random(80, 200),
      age: random(200)
    });
  }
  background(220, 10, 8);
}

function draw() {
  fill(220, 10, 8, 6);
  noStroke();
  rect(0, 0, width, height);

  for (let y = 0; y <= rows; y++) {
    for (let x = 0; x <= cols; x++) {
      let angle = noise(x * 0.13, y * 0.13, zOff) * TWO_PI * 2;
      field[x + y * (cols + 1)] = angle;
    }
  }
  zOff += 0.004;

  for (let p of particles) {
    p.age++;
    if (p.age > p.life) {
      p.x = random(width);
      p.y = random(height);
      p.age = 0;
      p.hue = random(180, 260);
    }
    let gx = floor(p.x / SCALE);
    let gy = floor(p.y / SCALE);
    gx = constrain(gx, 0, cols);
    gy = constrain(gy, 0, rows);
    let angle = field[gx + gy * (cols + 1)];
    let vx = cos(angle) * p.speed;
    let vy = sin(angle) * p.speed;

    p.px = p.x;
    p.py = p.y;
    p.x += vx;
    p.y += vy;

    if (p.x < 0 || p.x > width || p.y < 0 || p.y > height) {
      p.x = random(width);
      p.y = random(height);
      p.age = 0;
    }

    let alpha = map(p.age, 0, p.life, 0, 80);
    stroke(p.hue + sin(zOff * 5) * 20, 70, 95, alpha);
    strokeWeight(0.8);
    line(p.px, p.py, p.x, p.y);
  }

  if (frameCount === 60) {
    try {
      localStorage.setItem('thumb_02', document.querySelector('canvas').toDataURL());
    } catch(e) {}
  }
}

function mousePressed() {
  for (let p of particles) {
    p.x = random(width);
    p.y = random(height);
    p.age = random(200);
    p.hue = random(180, 260);
  }
  background(220, 10, 8);
}
</script>
</body>
</html>
