<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
let t = 0;
let pulsePhase = 0;
let bpm = 68;
let targetBpm = 68;
let excitation = 0;

const HISTORY_LEN = 400;
let history = [];
let scrollOffset = 0;

function ecgSample(phase) {
  // Simplified ECG-like waveform
  const p = (phase % TWO_PI) / TWO_PI; // 0..1

  // Baseline noise
  let val = sin(phase * 0.3) * 0.04 + (noise(phase * 0.1) - 0.5) * 0.06;

  // P wave
  if (p > 0.08 && p < 0.18) {
    val += sin(map(p, 0.08, 0.18, 0, PI)) * 0.18;
  }

  // QRS complex
  if (p > 0.28 && p < 0.42) {
    const qrs = map(p, 0.28, 0.42, 0, 1);
    if (qrs < 0.25) val -= qrs * 0.6; // Q
    else if (qrs < 0.5) val += (qrs - 0.25) * 6.0; // R rise
    else if (qrs < 0.65) val -= (qrs - 0.5) * 8.0; // R fall / S
    else val += (qrs - 0.65) * 0.5; // recover
  }

  // T wave
  if (p > 0.55 && p < 0.78) {
    val += sin(map(p, 0.55, 0.78, 0, PI)) * 0.28;
  }

  return val;
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(RGB);
  strokeCap(ROUND);
  for (let i = 0; i < HISTORY_LEN; i++) history.push(0);
}

function draw() {
  background(245, 243, 238);
  t++;

  // Mouse influence: proximity to center accelerates heart
  const cx = width / 2;
  const cy = height / 2;
  const md = dist(mouseX, mouseY, cx, cy);
  const mouseFactor = constrain(map(md, 0, 200, 1.4, 0), 0, 1.4);
  targetBpm = 68 + mouseFactor * 40;

  bpm += (targetBpm - bpm) * 0.03;

  const beatsPerFrame = bpm / 60 / 60; // assuming 60fps
  pulsePhase += beatsPerFrame * TWO_PI;

  const sample = ecgSample(pulsePhase);
  history.push(sample);
  if (history.length > HISTORY_LEN) history.shift();

  // Draw grid lines (subtle)
  stroke(42, 42, 42, 12);
  strokeWeight(0.5);
  const gridH = height * 0.12;
  for (let gy = height * 0.2; gy < height * 0.85; gy += gridH) {
    line(0, gy, width, gy);
  }

  // Draw multiple traces (echo/ghost lines)
  const traceCount = 3;
  for (let tr = 0; tr < traceCount; tr++) {
    const alphaVal = map(tr, 0, traceCount - 1, 18, 90);
    const offset = tr * 6;
    stroke(42, 42, 42, alphaVal);
    strokeWeight(tr === traceCount - 1 ? 1.4 : 0.7);
    noFill();

    const amplitude = height * 0.22;
    const baseline = height * 0.5;
    const stepW = width / (HISTORY_LEN - 1);

    beginShape();
    for (let i = 0; i < history.length; i++) {
      const x = i * stepW;
      const y = baseline - history[i] * amplitude + offset * (tr - 1);
      vertex(x, y);
    }
    endShape();
  }

  // Pulse dot at end of trace
  const lastVal = history[history.length - 1];
  const dotX = (HISTORY_LEN - 1) * (width / (HISTORY_LEN - 1));
  const dotY = height * 0.5 - lastVal * height * 0.22;
  const pulse = (sin(t * 0.15) + 1) * 0.5;
  noStroke();
  fill(42, 42, 42, 80 + pulse * 60);
  circle(dotX, dotY, 4 + pulse * 2);

  // BPM indicator (subtle)
  noStroke();
  fill(42, 42, 42, 40);
  textSize(11);
  textAlign(RIGHT, BOTTOM);
  text(floor(bpm) + ' bpm', width - 24, height - 28);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background('#F5F3EE');
}
</script>

};
</script>
