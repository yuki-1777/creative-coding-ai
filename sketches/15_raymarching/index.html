<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Raymarching</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const gl = canvas.getContext('webgl');

const vert = `
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
`;

const frag = `
precision highp float;
uniform float u_time;
uniform vec2 u_res;

#define MAX_STEPS 100
#define MAX_DIST 30.0
#define SURF_DIST 0.001
#define PI 3.14159265

float sdSphere(vec3 p, float r) { return length(p) - r; }

float sdBox(vec3 p, vec3 b) {
  vec3 q = abs(p) - b;
  return length(max(q,0.0)) + min(max(q.x,max(q.y,q.z)),0.0);
}

float sdTorus(vec3 p, vec2 t) {
  vec2 q = vec2(length(p.xz)-t.x, p.y);
  return length(q)-t.y;
}

float sdCapsule(vec3 p, vec3 a, vec3 b, float r) {
  vec3 pa = p-a, ba = b-a;
  float h = clamp(dot(pa,ba)/dot(ba,ba),0.0,1.0);
  return length(pa - ba*h) - r;
}

float smin(float a, float b, float k) {
  float h = max(k - abs(a-b), 0.0) / k;
  return min(a,b) - h*h*k*0.25;
}

mat2 rot2(float a) { return mat2(cos(a),-sin(a),sin(a),cos(a)); }

vec3 rotY(vec3 p, float a) {
  p.xz = rot2(a) * p.xz;
  return p;
}
vec3 rotX(vec3 p, float a) {
  p.yz = rot2(a) * p.yz;
  return p;
}

float map(vec3 p) {
  float t = u_time * 0.5;

  vec3 p1 = rotY(p, t);
  p1 = rotX(p1, t * 0.7);

  float torus = sdTorus(p1, vec2(1.2, 0.35));

  vec3 p2 = rotY(p, t * 1.3);
  p2 = rotX(p2, t * 0.4);
  float box = sdBox(p2, vec3(0.55));
  box = max(box, -sdSphere(p2, 0.85));

  float sphere = sdSphere(p - vec3(sin(t*1.1)*0.5, cos(t*0.9)*0.3, 0.0), 0.4);

  float d = smin(torus, box, 0.3);
  d = smin(d, sphere, 0.25);

  vec3 p3 = p;
  p3.y -= -1.8;
  float floor_d = p3.y;

  d = min(d, floor_d);

  return d;
}

vec3 normal(vec3 p) {
  float e = 0.0005;
  return normalize(vec3(
    map(p+vec3(e,0,0)) - map(p-vec3(e,0,0)),
    map(p+vec3(0,e,0)) - map(p-vec3(0,e,0)),
    map(p+vec3(0,0,e)) - map(p-vec3(0,0,e))
  ));
}

float shadow(vec3 ro, vec3 rd, float mint, float maxt) {
  float res = 1.0;
  float t = mint;
  for (int i = 0; i < 24; i++) {
    float h = map(ro + rd*t);
    if (h < 0.001) return 0.0;
    res = min(res, 8.0*h/t);
    t += h;
    if (t > maxt) break;
  }
  return clamp(res, 0.0, 1.0);
}

float ao(vec3 p, vec3 n) {
  float occ = 0.0, sca = 1.0;
  for (int i = 0; i < 5; i++) {
    float h = 0.01 + 0.12*float(i)/4.0;
    occ += (h - map(p+h*n))*sca;
    sca *= 0.95;
  }
  return clamp(1.0 - 3.0*occ, 0.0, 1.0);
}

vec3 palette(float t) {
  return 0.5 + 0.5*cos(2.0*PI*(vec3(1.0,0.7,0.4)*t + vec3(0.0,0.15,0.3)));
}

void main() {
  vec2 uv = (gl_FragCoord.xy * 2.0 - u_res) / min(u_res.x, u_res.y);

  float camT = u_time * 0.25;
  vec3 ro = vec3(sin(camT)*4.5, 1.8 + sin(camT*0.4)*0.8, cos(camT)*4.5);
  vec3 ta = vec3(0.0, 0.0, 0.0);

  vec3 fwd = normalize(ta - ro);
  vec3 rgt = normalize(cross(vec3(0,1,0), fwd));
  vec3 up  = cross(fwd, rgt);
  vec3 rd  = normalize(uv.x*rgt + uv.y*up + 2.0*fwd);

  float t = 0.001;
  bool hit = false;
  for (int i = 0; i < MAX_STEPS; i++) {
    float d = map(ro + rd*t);
    if (d < SURF_DIST) { hit = true; break; }
    if (t > MAX_DIST) break;
    t += d;
  }

  vec3 col = vec3(0.0);

  if (hit) {
    vec3 p = ro + rd*t;
    vec3 n = normal(p);

    vec3 L1 = normalize(vec3(1.5, 3.0, 2.0));
    vec3 L2 = normalize(vec3(-2.0, 1.5, -1.0));

    float diff1 = max(dot(n, L1), 0.0);
    float diff2 = max(dot(n, L2), 0.0) * 0.4;

    float sh = shadow(p + n*0.01, L1, 0.01, 10.0);

    vec3 ref = reflect(rd, n);
    float spec = pow(max(dot(ref, L1), 0.0), 32.0) * sh;

    float occ = ao(p, n);

    vec3 matCol = palette(t * 0.15 + u_time * 0.1);

    float rim = pow(1.0 - abs(dot(n, -rd)), 3.0);

    col  = matCol * (diff1 * sh * 0.9 + diff2 * 0.5 + 0.05);
    col += vec3(0.8, 0.9, 1.0) * spec * 0.6;
    col += vec3(0.2, 0.4, 0.8) * rim * 0.3;
    col *= occ;

    float fog = 1.0 - exp(-t * 0.06);
    col = mix(col, vec3(0.0, 0.0, 0.02), fog);
  } else {
    vec3 bg1 = vec3(0.0, 0.01, 0.04);
    vec3 bg2 = vec3(0.02, 0.0, 0.06);
    col = mix(bg1, bg2, uv.y*0.5+0.5);
    float stars = 0.0;
    for (int i = 0; i < 3; i++) {
      vec2 p2 = fract(uv * (15.0 + float(i)*8.0) + float(i)*1.7);
      float s = smoothstep(0.97, 1.0, 1.0 - length(p2 - 0.5));
      stars += s;
    }
    col += vec3(0.5, 0.6, 0.8) * stars * 0.3;
  }

  col = pow(max(col, 0.0), vec3(0.4545));

  float vig = 1.0 - 0.45 * dot(uv*0.7, uv*0.7);
  col *= vig;

  gl_FragColor = vec4(col, 1.0);
}
`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
  }
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, vert));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, frag));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'u_time');
const uRes  = gl.getUniformLocation(prog, 'u_res');

const start = performance.now();

function render() {
  const t = (performance.now() - start) / 1000;
  gl.uniform1f(uTime, t);
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}

render();

setTimeout(() => {
  try { localStorage.setItem('thumb_15', canvas.toDataURL()); } catch(e) {}
}, 2000);
</script>
<script>
window.SKETCH_META = {
  num:   '15',
  title: 'Raymarching',
  desc:  'GLSLシェーダーによるレイマーチング。距離関数（SDF）で定義した球や箱などのプリミティブを光線との交差判定だけでレンダリングする。ポリゴンを一切使わずにリアルタイム3Dシーンを構築できることを示している。'
};
</script>
<script src="../../js/sketch-ui.js"></script>
</body>
</html>
