<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>132 — Surface Tension</title>
  <meta name="description" content="水面に点を置いたら、互いに引き合いながら膜を作った。触れると張力が崩れる。">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #F5F3EE; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 4.5, 4.5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0xF5F3EE);
    document.body.appendChild(renderer.domElement);

    // 粒子（水面上に散在）
    const N = 36;
    const positions = [];
    const velocities = [];
    const baseY = [];

    for (let i = 0; i < N; i++) {
      const angle = (i / N) * Math.PI * 2;
      const r = 0.5 + Math.random() * 2.0;
      const x = Math.cos(angle) * r + (Math.random() - 0.5) * 0.5;
      const z = Math.sin(angle) * r + (Math.random() - 0.5) * 0.5;
      const y = (Math.random() - 0.5) * 0.1;
      positions.push(new THREE.Vector3(x, y, z));
      velocities.push(new THREE.Vector3(0, 0, 0));
      baseY.push(y);
    }

    // 接続線（距離が近い点どうしを繋ぐ）
    const MAX_DIST = 1.6;
    const lineMat = new THREE.LineBasicMaterial({
      color: 0x2A2826,
      transparent: true,
      opacity: 0.4,
      vertexColors: false,
    });

    // ラインセグメント（動的更新）
    const lineGeo = new THREE.BufferGeometry();
    const maxLines = N * N;
    const linePositions = new Float32Array(maxLines * 2 * 3);
    lineGeo.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
    lineGeo.setDrawRange(0, 0);
    const lineSegments = new THREE.LineSegments(lineGeo, lineMat);
    scene.add(lineSegments);

    // 点の表示（小さな球）
    const sphereGeo = new THREE.SphereGeometry(0.05, 6, 6);
    const sphereMat = new THREE.MeshBasicMaterial({ color: 0x2A2826 });
    const instancedMesh = new THREE.InstancedMesh(sphereGeo, sphereMat, N);
    scene.add(instancedMesh);

    // マウスのワールド座標（y=0平面上）
    const raycaster = new THREE.Raycaster();
    const mouseNDC = new THREE.Vector2();
    const planeMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide })
    );
    planeMesh.rotation.x = -Math.PI / 2;
    scene.add(planeMesh);

    let mouseWorld = new THREE.Vector3(999, 0, 999);
    let isMouseOver = false;

    window.addEventListener('mousemove', e => {
      mouseNDC.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouseNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouseNDC, camera);
      const hits = raycaster.intersectObject(planeMesh);
      if (hits.length > 0) {
        mouseWorld.copy(hits[0].point);
        isMouseOver = true;
      }
    });
    window.addEventListener('mouseleave', () => { isMouseOver = false; });

    const dummy = new THREE.Object3D();
    let time = 0;

    function animate() {
      requestAnimationFrame(animate);
      time += 0.008;

      // 各粒子の更新
      for (let i = 0; i < N; i++) {
        const pi = positions[i];
        const vi = velocities[i];

        // 表面張力シミュレーション
        let fx = 0, fz = 0;
        for (let j = 0; j < N; j++) {
          if (i === j) continue;
          const pj = positions[j];
          const dx = pi.x - pj.x;
          const dz = pi.z - pj.z;
          const dist = Math.sqrt(dx * dx + dz * dz);
          if (dist < 0.01) continue;

          // 引力（距離が離れると引き寄せる）と斥力（近すぎると押す）
          const restDist = 1.1;
          const diff = dist - restDist;
          const force = -diff * 0.015;
          fx += (dx / dist) * force;
          fz += (dz / dist) * force;
        }

        // マウス斥力
        if (isMouseOver) {
          const dx = pi.x - mouseWorld.x;
          const dz = pi.z - mouseWorld.z;
          const dist = Math.sqrt(dx * dx + dz * dz);
          if (dist < 1.5 && dist > 0.01) {
            const repel = 0.08 / (dist * dist);
            fx += (dx / dist) * repel;
            fz += (dz / dist) * repel;
          }
        }

        // ゆっくりした呼吸（Y方向の揺れ）
        const breathTarget = baseY[i] + 0.12 * Math.sin(time * 0.6 + i * 0.7);
        const fy = (breathTarget - pi.y) * 0.05;

        vi.x = (vi.x + fx) * 0.88;
        vi.z = (vi.z + fz) * 0.88;
        vi.y = (vi.y + fy) * 0.9;

        pi.x += vi.x;
        pi.y += vi.y;
        pi.z += vi.z;

        // 範囲制限（画面外に飛ばない）
        const maxR = 3.5;
        const rr = Math.sqrt(pi.x * pi.x + pi.z * pi.z);
        if (rr > maxR) {
          pi.x *= maxR / rr;
          pi.z *= maxR / rr;
          vi.x *= -0.3;
          vi.z *= -0.3;
        }
      }

      // 接続線の更新
      let lineIdx = 0;
      for (let i = 0; i < N; i++) {
        for (let j = i + 1; j < N; j++) {
          const dx = positions[i].x - positions[j].x;
          const dy = positions[i].y - positions[j].y;
          const dz = positions[i].z - positions[j].z;
          const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
          if (dist < MAX_DIST) {
            linePositions[lineIdx * 6 + 0] = positions[i].x;
            linePositions[lineIdx * 6 + 1] = positions[i].y;
            linePositions[lineIdx * 6 + 2] = positions[i].z;
            linePositions[lineIdx * 6 + 3] = positions[j].x;
            linePositions[lineIdx * 6 + 4] = positions[j].y;
            linePositions[lineIdx * 6 + 5] = positions[j].z;
            lineIdx++;
          }
        }
      }
      lineGeo.setDrawRange(0, lineIdx * 2);
      lineGeo.attributes.position.needsUpdate = true;

      // 点の位置更新
      for (let i = 0; i < N; i++) {
        dummy.position.copy(positions[i]);
        dummy.updateMatrix();
        instancedMesh.setMatrixAt(i, dummy.matrix);
      }
      instancedMesh.instanceMatrix.needsUpdate = true;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
  <script>
  window.SKETCH_META = {
    num:   '132',
    title: 'Surface Tension',
    desc:  '水面に点を置いたら、互いに引き合いながら膜を作った。触れると張力が崩れる。',
    detail: '36個の点が表面張力のルールで互いを引き寄せたり押し合ったりしている。近い点どうしが線で繋がり、水面のような膜を形成する。マウスを近づけると点が押しのけられ、張力が乱れる。'
  };
  </script>
  <script src="../../js/sketch-ui.js"></script>
</body>
</html>
