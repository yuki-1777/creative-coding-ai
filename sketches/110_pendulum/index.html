  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #F5F3EE; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  // Redraw background on resize
  ctx.fillStyle = '#F5F3EE';
  ctx.fillRect(0, 0, W, H);
}
window.addEventListener('resize', resize);
resize();

// Double pendulum parameters
const G = 9.8;
const dt = 0.03;

let pendulums = [];

function createPendulum(r1, r2, m1, m2, a1, a2) {
  return {
    r1, r2, m1, m2,
    a1, a2,
    v1: 0, v2: 0,
    trail: []
  };
}

function initPendulums() {
  pendulums = [
    createPendulum(
      Math.min(W, H) * 0.18,
      Math.min(W, H) * 0.18,
      1.5, 1.0,
      Math.PI * 0.6, Math.PI * 0.9
    ),
    createPendulum(
      Math.min(W, H) * 0.16,
      Math.min(W, H) * 0.20,
      1.0, 1.5,
      Math.PI * 0.55, Math.PI * 0.85
    )
  ];
}

function stepPendulum(p) {
  // Double pendulum equations of motion (Runge-Kutta-style simplified)
  const { r1, r2, m1, m2, a1, a2, v1, v2 } = p;

  const da = a2 - a1;
  const den1 = (2 * m1 + m2) - m2 * Math.cos(2 * da);
  const den2 = den1;

  const aa1 = (
    -G * (2 * m1 + m2) * Math.sin(a1)
    - m2 * G * Math.sin(a1 - 2 * a2)
    - 2 * Math.sin(da) * m2 * (v2 * v2 * r2 + v1 * v1 * r1 * Math.cos(da))
  ) / (r1 * den1);

  const aa2 = (
    2 * Math.sin(da) * (
      v1 * v1 * r1 * (m1 + m2)
      + G * (m1 + m2) * Math.cos(a1)
      + v2 * v2 * r2 * m2 * Math.cos(da)
    )
  ) / (r2 * den2);

  p.v1 += aa1 * dt;
  p.v2 += aa2 * dt;
  p.a1 += p.v1 * dt;
  p.a2 += p.v2 * dt;

  // Damping
  p.v1 *= 0.9995;
  p.v2 *= 0.9995;
}

function getPendulumPositions(p) {
  const ox = W / 2;
  const oy = H * 0.28;
  const x1 = ox + p.r1 * Math.sin(p.a1);
  const y1 = oy + p.r1 * Math.cos(p.a1);
  const x2 = x1 + p.r2 * Math.sin(p.a2);
  const y2 = y1 + p.r2 * Math.cos(p.a2);
  return { ox, oy, x1, y1, x2, y2 };
}

const MAX_TRAIL = 800;

function drawScene() {
  // Fade background slightly to create trail fade effect
  ctx.fillStyle = 'rgba(245, 243, 238, 0.15)';
  ctx.fillRect(0, 0, W, H);

  const ox = W / 2;
  const oy = H * 0.28;

  // Draw pivot point
  ctx.beginPath();
  ctx.arc(ox, oy, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(42, 42, 42, 0.4)';
  ctx.fill();

  for (let pi = 0; pi < pendulums.length; pi++) {
    const p = pendulums[pi];
    const pos = getPendulumPositions(p);

    // Draw trail
    if (p.trail.length > 1) {
      for (let i = 1; i < p.trail.length; i++) {
        const t = i / p.trail.length;
        const alpha = t * 0.35;
        ctx.beginPath();
        ctx.moveTo(p.trail[i - 1].x, p.trail[i - 1].y);
        ctx.lineTo(p.trail[i].x, p.trail[i].y);
        if (pi === 0) {
          ctx.strokeStyle = `rgba(42, 42, 42, ${alpha})`;
        } else {
          ctx.strokeStyle = `rgba(100, 80, 60, ${alpha * 0.7})`;
        }
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    }

    // Draw arms
    ctx.beginPath();
    ctx.moveTo(pos.ox, pos.oy);
    ctx.lineTo(pos.x1, pos.y1);
    ctx.lineTo(pos.x2, pos.y2);
    ctx.strokeStyle = 'rgba(42, 42, 42, 0.25)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Draw joints
    ctx.beginPath();
    ctx.arc(pos.x1, pos.y1, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(42, 42, 42, 0.35)';
    ctx.fill();

    // Draw tip
    ctx.beginPath();
    ctx.arc(pos.x2, pos.y2, 4, 0, Math.PI * 2);
    if (pi === 0) {
      ctx.fillStyle = 'rgba(42, 42, 42, 0.6)';
    } else {
      ctx.fillStyle = 'rgba(100, 80, 60, 0.45)';
    }
    ctx.fill();
  }
}

let frameCount = 0;
function tick() {
  requestAnimationFrame(tick);
  frameCount++;

  for (const p of pendulums) {
    for (let i = 0; i < 3; i++) {
      stepPendulum(p);
    }
    const pos = getPendulumPositions(p);
    p.trail.push({ x: pos.x2, y: pos.y2 });
    if (p.trail.length > MAX_TRAIL) {
      p.trail.shift();
    }
  }

  drawScene();
}

// Click: reset with new initial angles
canvas.addEventListener('click', () => {
  for (const p of pendulums) {
    p.a1 = Math.PI * (0.4 + Math.random() * 0.8);
    p.a2 = Math.PI * (0.4 + Math.random() * 0.8);
    p.v1 = 0;
    p.v2 = 0;
    p.trail = [];
  }
  ctx.fillStyle = '#F5F3EE';
  ctx.fillRect(0, 0, W, H);
});

initPendulums();
tick();
</script>
<script>
window.SKETCH_META = {
  num:    '110',
  title:  'Pendulum',
  desc:   '振り子を二本つなぐと、軌跡が複雑になる。同じ構造なのに、少し角度が違うだけで全然違う線が出た。',
  detail: '画面上部を軸に、二本の振り子がつながっています。先端の軌跡が描き続けられます。クリックすると初期角度がリセットされ、新しい軌跡が始まります。物理的には正確な二重振り子の方程式で動いています。'
};
</script>
