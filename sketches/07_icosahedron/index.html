<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Icosahedron</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 4);

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

const geo = new THREE.IcosahedronGeometry(1.5, 1);
const wireMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true });
const wire = new THREE.Mesh(geo, wireMat);
scene.add(wire);

const solidMat = new THREE.MeshPhongMaterial({
  color: 0x001122,
  emissive: 0x002244,
  transparent: true,
  opacity: 0.6,
  side: THREE.BackSide,
});
const solid = new THREE.Mesh(geo, solidMat);
solid.scale.setScalar(0.98);
scene.add(solid);

const glowGeo = new THREE.IcosahedronGeometry(1.5, 1);
const glowMat = new THREE.MeshBasicMaterial({
  color: 0x00ffcc,
  wireframe: true,
  transparent: true,
  opacity: 0.15,
});
const glow = new THREE.Mesh(glowGeo, glowMat);
glow.scale.setScalar(1.05);
scene.add(glow);

const light1 = new THREE.PointLight(0x00ffcc, 3, 10);
light1.position.set(3, 3, 3);
scene.add(light1);
const light2 = new THREE.PointLight(0xff00aa, 2, 10);
light2.position.set(-3, -2, -3);
scene.add(light2);
scene.add(new THREE.AmbientLight(0x111133, 1));

const particleCount = 400;
const pPositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  const phi = Math.acos(2 * Math.random() - 1);
  const theta = 2 * Math.PI * Math.random();
  const r = 2.5 + Math.random() * 1.5;
  pPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
  pPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  pPositions[i * 3 + 2] = r * Math.cos(phi);
}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0x88eedd, size: 0.02 }));
scene.add(particles);

let frameCount = 0;
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  wire.rotation.x = t * 0.3;
  wire.rotation.y = t * 0.4;
  solid.rotation.copy(wire.rotation);
  glow.rotation.copy(wire.rotation);
  particles.rotation.y = t * 0.05;

  const pulse = 0.5 + 0.5 * Math.sin(t * 2);
  wireMat.opacity = 0.6 + 0.4 * pulse;
  glowMat.opacity = 0.1 + 0.15 * pulse;
  light1.intensity = 2 + 2 * pulse;

  controls.update();
  renderer.render(scene, camera);

  frameCount++;
  if (frameCount === 60) {
    try {
      renderer.render(scene, camera);
      localStorage.setItem('thumb_07', renderer.domElement.toDataURL());
    } catch (e) {}
  }
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

animate();
</script>
<script>
window.SKETCH_META = {
  num:   '07',
  title: 'Icosahedron',
  desc:  '正二十面体をベースにした3Dオブジェクト。Perlinノイズで頂点を変位させ、有機的に脈打つ形状を生成している。ワイヤーフレームとサーフェスを重ねることで内部構造の透過感を表現。'
};
</script>
<script src="../../js/sketch-ui.js"></script>
</body>
</html>
