<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
const G = 0.0004;
const MAX_TRAIL = 800;

let pivotX, pivotY, length;
let angle, angleVel, angleDamping;
let trail = [];

function resetPendulum(initAngle) {
  pivotX = width / 2;
  pivotY = height * 0.22;
  length = min(width, height) * 0.42;
  angle = initAngle !== undefined ? initAngle : (PI / 4 + random(0.4));
  angleVel = 0;
  angleDamping = 0.9992;
  trail = [];
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  resetPendulum();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  resetPendulum();
}

function mousePressed() {
  const dx = mouseX - pivotX;
  const dy = mouseY - pivotY;
  const clickAngle = atan2(dx, -dy) * 0.8;
  resetPendulum(constrain(clickAngle + random(-0.15, 0.15), -PI * 0.6, PI * 0.6));
}

function touchStarted() {
  const dx = touches[0].x - pivotX;
  const dy = touches[0].y - pivotY;
  const clickAngle = atan2(dx, -dy) * 0.8;
  resetPendulum(constrain(clickAngle, -PI * 0.6, PI * 0.6));
  return false;
}

function draw() {
  // Physics
  const accel = -G * sin(angle) * length * 0.3;
  angleVel += accel;
  angleVel *= angleDamping;
  angle += angleVel;

  const bobX = pivotX + sin(angle) * length;
  const bobY = pivotY + cos(angle) * length;

  if (trail.length === 0 || dist(bobX, bobY, trail[trail.length - 1].x, trail[trail.length - 1].y) > 1.5) {
    trail.push({ x: bobX, y: bobY });
    if (trail.length > MAX_TRAIL) trail.shift();
  }

  background('#F5F3EE');

  // Pivot dot
  noStroke();
  fill(42, 42, 42, 89);
  ellipse(pivotX, pivotY, 5);

  // Trail
  if (trail.length > 2) {
    noFill();
    for (let i = 1; i < trail.length; i++) {
      const ratio = i / trail.length;
      stroke(42, 42, 42, ratio * 0.35 * 255);
      strokeWeight(0.7);
      line(trail[i - 1].x, trail[i - 1].y, trail[i].x, trail[i].y);
    }
  }

  // Rod
  stroke(42, 42, 42, 51);
  strokeWeight(0.8);
  line(pivotX, pivotY, bobX, bobY);

  // Bob
  const speed = abs(angleVel);
  const bobR = constrain(4 + speed * 80, 4, 7);
  noStroke();
  fill(42, 42, 42, 153);
  ellipse(bobX, bobY, bobR * 2);

  // Settled hint
  if (abs(angleVel) < 0.0003 && trail.length > 10) {
    noStroke();
    fill(42, 42, 42, 31);
    textFont('monospace');
    textSize(12);
    textAlign(CENTER, CENTER);
    text('click to start again', width / 2, height * 0.85);
  }
}
</script>
