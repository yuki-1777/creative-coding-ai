<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canopy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f4f0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setClearColor(0xf5f4f0);

  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 100);
  camera.position.set(0, 0, 5);

  let W = window.innerWidth, H = window.innerHeight;
  renderer.setSize(W, H);
  const aspect = W / H;
  camera.left = -aspect; camera.right = aspect;
  camera.updateProjectionMatrix();

  // Looking up through forest canopy: overlapping ellipses at different depths
  // Deeper = smaller, more transparent
  const N_TREES = 22;
  const ellipses = [];

  const segs = 48;

  for (let i = 0; i < N_TREES; i++) {
    const depth = Math.random(); // 0=close, 1=far
    const cx = (Math.random() - 0.5) * 1.8 * aspect;
    const cy = (Math.random() - 0.5) * 1.6;
    const rx = 0.05 + (1 - depth) * 0.25 + Math.random() * 0.15;
    const ry = rx * (0.55 + Math.random() * 0.3);
    const phase = Math.random() * Math.PI * 2;
    const speed = 0.3 + Math.random() * 0.5;

    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array((segs + 1) * 3);
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

    const opacity = 0.15 + (1 - depth) * 0.5;
    const col = depth < 0.4 ? 0x555550 : 0x999990;
    const mat = new THREE.LineBasicMaterial({ color: col, transparent: true, opacity });
    const loop = new THREE.LineLoop(geo, mat);
    scene.add(loop);

    ellipses.push({ loop, geo, pos, cx, cy, rx, ry, phase, speed, depth });
  }

  // Branches: simple forking lines (kept within screen bounds)
  const branchMat = new THREE.LineBasicMaterial({ color: 0x777770, transparent: true, opacity: 0.45 });
  const branchData = [
    { bx: -0.6, by: -0.78 }, { bx: 0.0, by: -0.82 }, { bx: 0.5, by: -0.75 },
    { bx: -0.3, by: -0.70 }, { bx: 0.25, by: -0.72 }, { bx: -0.7, by: -0.65 }
  ];
  branchData.forEach(({ bx, by }) => {
    const len = 0.22 + Math.random() * 0.14;
    const angle = Math.PI * 0.5 + (Math.random() - 0.5) * 0.5;
    const tipX = bx + Math.cos(angle) * len;
    const tipY = by + Math.sin(angle) * len;
    const forkX = bx + Math.cos(angle) * len * 0.6;
    const forkY = by + Math.sin(angle) * len * 0.6;

    const pts = [
      new THREE.Vector3(bx, by, 0), new THREE.Vector3(tipX, tipY, 0),
      new THREE.Vector3(forkX, forkY, 0),
      new THREE.Vector3(forkX + Math.cos(angle + 0.5) * len * 0.4, forkY + Math.sin(angle + 0.5) * len * 0.4, 0),
      new THREE.Vector3(forkX, forkY, 0),
      new THREE.Vector3(forkX + Math.cos(angle - 0.5) * len * 0.4, forkY + Math.sin(angle - 0.5) * len * 0.4, 0)
    ];
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    scene.add(new THREE.LineSegments(geo, branchMat));
  });

  function update(t) {
    ellipses.forEach(e => {
      const sway = Math.sin(t * e.speed + e.phase) * 0.015 * (1 - e.depth);
      for (let s = 0; s <= segs; s++) {
        const angle = (s / segs) * Math.PI * 2;
        e.pos[s * 3] = e.cx + Math.cos(angle) * (e.rx + sway);
        e.pos[s * 3 + 1] = e.cy + Math.sin(angle) * e.ry;
        e.pos[s * 3 + 2] = 0;
      }
      e.geo.attributes.position.needsUpdate = true;
    });
  }

  let t = 0;
  function animate() {
    requestAnimationFrame(animate);
    t += 0.016;
    update(t);
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    W = window.innerWidth; H = window.innerHeight;
    renderer.setSize(W, H);
    const aspect = W / H;
    camera.left = -aspect; camera.right = aspect;
    camera.updateProjectionMatrix();
  });
</script>
<script>
window.SKETCH_META = {
  num:    '197',
  title:  'Canopy',
  detail: '森の中で空を見上げた視点です。22個の楕円が重なり合って樹冠を表しています。遠い木ほど小さく薄く、近い木ほど大きく濃く見えます。風で葉が揺れるように、楕円がゆっくり膨らんだり縮んだりします。'
};
</script>
<script src="../../js/sketch-ui.js"></script>
</body>
</html>
