    body { overflow: hidden; background: #F5F3EE; }

<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
const SPEED = 2.0;
const TURN_MIN = 0.0002;
const TURN_MAX = 0.05;
const MAX_POINTS = 6000;

let wx, wy, wangle;
let allPoints = [];

function resetWander() {
  wx = random(width * 0.3, width * 0.7);
  wy = random(height * 0.3, height * 0.7);
  wangle = random(TWO_PI);
  allPoints = [{ x: wx, y: wy }];
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  resetWander();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  resetWander();
}

function updateWander() {
  let turnDelta;
  if (random() < 0.008) {
    turnDelta = TURN_MAX * (1 + random(2));
  } else {
    turnDelta = TURN_MIN + random() * (TURN_MAX - TURN_MIN) * 0.15;
  }
  wangle += turnDelta;

  wx += cos(wangle) * SPEED;
  wy += sin(wangle) * SPEED;

  // Torus wrap
  if (wx < 0) wx += width;
  if (wx > width) wx -= width;
  if (wy < 0) wy += height;
  if (wy > height) wy -= height;

  const last = allPoints[allPoints.length - 1];
  const dx = wx - last.x;
  const dy = wy - last.y;
  if (abs(dx) > width * 0.5 || abs(dy) > height * 0.5) {
    allPoints.push(null); // wrap break marker
  }
  allPoints.push({ x: wx, y: wy });

  if (allPoints.length > MAX_POINTS) {
    allPoints.splice(0, 200);
  }
}

function drawPath() {
  const n = allPoints.length;
  if (n < 2) return;

  strokeWeight(0.7);
  strokeCap(ROUND);
  strokeJoin(ROUND);

  let segStart = 0;
  for (let i = 1; i <= n; i++) {
    const pt = allPoints[i];
    if (pt === null || pt === undefined) {
      drawSegment(segStart, i - 1, n);
      segStart = i + 1;
    }
  }
  if (segStart < n - 1) drawSegment(segStart, n - 1, n);
}

function drawSegment(from, to, total) {
  if (to - from < 2) return;
  noFill();
  beginShape();
  for (let i = from; i <= to; i++) {
    if (!allPoints[i]) break;
    vertex(allPoints[i].x, allPoints[i].y);
  }
  const ratio = to / total;
  const alpha = (0.06 + (0.45 - 0.06) * ratio) * 255;
  stroke(42, 42, 42, alpha);
  strokeWeight(0.7 + ratio * 0.5);
  endShape();
}

function draw() {
  // 3 steps per frame for faster coverage
  for (let i = 0; i < 3; i++) updateWander();

  background('#F5F3EE');
  drawPath();

  // Head dot
  noStroke();
  fill(42, 42, 42, 179);
  ellipse(wx, wy, 5);
}
</script>
