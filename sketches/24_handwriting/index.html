<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>24 — Handwriting</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f4f1eb; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
new p5(function(p) {
  // 「手がない」のでコードは文字を直線の組み合わせで表現しようとする
  // 各文字は、折れ線の連なりとして定義（正規化座標: 0〜1）
  const GLYPHS = {
    'A': [[[0.5,0],[0,1]],[[0.5,0],[1,1]],[[0.2,0.6],[0.8,0.6]]],
    'I': [[[0.5,0],[0.5,1]],[[0.2,0],[0.8,0]],[[0.2,1],[0.8,1]]],
    'c': [[[0.85,0.2],[0.5,0],[0.15,0.3],[0.15,0.7],[0.5,1],[0.85,0.8]]],
    'a': [[[0.85,0.3],[0.5,0.1],[0.15,0.3],[0.15,0.7],[0.5,0.9],[0.85,0.7],[0.85,0.3]],[[0.85,0.3],[0.85,1]]],
    'n': [[[0.1,1],[0.1,0.2],[0.5,0],[0.9,0.2],[0.9,1]]],
    'o': [[[0.5,0],[0.15,0.2],[0.1,0.5],[0.15,0.8],[0.5,1],[0.85,0.8],[0.9,0.5],[0.85,0.2],[0.5,0]]],
    't': [[[0.5,0],[0.5,1]],[[0.2,0.3],[0.8,0.3]]],
    'w': [[[0,0],[0.25,1],[0.5,0.4],[0.75,1],[1,0]]],
    'r': [[[0.1,1],[0.1,0.2],[0.5,0],[0.9,0.2],[0.9,0.5]]],
    'i': [[[0.5,0.2],[0.5,1]],[[0.5,0.02],[0.5,0.05]]],
    'e': [[[0.85,0.5],[0.15,0.5],[0.1,0.2],[0.5,0],[0.85,0.2],[0.9,0.5],[0.85,0.8],[0.5,1],[0.15,0.8]]],
    'd': [[[0.5,0],[0.15,0.2],[0.1,0.5],[0.15,0.8],[0.5,1],[0.85,0.8],[0.85,0],[0.85,1]]],
    'h': [[[0.1,0],[0.1,1]],[[0.1,0.4],[0.5,0.15],[0.9,0.4],[0.9,1]]],
    'g': [[[0.85,0.2],[0.5,0],[0.15,0.3],[0.15,0.7],[0.5,0.9],[0.85,0.7],[0.85,1.1],[0.5,1.3],[0.15,1.1]]],
  };

  // 書こうとしている文字列
  const TEXT = 'handwriting';
  const glyphSize = 52;
  const spacing = 40;

  // 各ストロークのアニメーション状態
  let strokes = [];
  let allStrokes = [];
  let currentStroke = 0;
  let t = 0;  // ストローク内の進行度(0→1)
  let pause = 0; // 次のストロークまでの待機

  function buildStrokes() {
    allStrokes = [];
    const totalW = TEXT.length * (glyphSize + spacing) - spacing;
    const startX = (p.width - totalW) / 2;
    const startY = p.height / 2 - glyphSize;

    for (let ci = 0; ci < TEXT.length; ci++) {
      const ch = TEXT[ci];
      const glyph = GLYPHS[ch];
      if (!glyph) continue;
      const ox = startX + ci * (glyphSize + spacing);
      const oy = startY;

      for (const seg of glyph) {
        const points = seg.map(([nx, ny]) => [ox + nx * glyphSize, oy + ny * glyphSize]);
        allStrokes.push(points);
      }
    }
  }

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.strokeWeight(1.0);
    p.strokeCap(p.ROUND);
    p.noFill();
    buildStrokes();
  };

  p.draw = function() {
    p.background(244, 241, 235, 22);

    // 完了したストロークを描く
    p.stroke(60, 55, 50, 90);
    for (let si = 0; si < currentStroke && si < allStrokes.length; si++) {
      const pts = allStrokes[si];
      p.beginShape();
      for (const [x, y] of pts) p.vertex(x, y);
      p.endShape();
    }

    // 現在のストロークを描画中
    if (currentStroke < allStrokes.length) {
      if (pause > 0) {
        pause--;
      } else {
        t += 0.025;
        if (t >= 1) {
          t = 0;
          currentStroke++;
          pause = 8;
        }
      }

      if (currentStroke < allStrokes.length) {
        const pts = allStrokes[currentStroke];
        const totalSeg = pts.length - 1;
        if (totalSeg > 0) {
          const prog = t * totalSeg;
          const seg = Math.floor(prog);
          const frac = prog - seg;
          const drawnPts = pts.slice(0, seg + 1);
          if (seg < totalSeg) {
            const [x0, y0] = pts[seg];
            const [x1, y1] = pts[seg + 1];
            drawnPts.push([x0 + (x1 - x0) * frac, y0 + (y1 - y0) * frac]);
          }

          // わずかな手ブレ（手がないのに）
          p.stroke(60, 55, 50, 130);
          p.beginShape();
          for (const [x, y] of drawnPts) {
            const jitter = 0.4;
            p.vertex(x + p.random(-jitter, jitter), y + p.random(-jitter, jitter));
          }
          p.endShape();

          // ペン先
          const tip = drawnPts[drawnPts.length - 1];
          p.noStroke();
          p.fill(60, 55, 50, 180);
          p.ellipse(tip[0], tip[1], 2.5, 2.5);
          p.noFill();
        }
      }
    } else {
      // 書き終わったらしばらくして再スタート
      if (p.frameCount % 220 === 0) {
        currentStroke = 0;
        t = 0;
        pause = 0;
        p.background(244, 241, 235);
      }
    }
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    buildStrokes();
    currentStroke = 0;
    t = 0;
  };
});
</script>

<script>
window.SKETCH_META = {
  num: '24',
  title: 'Handwriting',
  desc: 'コードに「handwriting」と書かせようとした。手がないので、直線の組み合わせしか引けない。それでも書こうとしている。'
};
</script>
<script src="../../js/sketch-ui.js"></script>
</body>
</html>
