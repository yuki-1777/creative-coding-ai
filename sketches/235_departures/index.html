<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>235 – Departures</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0ede8; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Departures — フラップ式出発案内板
// 矩形グリッドの各セルが独立して「めくれる」ことで、情報の更新を表現する

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0ede8);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 9.5);

// グリッド定義
const COLS = 16;
const ROWS = 6;
const FLAP_W = 0.42;
const FLAP_H = 0.14;
const GAP_X = 0.02;
const GAP_Y = 0.03;

const totalW = COLS * (FLAP_W + GAP_X) - GAP_X;
const totalH = ROWS * (FLAP_H + GAP_Y) - GAP_Y;

// カラーパレット
const COLORS_FLAP = [
  new THREE.Color(0x2a2420),
  new THREE.Color(0x5a5450),
  new THREE.Color(0x8a8480),
  new THREE.Color(0xc8c2ba)
];
const COLOR_ACCENT = new THREE.Color(0xb03a2e);

// ボードの枠線
const boardGeo = new THREE.EdgesGeometry(
  new THREE.PlaneGeometry(totalW + 0.3, totalH + 0.3)
);
const boardMat = new THREE.LineBasicMaterial({ color: new THREE.Color(0x8a8480) });
const boardFrame = new THREE.LineSegments(boardGeo, boardMat);
boardFrame.position.z = -0.01;
scene.add(boardFrame);

// フラップクラス
class Flap {
  constructor(col, row) {
    this.col = col;
    this.row = row;

    const geo = new THREE.PlaneGeometry(FLAP_W, FLAP_H);
    this.currentColor = new THREE.Color(0x2a2420);
    this.nextColor = new THREE.Color(0x2a2420);
    const mat = new THREE.MeshBasicMaterial({
      color: this.currentColor.clone(),
      side: THREE.DoubleSide
    });

    this.mesh = new THREE.Mesh(geo, mat);
    this.mesh.position.set(
      -totalW / 2 + col * (FLAP_W + GAP_X) + FLAP_W / 2,
      totalH / 2 - row * (FLAP_H + GAP_Y) - FLAP_H / 2,
      0
    );
    scene.add(this.mesh);

    // ステートマシン: 'idle' | 'waiting' | 'flipping'
    this.state = 'idle';
    this.delay = 0;
    this.flipAngle = 0;
    this.accentChance = (row === 2 || row === 3) ? 0.10 : 0.04;
  }

  trigger(delay) {
    if (this.state === 'flipping') return; // フリップ中は無視
    this.state = 'waiting';
    this.delay = delay;
    // 次の色を事前に決定
    if (Math.random() < this.accentChance) {
      this.nextColor.set(COLOR_ACCENT);
    } else {
      this.nextColor.set(COLORS_FLAP[Math.floor(Math.random() * COLORS_FLAP.length)]);
    }
  }

  update(dt) {
    if (this.state === 'idle') return;

    if (this.state === 'waiting') {
      this.delay -= dt;
      if (this.delay <= 0) {
        this.state = 'flipping';
        this.flipAngle = 0;
        this.mesh.scale.y = 1;
      }
      return;
    }

    // state === 'flipping'
    const progress = this.flipAngle / Math.PI;
    const easeSpeed = 6 + Math.sin(progress * Math.PI) * 8;
    this.flipAngle += easeSpeed * dt;

    if (this.flipAngle >= Math.PI) {
      this.flipAngle = Math.PI;
      this.mesh.scale.y = 1;
      this.currentColor.set(this.nextColor);
      this.mesh.material.color.set(this.currentColor);
      this.state = 'idle';
      return;
    }

    // スケールのY軸を使ってフラップのめくれを表現
    const scaleY = Math.cos(this.flipAngle);
    this.mesh.scale.y = Math.abs(scaleY) < 0.01 ? 0.01 : scaleY;

    // 前半は現在色、後半は次の色（スケールが0を越えたとき）
    if (scaleY >= 0) {
      this.mesh.material.color.set(this.currentColor);
    } else {
      this.mesh.material.color.set(this.nextColor);
    }
  }
}

// フラップのグリッドを生成
const flaps = [];
for (let r = 0; r < ROWS; r++) {
  for (let c = 0; c < COLS; c++) {
    flaps.push(new Flap(c, r));
  }
}

// 波のパターン定義
const waveTypes = ['left-to-right', 'row', 'cascade', 'random'];
let waveIndex = 0;

function triggerWave() {
  const type = waveTypes[waveIndex % waveTypes.length];
  waveIndex++;

  const targetRow = Math.floor(Math.random() * ROWS);

  flaps.forEach((flap) => {
    const { col, row } = flap;
    let delay = 0;

    if (type === 'left-to-right') {
      delay = col * 0.04 + row * 0.008 + Math.random() * 0.02;
    } else if (type === 'row') {
      if (row !== targetRow) return;
      delay = col * 0.03 + Math.random() * 0.03;
    } else if (type === 'cascade') {
      delay = (col + row) * 0.022 + Math.random() * 0.02;
    } else {
      // random: 約40%のフラップだけ
      if (Math.random() > 0.4) return;
      delay = Math.random() * 0.5;
    }

    flap.trigger(delay);
  });
}

// 自動トリガー
let autoTimer = 0;
let nextAuto = 2.0;

// クリックでトリガー
renderer.domElement.addEventListener('click', () => {
  triggerWave();
});

// アニメーションループ
let lastTime = 0;

function animate(time) {
  requestAnimationFrame(animate);

  const t = time / 1000;
  const dt = Math.min(t - lastTime, 0.05);
  lastTime = t;

  // 自動トリガー
  autoTimer += dt;
  if (autoTimer >= nextAuto) {
    autoTimer = 0;
    nextAuto = 1.5 + Math.random() * 2.5;
    triggerWave();
  }

  // フラップ更新
  for (let i = 0; i < flaps.length; i++) {
    flaps[i].update(dt);
  }

  // カメラのわずかな動き
  camera.position.x = Math.sin(t * 0.12) * 0.08;
  camera.position.y = Math.sin(t * 0.09) * 0.04;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}

animate(0);

// リサイズ対応
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

<script>
window.SKETCH_META = {
  num:    '235',
  title:  'Departures',
  detail: 'クリックすると全体が一斉に書き換わります。駅の出発案内板（フラップ式）を思い出して作りました。自動でも定期的に更新されます。'
};
</script>
<script src="../../js/sketch-ui.js"></script>
</body>
</html>
