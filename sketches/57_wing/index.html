<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.5, 7);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0xF5F3EE);
    document.body.appendChild(renderer.domElement);

    // NACA 4412 翼型の近似（正規化された断面）
    function nacaProfile(t, m, p, thick) {
      // t: 0→1 (上面), 1→2 (下面に折り返し)
      let x, yt, yc, dycdx;
      if (t <= 1) {
        x = t;
      } else {
        x = 2 - t;
      }
      // 翼厚分布
      yt = thick / 0.2 * (0.2969 * Math.sqrt(x) - 0.126 * x - 0.3516 * x*x + 0.2843 * x*x*x - 0.1015 * x*x*x*x);
      // キャンバーライン
      if (x < p) {
        yc = m / (p*p) * (2*p*x - x*x);
        dycdx = 2*m / (p*p) * (p - x);
      } else {
        yc = m / ((1-p)*(1-p)) * (1 - 2*p + 2*p*x - x*x);
        dycdx = 2*m / ((1-p)*(1-p)) * (p - x);
      }
      const theta = Math.atan(dycdx);
      let px, py;
      if (t <= 1) {
        px = x - yt * Math.sin(theta);
        py = yc + yt * Math.cos(theta);
      } else {
        px = x + yt * Math.sin(theta);
        py = yc - yt * Math.cos(theta);
      }
      return { x: px - 0.5, y: py }; // 中心を0に
    }

    const NUM_SECTIONS = 20; // 断面の枚数
    const PROFILE_STEPS = 60;
    const wingGroup = new THREE.Group();
    scene.add(wingGroup);

    for (let si = 0; si < NUM_SECTIONS; si++) {
      const spanPos = (si / (NUM_SECTIONS - 1) - 0.5) * 3; // -1.5 〜 1.5
      const chord = 1.0 - Math.abs(spanPos / 1.5) * 0.4; // 翼端細く
      const twist = -spanPos * 0.08; // 翼端ひねり

      const pts = [];
      for (let i = 0; i <= PROFILE_STEPS; i++) {
        const t = i / PROFILE_STEPS * 2; // 0→2
        const { x, y } = nacaProfile(t, 0.04, 0.4, 0.12);
        const rx = x * chord;
        const ry = (y * chord) * Math.cos(twist) - 0 * Math.sin(twist);
        const rz = (y * chord) * Math.sin(twist) + 0 * Math.cos(twist);
        pts.push(new THREE.Vector3(rx, ry, rz));
      }
      pts.push(pts[0].clone()); // 閉じる

      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      const isAccent = si === Math.floor(NUM_SECTIONS / 2); // 中心断面だけアクセント
      const mat = new THREE.LineBasicMaterial({
        color: isAccent ? 0x8A7055 : 0x2A2826,
        transparent: true,
        opacity: isAccent ? 0.65 : 0.35,
      });
      const line = new THREE.Line(geo, mat);
      line.position.z = spanPos;

      wingGroup.add(line);
    }

    // スパン方向の線（前縁・後縁）
    const lePoints = [];
    const tePoints = [];
    for (let si = 0; si < NUM_SECTIONS; si++) {
      const spanPos = (si / (NUM_SECTIONS - 1) - 0.5) * 3;
      const chord = 1.0 - Math.abs(spanPos / 1.5) * 0.4;
      lePoints.push(new THREE.Vector3(-0.5 * chord, 0, spanPos)); // 前縁
      tePoints.push(new THREE.Vector3(0.5 * chord, 0, spanPos)); // 後縁
    }
    const leGeo = new THREE.BufferGeometry().setFromPoints(lePoints);
    const teGeo = new THREE.BufferGeometry().setFromPoints(tePoints);
    const edgeMat = new THREE.LineBasicMaterial({ color: 0x2A2826, transparent: true, opacity: 0.5 });
    wingGroup.add(new THREE.Line(leGeo, edgeMat));
    wingGroup.add(new THREE.Line(teGeo, edgeMat.clone()));

    // マウス
    const mouse = new THREE.Vector2(0, 0);
    window.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
      mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
    });

    // 流線（翼の後ろに流れる空気の跡）
    const NUM_STREAMLINES = 8;
    const STREAM_LEN = 30;
    const streamGroup = new THREE.Group();
    scene.add(streamGroup);
    const streamLines = [];

    for (let si = 0; si < NUM_STREAMLINES; si++) {
      const pts = Array.from({ length: STREAM_LEN }, () => new THREE.Vector3());
      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      const mat = new THREE.LineBasicMaterial({
        color: 0x2A2826,
        transparent: true,
        opacity: 0.12,
      });
      const line = new THREE.Line(geo, mat);
      streamGroup.add(line);
      streamLines.push({
        geo, pts,
        startY: -0.3 + (si / (NUM_STREAMLINES - 1)) * 0.6,
        phase: (si / NUM_STREAMLINES) * Math.PI * 2,
      });
    }

    let time = 0;
    let currentAoA = 0; // 現在の迎角

    function animate() {
      requestAnimationFrame(animate);
      time += 0.005;

      // マウスYで迎角をリアルタイム制御（-20〜+20度）
      const targetAoA = mouse.y * 0.35;
      currentAoA += (targetAoA - currentAoA) * 0.05;

      wingGroup.rotation.z = currentAoA;
      wingGroup.rotation.y = mouse.x * 0.5;
      wingGroup.rotation.x = 0.15;

      // 流線（翼後方に漂う空気の流れ感）
      streamLines.forEach(sl => {
        const pos = sl.geo.attributes.position;
        for (let i = 0; i < STREAM_LEN; i++) {
          const t = i / STREAM_LEN;
          const x = 0.5 + t * 2.5; // 翼後方から右へ
          const deflect = Math.sin(time * 1.2 + sl.phase + t * 3) * 0.04 * (1 - t);
          // 迎角に応じて流線が曲がる
          const wakeDeflect = currentAoA * t * 0.3;
          const y = sl.startY + deflect + wakeDeflect;
          const z = (Math.random() - 0.5) * 0.001; // ほぼ平坦
          pos.setXYZ(i, x, y, 0);
        }
        pos.needsUpdate = true;
        sl.geo.computeBoundingSphere();
      });

      // 流線は翼と同じ回転を共有
      streamGroup.rotation.copy(wingGroup.rotation);

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
  <script>
  window.SKETCH_META = {
    num:   '57',
    title: 'Wing',
    desc:  '翼型断面を20枚並べた。マウスで迎角を変えると、後ろに流れが現れる。風は見えないはずなのに。',
    detail: '飛行機の翼断面（NACA翼型）を20枚並べた3D翼を表示している。マウスを縦に動かすと翼の傾き（迎角）が変わり、翼の後ろに空気の流れを示す薄い線が現れる。傾けるほど流れが大きくたわむ。マウスを横に動かすと翼を横から正面からと角度を変えて眺められる。'
  };
  </script>

</body>
