<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 7);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0xF5F3EE);
    document.body.appendChild(renderer.domElement);

    // 閉じたループ曲線の制御点数
    const SEGMENTS = 180;
    const HARMONICS = 5; // 重ね合わせる周波数の数

    // 各高調波の振幅・位相・速度をランダム初期化
    const amplitudes = [];
    const phases = [];
    const speeds = [];

    for (let h = 0; h < HARMONICS; h++) {
      amplitudes.push({
        x: (0.8 + Math.random() * 0.6) / (h + 1),
        y: (0.8 + Math.random() * 0.6) / (h + 1),
      });
      phases.push({
        x: Math.random() * Math.PI * 2,
        y: Math.random() * Math.PI * 2,
      });
      speeds.push({
        x: (0.3 + Math.random() * 0.4) * (Math.random() < 0.5 ? 1 : -1) / (h + 1),
        y: (0.3 + Math.random() * 0.4) * (Math.random() < 0.5 ? 1 : -1) / (h + 1),
      });
    }

    // ジオメトリ（点を事前確保）
    const verts = new Float32Array((SEGMENTS + 1) * 3);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));

    const mat = new THREE.LineBasicMaterial({
      color: 0x2A2826,
      linewidth: 1,
    });
    const line = new THREE.Line(geo, mat);
    scene.add(line);

    // マウスで速度に変化を与える
    const mouse = new THREE.Vector2(0, 0);
    window.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
      mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
    });

    let time = 0;
    const posAttr = geo.attributes.position;

    function getPoint(t, time) {
      let x = 0;
      let y = 0;
      const angle = t * Math.PI * 2;

      for (let h = 0; h < HARMONICS; h++) {
        const freq = h + 1;
        x += amplitudes[h].x * Math.cos(freq * angle + phases[h].x + speeds[h].x * time);
        y += amplitudes[h].y * Math.sin(freq * angle + phases[h].y + speeds[h].y * time);
      }

      // マウスで微妙に歪ませる
      x += mouse.x * 0.05 * Math.cos(angle * 2 + time * 0.3);
      y += mouse.y * 0.05 * Math.sin(angle * 3 + time * 0.25);

      return { x, y };
    }

    function animate() {
      requestAnimationFrame(animate);
      time += 0.007;

      for (let i = 0; i <= SEGMENTS; i++) {
        const t = i / SEGMENTS;
        const p = getPoint(t, time);
        posAttr.setXYZ(i, p.x, p.y, 0);
      }
      posAttr.needsUpdate = true;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>

  window.SKETCH_META = {

    detail: '閉じたループ状の曲線が、複数の周波数を重ね合わせながら変形し続けます。マウスを動かすと、曲線の歪み方が変わります。線の長さも太さも変わらないのに、形だけが変わっていく。'
  };
  </script>
