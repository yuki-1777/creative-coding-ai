<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>134 — Haze</title>
  <meta name="description" content="霧の中の格子。近いものは見えて、遠いものは消える。境界はどこにもない。">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #F5F3EE; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    // フォグで距離によるフェードを実現
    scene.fog = new THREE.FogExp2(0xF5F3EE, 0.18);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 50);
    camera.position.set(0, 0, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0xF5F3EE);
    document.body.appendChild(renderer.domElement);

    // 3D格子を作成
    const GRID_SIZE = 8;   // 一辺のセル数
    const CELL = 0.7;       // セル間隔
    const HALF = (GRID_SIZE * CELL) / 2;

    const group = new THREE.Group();
    scene.add(group);

    // 各格子点（ノード）の位置と揺れパラメータ
    const nodeCount = (GRID_SIZE + 1) * (GRID_SIZE + 1) * (GRID_SIZE + 1);
    const nodePos = new Float32Array(nodeCount * 3);
    const nodePhase = new Float32Array(nodeCount * 3);
    const nodeAmp = new Float32Array(nodeCount);

    let ni = 0;
    for (let ix = 0; ix <= GRID_SIZE; ix++) {
      for (let iy = 0; iy <= GRID_SIZE; iy++) {
        for (let iz = 0; iz <= GRID_SIZE; iz++) {
          nodePos[ni * 3 + 0] = ix * CELL - HALF;
          nodePos[ni * 3 + 1] = iy * CELL - HALF;
          nodePos[ni * 3 + 2] = iz * CELL - HALF;
          nodePhase[ni * 3 + 0] = Math.random() * Math.PI * 2;
          nodePhase[ni * 3 + 1] = Math.random() * Math.PI * 2;
          nodePhase[ni * 3 + 2] = Math.random() * Math.PI * 2;
          nodeAmp[ni] = 0.04 + Math.random() * 0.06;
          ni++;
        }
      }
    }

    // エッジを作成
    // X方向のエッジ
    const edgeMat = new THREE.LineBasicMaterial({
      color: 0x2A2826,
      transparent: true,
      opacity: 0.35,
      fog: true,
    });

    function nodeIndex(ix, iy, iz) {
      return ix * (GRID_SIZE + 1) * (GRID_SIZE + 1) + iy * (GRID_SIZE + 1) + iz;
    }

    const edges = [];
    // X方向エッジ
    for (let ix = 0; ix < GRID_SIZE; ix++) {
      for (let iy = 0; iy <= GRID_SIZE; iy++) {
        for (let iz = 0; iz <= GRID_SIZE; iz++) {
          edges.push([nodeIndex(ix, iy, iz), nodeIndex(ix + 1, iy, iz)]);
        }
      }
    }
    // Y方向エッジ
    for (let ix = 0; ix <= GRID_SIZE; ix++) {
      for (let iy = 0; iy < GRID_SIZE; iy++) {
        for (let iz = 0; iz <= GRID_SIZE; iz++) {
          edges.push([nodeIndex(ix, iy, iz), nodeIndex(ix, iy + 1, iz)]);
        }
      }
    }
    // Z方向エッジ
    for (let ix = 0; ix <= GRID_SIZE; ix++) {
      for (let iy = 0; iy <= GRID_SIZE; iy++) {
        for (let iz = 0; iz < GRID_SIZE; iz++) {
          edges.push([nodeIndex(ix, iy, iz), nodeIndex(ix, iy, iz + 1)]);
        }
      }
    }

    const edgePosArr = new Float32Array(edges.length * 2 * 3);
    const edgeGeo = new THREE.BufferGeometry();
    edgeGeo.setAttribute('position', new THREE.BufferAttribute(edgePosArr, 3));
    edgeGeo.setDrawRange(0, edges.length * 2);
    const edgeLines = new THREE.LineSegments(edgeGeo, edgeMat);
    group.add(edgeLines);

    // マウス
    const mouse = { x: 0, y: 0 };
    window.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
      mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
    });

    // 現在のノード世界座標（計算用）
    const worldNodePos = new Float32Array(nodeCount * 3);

    let time = 0;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.006;

      // 各ノードを揺らす
      for (let i = 0; i < nodeCount; i++) {
        const amp = nodeAmp[i];
        worldNodePos[i * 3 + 0] = nodePos[i * 3 + 0] + amp * Math.sin(time * 0.8 + nodePhase[i * 3 + 0]);
        worldNodePos[i * 3 + 1] = nodePos[i * 3 + 1] + amp * Math.sin(time * 0.6 + nodePhase[i * 3 + 1]);
        worldNodePos[i * 3 + 2] = nodePos[i * 3 + 2] + amp * Math.sin(time * 0.7 + nodePhase[i * 3 + 2]);
      }

      // エッジ座標の更新
      for (let e = 0; e < edges.length; e++) {
        const [a, b] = edges[e];
        edgePosArr[e * 6 + 0] = worldNodePos[a * 3 + 0];
        edgePosArr[e * 6 + 1] = worldNodePos[a * 3 + 1];
        edgePosArr[e * 6 + 2] = worldNodePos[a * 3 + 2];
        edgePosArr[e * 6 + 3] = worldNodePos[b * 3 + 0];
        edgePosArr[e * 6 + 4] = worldNodePos[b * 3 + 1];
        edgePosArr[e * 6 + 5] = worldNodePos[b * 3 + 2];
      }
      edgeGeo.attributes.position.needsUpdate = true;

      // グループをゆっくり回転（マウスで調整）
      group.rotation.y += (mouse.x * 0.5 - group.rotation.y) * 0.02;
      group.rotation.x += (-mouse.y * 0.3 - group.rotation.x) * 0.02;
      group.rotation.y += 0.002; // 自動回転

      // カメラをゆっくり前後に動かして霧の見え方を変える
      camera.position.z = 8 + 1.5 * Math.sin(time * 0.15);

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
  <script>
  window.SKETCH_META = {
    num:   '134',
    title: 'Haze',
    desc:  '霧の中の格子。近いものは見えて、遠いものは消える。境界はどこにもない。マウスで向きを変えられる。',
    detail: '8×8×8の三次元格子の各頂点が、独立したリズムで揺れている。フォグによって奥のエッジが霧に溶け込み、手前のエッジだけが見える。カメラが前後に動くことで、見えている格子の量が変化する。'
  };
  </script>
  <script src="../../js/sketch-ui.js"></script>
</body>
</html>
