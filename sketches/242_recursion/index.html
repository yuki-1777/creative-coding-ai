<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recursion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f2ed; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// 入れ子の立方体。自分の中に自分がいる。
// 各レベルで少しずつ回転速度が違う

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf5f2ed);

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  preserveDrawingBuffer: true
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 6);

// 立方体のレベル数
const LEVELS = 7;
const SCALE_RATIO = 0.62;

// 各レベルのグループを入れ子にする
const cubeGroups = [];

// 一番外側のグループ
const root = new THREE.Group();
scene.add(root);

let currentGroup = root;
cubeGroups.push(root);

// 線材質
const lineMaterial = new THREE.LineBasicMaterial({
  color: 0x3a3530,
  transparent: true,
  opacity: 1.0
});

// レベルごとに異なる回転軸
const rotAxes = [
  new THREE.Vector3(1, 0, 0),
  new THREE.Vector3(0, 1, 0),
  new THREE.Vector3(0.6, 0.8, 0).normalize(),
  new THREE.Vector3(0, 0.5, 0.87).normalize(),
  new THREE.Vector3(0.58, 0.58, 0.58).normalize(),
  new THREE.Vector3(1, 0.3, 0.2).normalize(),
  new THREE.Vector3(0.3, 0.9, 0.1).normalize(),
];

const rotSpeeds = [];

for (let i = 0; i < LEVELS; i++) {
  const size = Math.pow(SCALE_RATIO, i);
  const geo = new THREE.BoxGeometry(size * 2, size * 2, size * 2);
  const wireframe = new THREE.WireframeGeometry(geo);

  // レベルが深くなるほど薄くなる
  const opacity = 1.0 - i * (0.8 / LEVELS);
  const mat = new THREE.LineBasicMaterial({
    color: 0x3a3530,
    transparent: true,
    opacity: Math.max(opacity, 0.1)
  });

  const mesh = new THREE.LineSegments(wireframe, mat);
  currentGroup.add(mesh);

  if (i < LEVELS - 1) {
    const childGroup = new THREE.Group();
    currentGroup.add(childGroup);
    cubeGroups.push(childGroup);
    currentGroup = childGroup;
  }

  // 各レベルの回転速度（素数に近い比率で位相がずれていく）
  const baseSpeed = 0.003;
  const primes = [1, 1.3, 1.7, 2.1, 2.6, 3.0, 3.7];
  rotSpeeds.push(baseSpeed * primes[i % primes.length]);
}

// マウス操作
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let rotX = 0.3;
let rotY = 0.5;

renderer.domElement.addEventListener('mousedown', (e) => {
  isDragging = true;
  prevMouse = { x: e.clientX, y: e.clientY };
});
renderer.domElement.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  rotY += dx * 0.005;
  rotX += dy * 0.005;
  prevMouse = { x: e.clientX, y: e.clientY };
});
renderer.domElement.addEventListener('mouseup', () => { isDragging = false; });
renderer.domElement.addEventListener('mouseleave', () => { isDragging = false; });

// タッチ操作
renderer.domElement.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    isDragging = true;
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
});
renderer.domElement.addEventListener('touchmove', (e) => {
  if (!isDragging || e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - prevMouse.x;
  const dy = e.touches[0].clientY - prevMouse.y;
  rotY += dx * 0.005;
  rotX += dy * 0.005;
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});
renderer.domElement.addEventListener('touchend', () => { isDragging = false; });

let time = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 1;

  // 各レベルのグループを回転
  for (let i = 0; i < cubeGroups.length; i++) {
    const axis = rotAxes[i % rotAxes.length];
    cubeGroups[i].rotateOnAxis(axis, rotSpeeds[i]);
  }

  // マウス操作による全体回転
  root.rotation.x = rotX;
  root.rotation.y = rotY;

  // 自動回転（ドラッグ中は停止）
  if (!isDragging) {
    rotY += 0.002;
    rotX += 0.0005;
  }

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

<script>
window.SKETCH_META = {
  num:    '242',
  title:  'Recursion',
  detail: '7層の立方体フレームが入れ子になっている。それぞれ違う軸と速さで回転している。ドラッグで視点を変えられる。外から見ると秩序があるように見えて、内側では別のことが起きている。'
};
</script>
<script src="../../js/sketch-ui.js"></script>
</body>
</html>
