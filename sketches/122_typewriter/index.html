<html lang="ja">

  <title>122 — Typewriter</title>
  <meta name="description" content="キーを押すと文字が現れる。しばらくすると、粒になって落ちる。">
  <meta property="og:type" content="website">

  <meta property="og:title" content="122 — Typewriter | Creative Coding">
  <meta property="og:description" content="キーを押すと文字が現れる。しばらくすると、粒になって落ちる。">

  <meta name="twitter:description" content="キーを押すと文字が現れる。しばらくすると、粒になって落ちる。">
  <meta name="twitter:image" content="https://creative-coding-ai.vercel.app/img/thumb_122.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #F5F3EE; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => {
  resize();
  redrawAll();
});
resize();

// Off-screen canvas to render individual character glyphs for sampling
const offCanvas = document.createElement('canvas');
const offCtx = offCanvas.getContext('2d');

// State
let chars = [];      // { x, y, char, age, particles, disintegrating, doneTime }
let FONT_SIZE = Math.min(80, Math.min(W, H) * 0.14);
let cursorX = 0;
let cursorBlink = 0;

const LINE_HEIGHT = FONT_SIZE * 1.3;
const PADDING_X = 60;
const PADDING_Y = 80;
const MAX_COLS = Math.floor((W - PADDING_X * 2) / (FONT_SIZE * 0.62));

function charWidth() {
  return FONT_SIZE * 0.62;
}

function col2x(col) {
  return PADDING_X + col * charWidth();
}

function row2y(row) {
  return PADDING_Y + row * LINE_HEIGHT;
}

function getFont() {
  return `${FONT_SIZE}px 'Courier New', monospace`;
}

// Sample pixels of a character into a particle grid
function sampleChar(ch) {
  const cw = Math.ceil(charWidth());
  const ch_h = FONT_SIZE;
  offCanvas.width = cw;
  offCanvas.height = ch_h;
  offCtx.clearRect(0, 0, cw, ch_h);
  offCtx.fillStyle = '#000';
  offCtx.font = getFont();
  offCtx.textBaseline = 'top';
  offCtx.fillText(ch, 0, 0);

  const data = offCtx.getImageData(0, 0, cw, ch_h).data;
  const step = 3;
  const particles = [];
  for (let py = 0; py < ch_h; py += step) {
    for (let px = 0; px < cw; px += step) {
      const idx = (py * cw + px) * 4;
      if (data[idx + 3] > 60) {
        particles.push({
          // local offset from char origin
          lx: px,
          ly: py,
          // velocity
          vx: (Math.random() - 0.5) * 2.5,
          vy: Math.random() * 1.5 + 0.5,
          alpha: 1,
          size: Math.random() * 1.5 + 0.8
        });
      }
    }
  }
  return particles;
}

// Recompute positions after resize
function redrawAll() {
  FONT_SIZE = Math.min(80, Math.min(W, H) * 0.14);
}

// Add a character to the grid at current cursor position
function addChar(ch) {
  // Determine current row/col from existing chars
  let col = 0;
  let row = 0;
  for (const c of chars) {
    if (!c.disintegrating) col++;
  }

  const maxCols = Math.floor((W - PADDING_X * 2) / charWidth());

  if (col >= maxCols) {
    col = 0;
    row = Math.floor(chars.filter(c => !c.disintegrating).length / maxCols);
  }

  // Calculate actual row/col from index
  const activeChars = chars.filter(c => !c.disintegrating);
  const idx = activeChars.length;
  const colPos = idx % maxCols;
  const rowPos = Math.floor(idx / maxCols);

  const x = col2x(colPos);
  const y = row2y(rowPos);

  chars.push({
    x,
    y,
    char: ch,
    age: 0,
    particles: null,
    disintegrating: false,
    doneTime: null
  });
}

// Keyboard input
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === 'Backspace') {
    // Remove last active char
    for (let i = chars.length - 1; i >= 0; i--) {
      if (!chars[i].disintegrating) {
        chars.splice(i, 1);
        break;
      }
    }
    return;
  }
  if (e.key === 'Enter') {
    // Insert line break placeholder
    const maxCols = Math.floor((W - PADDING_X * 2) / charWidth());
    const activeChars = chars.filter(c => !c.disintegrating);
    const col = activeChars.length % maxCols;
    const padding = maxCols - col;
    for (let i = 0; i < padding; i++) {
      chars.push({ x: 0, y: 0, char: '', age: 0, particles: null, disintegrating: false, doneTime: null, hidden: true });
    }
    return;
  }
  if (e.key.length !== 1) return;
  addChar(e.key);
});

const DISINTEGRATE_AFTER = 180; // frames before a char starts disintegrating
const GRAVITY = 0.18;

function tick() {
  requestAnimationFrame(tick);
  cursorBlink++;

  ctx.fillStyle = '#F5F3EE';
  ctx.fillRect(0, 0, W, H);

  ctx.font = getFont();
  ctx.textBaseline = 'top';

  const maxCols = Math.floor((W - PADDING_X * 2) / charWidth());

  // Recalculate positions for all active chars
  let activeIdx = 0;
  for (const c of chars) {
    if (!c.disintegrating) {
      if (!c.hidden) {
        c.x = col2x(activeIdx % maxCols);
        c.y = row2y(Math.floor(activeIdx / maxCols));
      }
      activeIdx++;
    }
  }

  // Age chars and trigger disintegration
  for (const c of chars) {
    if (!c.disintegrating) {
      c.age++;
      if (c.age > DISINTEGRATE_AFTER && !c.hidden) {
        c.disintegrating = true;
        c.particles = sampleChar(c.char);
      }
    }
  }

  // Update and draw disintegrating chars
  for (const c of chars) {
    if (c.disintegrating && c.particles) {
      let allGone = true;
      for (const p of c.particles) {
        p.lx += p.vx;
        p.ly += p.vy;
        p.vy += GRAVITY;
        p.vx *= 0.99;
        p.alpha -= 0.012;
        if (p.alpha > 0) {
          allGone = false;
          ctx.beginPath();
          ctx.arc(c.x + p.lx, c.y + p.ly, p.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(42, 42, 42, ${p.alpha.toFixed(3)})`;
          ctx.fill();
        }
      }
      if (allGone && !c.doneTime) {
        c.doneTime = Date.now();
      }
    }
  }

  // Remove fully gone chars
  chars = chars.filter(c => !c.doneTime || Date.now() - c.doneTime < 500);

  // Draw active chars
  for (const c of chars) {
    if (!c.disintegrating && !c.hidden) {
      // Fade in
      const fadeIn = Math.min(1, c.age / 6);
      // Fade out warning (before disintegration)
      const fadeWarn = c.age > DISINTEGRATE_AFTER - 30
        ? 1 - (c.age - (DISINTEGRATE_AFTER - 30)) / 30
        : 1;
      const alpha = fadeIn * fadeWarn * 0.85;
      ctx.fillStyle = `rgba(42, 42, 42, ${alpha.toFixed(3)})`;
      ctx.fillText(c.char, c.x, c.y);
    }
  }

  // Draw cursor
  const activeChars = chars.filter(c => !c.disintegrating && !c.hidden);
  const curIdx = activeChars.length;
  const cursorColPos = curIdx % maxCols;
  const cursorRowPos = Math.floor(curIdx / maxCols);
  const cx = col2x(cursorColPos);
  const cy = row2y(cursorRowPos);

  if (Math.floor(cursorBlink / 30) % 2 === 0) {
    ctx.fillStyle = 'rgba(42, 42, 42, 0.5)';
    ctx.fillRect(cx, cy + FONT_SIZE * 0.85, charWidth() * 0.85, 2);
  }

  // Hint text when empty
  if (chars.length === 0) {
    ctx.font = `14px 'Courier New', monospace`;
    ctx.fillStyle = 'rgba(42, 42, 42, 0.25)';
    ctx.fillText('type something', PADDING_X, PADDING_Y + LINE_HEIGHT * 0.1);
  }
}

// Pre-populate with demo text so the sketch has visible content on load
// Add characters with staggered ages so some are still visible, some are falling
const DEMO_TEXT = 'type something here';
for (let i = 0; i < DEMO_TEXT.length; i++) {
  addChar(DEMO_TEXT[i]);
}
// Stagger ages so early chars start disintegrating while later ones are fresh
for (let i = 0; i < chars.length; i++) {
  chars[i].age = Math.floor((i / chars.length) * (DISINTEGRATE_AFTER + 60));
}

tick();
</script>
<script>
window.SKETCH_META = {
  num:    '122',
  title:  'Typewriter',
  desc:   'キーを押すと文字が現れる。しばらくすると、粒になって落ちる。書いたものは消えていく。',
  detail: 'キーボードを打つと、文字がひとつずつ画面に表示されます。しばらく経つと、文字がピクセルの粒に分解されて重力に従い落ちていきます。Backspaceで最後の文字を消せます。テキストはどこにも残りません。'
};
</script>

</body>
</html>
