<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spore</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f4f0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setClearColor(0xf5f4f0);

  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 100);
  camera.position.set(0, 0, 5);

  let W = window.innerWidth, H = window.innerHeight;
  renderer.setSize(W, H);
  const aspect = W / H;
  camera.left = -aspect; camera.right = aspect;
  camera.updateProjectionMatrix();

  // Spore caps (sources)
  const N_CAPS = 4;
  const caps = [];
  for (let i = 0; i < N_CAPS; i++) {
    const cx = (i / (N_CAPS - 1) - 0.5) * 1.4 * aspect;
    const cy = -0.35 + Math.sin(i * 2.1) * 0.12;

    // Cap shape: small half-circle + stalk
    const segs = 16;
    const cGeo = new THREE.BufferGeometry();
    const cPos = new Float32Array((segs + 3) * 3);
    for (let s = 0; s <= segs; s++) {
      const a = (s / segs) * Math.PI;
      cPos[s * 3] = cx + Math.cos(a) * 0.04;
      cPos[s * 3 + 1] = cy + Math.sin(a) * 0.04;
    }
    // Stalk
    cPos[(segs + 1) * 3] = cx; cPos[(segs + 1) * 3 + 1] = cy - 0.08;
    cPos[(segs + 2) * 3] = cx; cPos[(segs + 2) * 3 + 1] = cy;
    cGeo.setAttribute('position', new THREE.BufferAttribute(cPos, 3));
    scene.add(new THREE.Line(cGeo, new THREE.LineBasicMaterial({ color: 0x777770 })));

    caps.push({ cx, cy });
  }

  // Particle pool
  const MAX_PARTICLES = 400;
  const px = new Float32Array(MAX_PARTICLES);
  const py = new Float32Array(MAX_PARTICLES);
  const pvx = new Float32Array(MAX_PARTICLES);
  const pvy = new Float32Array(MAX_PARTICLES);
  const plife = new Float32Array(MAX_PARTICLES);
  const pcap = new Int32Array(MAX_PARTICLES); // which cap
  let activeCount = 0;

  const pointGeo = new THREE.BufferGeometry();
  const pointPos = new Float32Array(MAX_PARTICLES * 3);
  pointGeo.setAttribute('position', new THREE.BufferAttribute(pointPos, 3));
  const pointMat = new THREE.PointsMaterial({ color: 0x777770, size: 0.013, transparent: true });
  const points = new THREE.Points(pointGeo, pointMat);
  scene.add(points);

  function emit(capIndex, count) {
    const cap = caps[capIndex];
    for (let i = 0; i < count; i++) {
      if (activeCount >= MAX_PARTICLES) break;
      const idx = activeCount++;
      px[idx] = cap.cx + (Math.random() - 0.5) * 0.06;
      py[idx] = cap.cy + (Math.random() - 0.5) * 0.02;
      const speed = 0.004 + Math.random() * 0.009;
      const angle = Math.PI * 0.5 + (Math.random() - 0.5) * 0.8; // mostly upward
      pvx[idx] = Math.cos(angle) * speed;
      pvy[idx] = Math.sin(angle) * speed;
      plife[idx] = 1.0 + Math.random() * 0.5;
      pcap[idx] = capIndex;
    }
  }

  // Auto-emit periodically
  let lastEmit = 0;

  canvas.addEventListener('click', e => {
    // Emit from closest cap
    const mx = (e.clientX / W - 0.5) * 2 * aspect;
    let bestCap = 0, bestDist = Infinity;
    caps.forEach((cap, i) => {
      const d = Math.abs(mx - cap.cx);
      if (d < bestDist) { bestDist = d; bestCap = i; }
    });
    emit(bestCap, 40);
  });

  function update(t) {
    // Auto emit
    if (t - lastEmit > 1.2) {
      const capIdx = Math.floor(Math.random() * N_CAPS);
      emit(capIdx, 15);
      lastEmit = t;
    }

    // Thermal drift: slight upward current, gentle side drift
    const thermalX = Math.sin(t * 0.3) * 0.0005;

    let aliveCount = 0;
    for (let i = 0; i < activeCount; i++) {
      plife[i] -= 0.003;
      if (plife[i] <= 0) {
        // Swap with last
        const last = activeCount - 1;
        px[i] = px[last]; py[i] = py[last];
        pvx[i] = pvx[last]; pvy[i] = pvy[last];
        plife[i] = plife[last];
        pcap[i] = pcap[last];
        activeCount--;
        i--;
        continue;
      }

      // Gravity-free: only thermal drift
      pvx[i] += thermalX + (Math.random() - 0.5) * 0.0002;
      pvy[i] += (Math.random() - 0.5) * 0.0001; // slight vertical drift

      // Damping
      pvx[i] *= 0.995;
      pvy[i] *= 0.995;

      px[i] += pvx[i];
      py[i] += pvy[i];
    }

    // Write all particles to geometry
    for (let i = 0; i < MAX_PARTICLES; i++) {
      if (i < activeCount) {
        pointPos[i * 3] = px[i];
        pointPos[i * 3 + 1] = py[i];
        pointPos[i * 3 + 2] = 0;
      } else {
        pointPos[i * 3] = 9999; // hide
        pointPos[i * 3 + 1] = 9999;
        pointPos[i * 3 + 2] = 0;
      }
    }
    pointGeo.attributes.position.needsUpdate = true;
  }

  // Initial emit
  for (let i = 0; i < N_CAPS; i++) emit(i, 60);

  let t = 0;
  function animate() {
    requestAnimationFrame(animate);
    t += 0.016;
    update(t);
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    W = window.innerWidth; H = window.innerHeight;
    renderer.setSize(W, H);
    const aspect = W / H;
    camera.left = -aspect; camera.right = aspect;
    camera.updateProjectionMatrix();
  });
</script>
<script>
window.SKETCH_META = {
  num:    '202',
  title:  'Spore',
  detail: 'クリックすると近くのキノコから胞子が放出されます。胞子は重力を持たず、上昇気流に乗って漂い続けます。時間が経つと少しずつ消えていきます。落ちない粒子だけを書いた。'
};
</script>
<script src="../../js/sketch-ui.js"></script>
</body>
</html>
