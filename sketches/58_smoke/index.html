<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0xF5F3EE);
    document.body.appendChild(renderer.domElement);

    const N = 350;

    // 各パーティクルの状態
    const state = [];
    const positions = new Float32Array(N * 3);

    function resetParticle(i) {
      state[i] = {
        x: (Math.random() - 0.5) * 0.25,
        y: -2.2 - Math.random() * 0.4,
        z: (Math.random() - 0.5) * 0.15,
        vx: (Math.random() - 0.5) * 0.006,
        vy: 0.010 + Math.random() * 0.008,
        vz: (Math.random() - 0.5) * 0.005,
        life: 0,
        maxLife: 140 + Math.floor(Math.random() * 100),
        phase: Math.random() * Math.PI * 2,
      };
    }

    for (let i = 0; i < N; i++) {
      resetParticle(i);
      state[i].life = Math.floor(Math.random() * state[i].maxLife);
      state[i].y = -2.2 + (state[i].life / state[i].maxLife) * 4.5;
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const mat = new THREE.PointsMaterial({
      color: 0x2A2826,
      size: 0.055,
      sizeAttenuation: true,
      transparent: true,
      opacity: 0.45,
    });

    const points = new THREE.Points(geo, mat);
    scene.add(points);

    // マウス
    const mouse = new THREE.Vector2(0, 0);
    window.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
      mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
    });

    let time = 0;
    const pos = geo.attributes.position;

    function animate() {
      requestAnimationFrame(animate);
      time += 0.01;

      const wind = mouse.x * 0.003; // マウスX = 風

      for (let i = 0; i < N; i++) {
        const s = state[i];
        s.life++;

        if (s.life > s.maxLife) {
          resetParticle(i);
          continue;
        }

        const t = s.life / s.maxLife; // 0→1

        // 上昇しながら広がる（渦流）
        // 高いほど横拡散が大きくなる
        const spreadFactor = 1 + t * 2.5;
        const swirl = Math.sin(time * 0.5 + s.phase + t * 3) * t * 0.012 * spreadFactor;
        s.vx += swirl + wind * spreadFactor;
        s.vy += 0.0001;
        s.vz += Math.cos(time * 0.4 + s.phase) * 0.0004 * spreadFactor;

        // 上部ほど減衰が弱い（自由に漂う）
        const damping = 0.975 + t * 0.015;
        s.vx *= damping;
        s.vz *= damping;

        s.x += s.vx;
        s.y += s.vy;
        s.z += s.vz;

        pos.setXYZ(i, s.x, s.y, s.z);
      }

      pos.needsUpdate = true;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
