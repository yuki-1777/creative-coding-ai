<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>58 — Smoke</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #F5F3EE; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0xF5F3EE);
    document.body.appendChild(renderer.domElement);

    const N = 200;

    // 各パーティクルの状態
    const state = [];
    const positions = new Float32Array(N * 3);
    const opacities = new Float32Array(N);

    function resetParticle(i) {
      state[i] = {
        x: (Math.random() - 0.5) * 0.3,
        y: -2.0 - Math.random() * 0.5,
        z: (Math.random() - 0.5) * 0.2,
        vx: (Math.random() - 0.5) * 0.008,
        vy: 0.012 + Math.random() * 0.008,
        vz: (Math.random() - 0.5) * 0.006,
        life: 0,
        maxLife: 120 + Math.floor(Math.random() * 80),
        phase: Math.random() * Math.PI * 2,
      };
    }

    for (let i = 0; i < N; i++) {
      resetParticle(i);
      // ライフタイムをばらつかせて最初から自然に
      state[i].life = Math.floor(Math.random() * state[i].maxLife);
      state[i].y = -2.0 + (state[i].life / state[i].maxLife) * 4.0;
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const mat = new THREE.PointsMaterial({
      color: 0x2A2826,
      size: 0.07,
      sizeAttenuation: true,
      transparent: true,
      opacity: 0.5,
    });

    const points = new THREE.Points(geo, mat);
    scene.add(points);

    // マウス
    const mouse = new THREE.Vector2(0, 0);
    window.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
      mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
    });

    let time = 0;
    const pos = geo.attributes.position;

    function animate() {
      requestAnimationFrame(animate);
      time += 0.01;

      const wind = mouse.x * 0.003; // マウスX = 風

      for (let i = 0; i < N; i++) {
        const s = state[i];
        s.life++;

        if (s.life > s.maxLife) {
          resetParticle(i);
          continue;
        }

        const t = s.life / s.maxLife; // 0→1

        // 上昇しながら広がる（渦流）
        const swirl = Math.sin(time * 0.5 + s.phase + t * 3) * t * 0.008;
        s.vx += swirl + wind;
        s.vy += 0.0002; // わずかな加速
        s.vz += Math.cos(time * 0.4 + s.phase) * 0.0003;

        // 減衰
        s.vx *= 0.98;
        s.vz *= 0.98;

        s.x += s.vx;
        s.y += s.vy;
        s.z += s.vz;

        pos.setXYZ(i, s.x, s.y, s.z);
      }

      pos.needsUpdate = true;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
  <script>
  window.SKETCH_META = {
    num:   '58',
    title: 'Smoke',
    desc:  '200個の点に上昇する速度を与えたら、煙みたいに見えた。マウスを横に動かすと風が吹く。'
  };
  </script>
  <script src="../../js/sketch-ui.js"></script>
</body>
</html>
