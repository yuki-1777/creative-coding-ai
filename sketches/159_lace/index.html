<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Lace: polar Lissajous-like curves drawn with rotational symmetry.
// Mouse X controls the A:B frequency ratio, Mouse Y controls phase.
// The curve is drawn once per frame with alpha trail for smooth animation.
// Constraint: one closed parametric curve + N-fold symmetry only.

let t = 0;
let targetA = 3, targetB = 2;
let currentA = 3, currentB = 2;
let targetPhase = 0, currentPhase = 0;

const SYMMETRY = 6;  // rotational symmetry copies
const POINTS = 400;

function setup() {
  createCanvas(windowWidth, windowHeight);
  strokeCap(ROUND);
  noFill();
}

function draw() {
  // Soft fade trail
  background(245, 243, 238, 40);

  const cx = width / 2;
  const cy = height / 2;
  const R  = min(width, height) * 0.36;

  // Update params from mouse
  if (mouseX > 0 && mouseX < width) {
    targetA = map(mouseX, 0, width, 2, 7);
    targetB = map(mouseY, 0, height, 1, 5);
  }
  currentA += (targetA - currentA) * 0.03;
  currentB += (targetB - currentB) * 0.03;

  t += 0.004;
  currentPhase = t;

  // Draw N-fold symmetric lace
  for (let sym = 0; sym < SYMMETRY; sym++) {
    const angle = (sym / SYMMETRY) * TWO_PI;

    beginShape();
    for (let i = 0; i <= POINTS; i++) {
      const theta = (i / POINTS) * TWO_PI;
      // Polar lissajous: r varies with two frequencies
      const r = R * (0.5 + 0.5 * sin(currentA * theta + currentPhase));
      const phi = theta * currentB;

      const px = r * cos(phi);
      const py = r * sin(phi);

      // Rotate by symmetry angle
      const rx = cx + px * cos(angle) - py * sin(angle);
      const ry = cy + px * sin(angle) + py * cos(angle);

      vertex(rx, ry);
    }
    endShape(CLOSE);
  }

  // Draw current curves fresh with thin line
  strokeWeight(0.6);
  const alpha = 110;
  stroke(42, 42, 42, alpha);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>

};
</script>
