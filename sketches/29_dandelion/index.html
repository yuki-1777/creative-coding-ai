<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0xF5F3EE);
    document.body.appendChild(renderer.domElement);

    // たんぽぽの綿毛：中心から放射状に伸びる茎と先端の丸
    const SEEDS = 180;
    const group = new THREE.Group();
    scene.add(group);

    const stemMat = new THREE.LineBasicMaterial({
      color: 0x2A2826,
      transparent: true,
      opacity: 0.6
    });

    const seeds = [];

    for (let i = 0; i < SEEDS; i++) {
      // フィボナッチ球面分布
      const phi = Math.acos(1 - 2 * (i + 0.5) / SEEDS);
      const theta = Math.PI * (1 + Math.sqrt(5)) * i;

      const dir = new THREE.Vector3(
        Math.sin(phi) * Math.cos(theta),
        Math.sin(phi) * Math.sin(theta),
        Math.cos(phi)
      );

      const stemLen = 0.9 + Math.random() * 0.4;
      const start = new THREE.Vector3(0, 0, 0);
      const end = dir.clone().multiplyScalar(stemLen);

      // 茎
      const stemGeo = new THREE.BufferGeometry().setFromPoints([start, end]);
      const stem = new THREE.Line(stemGeo, stemMat);
      group.add(stem);

      // 先端の小さな球（綿毛の粒）
      const tipGeo = new THREE.SphereGeometry(0.022, 6, 6);
      const tipMat = new THREE.MeshBasicMaterial({
        color: 0x2A2826,
        transparent: true,
        opacity: 0.55
      });
      const tip = new THREE.Mesh(tipGeo, tipMat);
      tip.position.copy(end);
      group.add(tip);

      seeds.push({ dir: dir.clone(), stemLen, phase: Math.random() * Math.PI * 2 });
    }

    // マウス
    let mx = 0, my = 0;
    let targetMx = 0, targetMy = 0;
    document.addEventListener('mousemove', e => {
      targetMx = (e.clientX / window.innerWidth - 0.5) * 2;
      targetMy = (e.clientY / window.innerHeight - 0.5) * 2;
    });

    let time = 0;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.005;

      // スムーズな追従
      mx += (targetMx - mx) * 0.04;
      my += (targetMy - my) * 0.04;

      // マウスで傾ける（風に揺れる感じ）
      group.rotation.x = my * 0.4 + Math.sin(time * 0.3) * 0.06;
      group.rotation.y = time * 0.08 + mx * 0.4;
      group.rotation.z = Math.sin(time * 0.2) * 0.04;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
  <script>
  window.SKETCH_META = {
    num:   '29',
    title: 'Dandelion',
    desc:  '180本の茎を球面に並べた。風を当てると揺れる。',
    detail: 'たんぽぽの綿毛を3Dで再現した。180本の茎が球の中心から四方八方へ均等に伸び、先端にはそれぞれ小さな粒がついている。全体はゆっくり自動で回転しており、マウスを動かすと風が当たったように傾く。左右に動かすと横に揺れ、上下に動かすと縦に傾く。'
  };
  </script>

</body>
