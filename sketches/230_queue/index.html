<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Line Up</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f2f1ee; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W = window.innerWidth;
let H = window.innerHeight;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
}
resize();
window.addEventListener('resize', resize);

// ---- 定数 ----
const PERSON_R   = 10;
const SPACING    = PERSON_R * 2.8;   // 列内の目標間隔
const WINDOW_X   = W * 0.62;         // サービス窓口のX
const WINDOW_Y   = H * 0.50;
const QUEUE_DIR  = -1;               // 列は左向きに伸びる
const SPEED      = 1.8;              // 移動速度
const SERVICE_INTERVAL = 90;         // フレーム数で処理間隔

// ---- 状態 ----
let people = [];
let frame  = 0;
let serviceTimer = 0;
let servedCount  = 0;
let waitingToLeave = [];   // 処理された人が退場するリスト

// ---- Person ----
function makePerson(x, y) {
  return {
    x, y,
    tx: x, ty: y,          // 目標位置
    vx: 0, vy: 0,
    r: PERSON_R,
    alpha: 0,              // フェードイン
    state: 'joining',      // joining | queued | served | leaving
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: 0.015 + Math.random() * 0.01,
    legPhase: Math.random() * Math.PI * 2,
  };
}

// ---- キューの目標位置を計算 ----
function getQueuePosition(index) {
  return {
    x: WINDOW_X - SPACING * (index + 1),
    y: WINDOW_Y,
  };
}

// ---- 初期で数人並ばせる ----
function addPerson() {
  // 画面外（上か下）からランダムに入場
  const fromTop = Math.random() < 0.5;
  const px = WINDOW_X - SPACING * (people.length + 1) - 40 + (Math.random() - 0.5) * 20;
  const py = fromTop ? -30 : H + 30;
  const p = makePerson(px, py);
  people.push(p);
}

for (let i = 0; i < 5; i++) addPerson();

// ---- サービス窓口の処理 ----
function processFirst() {
  if (people.length === 0) return;
  const first = people[0];
  first.state = 'served';
  // 窓口右側に退場
  first.tx = WINDOW_X + 80 + Math.random() * 60;
  first.ty = WINDOW_Y + (Math.random() - 0.5) * 80;
  waitingToLeave.push(first);
  people.shift();
  servedCount++;
  // 後ろの人を1歩前へ
  updateTargets();
}

function updateTargets() {
  people.forEach((p, i) => {
    const pos = getQueuePosition(i);
    p.tx = pos.x;
    p.ty = pos.y;
  });
}

// ---- 描画 ----
function drawWindow() {
  const wx = WINDOW_X;
  const wy = WINDOW_Y;
  // 窓口の枠
  ctx.strokeStyle = 'rgba(60,50,44,0.5)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.rect(wx - 2, wy - 28, 50, 56);
  ctx.stroke();
  // 窓口の仕切り線
  ctx.beginPath();
  ctx.moveTo(wx - 2, wy);
  ctx.lineTo(wx + 48, wy);
  ctx.strokeStyle = 'rgba(60,50,44,0.25)';
  ctx.lineWidth = 1;
  ctx.stroke();
  // 担当者の丸（薄い）
  ctx.beginPath();
  ctx.arc(wx + 26, wy - 12, 8, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(60,50,44,0.4)';
  ctx.lineWidth = 1.2;
  ctx.stroke();
}

function drawQueueLine() {
  if (people.length === 0) return;
  const n = Math.min(people.length, 12);
  ctx.beginPath();
  // 窓口前から列が伸びる方向にガイドライン
  ctx.setLineDash([4, 6]);
  ctx.moveTo(WINDOW_X - SPACING, WINDOW_Y);
  ctx.lineTo(WINDOW_X - SPACING * (n + 1.5), WINDOW_Y);
  ctx.strokeStyle = 'rgba(120,110,100,0.18)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawPerson(p) {
  ctx.save();
  ctx.globalAlpha = p.alpha;

  const wobble = Math.sin(p.wobble) * 0.7;
  const cx = p.x;
  const cy = p.y;

  // 脚（待ち状態は小さく揺れ、歩行中は大きく）
  const isMoving = Math.abs(p.vx) > 0.3 || Math.abs(p.vy) > 0.3;
  const legAmp = isMoving ? 4 : 1.2;
  const legL = cy + p.r * 1.4 + Math.sin(p.legPhase) * legAmp;
  const legR = cy + p.r * 1.4 - Math.sin(p.legPhase) * legAmp;
  ctx.beginPath();
  ctx.moveTo(cx - 4, cy + p.r * 0.9);
  ctx.lineTo(cx - 3, legL);
  ctx.moveTo(cx + 4, cy + p.r * 0.9);
  ctx.lineTo(cx + 3, legR);
  ctx.strokeStyle = 'rgba(58,48,42,0.65)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // 体（胴体）
  ctx.beginPath();
  ctx.moveTo(cx, cy + p.r * 0.4);
  ctx.lineTo(cx, cy + p.r * 0.9);
  ctx.strokeStyle = 'rgba(58,48,42,0.7)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // 腕
  const armSwing = isMoving ? Math.sin(p.legPhase + Math.PI) * 3.5 : wobble * 0.5;
  ctx.beginPath();
  ctx.moveTo(cx - p.r * 0.3, cy + p.r * 0.55);
  ctx.lineTo(cx - p.r * 0.7, cy + p.r * 0.9 + armSwing);
  ctx.moveTo(cx + p.r * 0.3, cy + p.r * 0.55);
  ctx.lineTo(cx + p.r * 0.7, cy + p.r * 0.9 - armSwing);
  ctx.strokeStyle = 'rgba(58,48,42,0.55)';
  ctx.lineWidth = 1.4;
  ctx.stroke();

  // 頭
  ctx.beginPath();
  ctx.arc(cx, cy, p.r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(58,48,42,0.75)';
  ctx.lineWidth = 1.3;
  ctx.stroke();

  ctx.restore();
}

// ---- 更新 ----
function update() {
  frame++;
  serviceTimer++;

  // 定期処理
  if (serviceTimer >= SERVICE_INTERVAL && people.length > 0) {
    processFirst();
    serviceTimer = 0;
  }

  // 人を更新
  people.forEach((p, i) => {
    p.wobble += p.wobbleSpeed;
    p.legPhase += 0.12;
    p.alpha = Math.min(1, p.alpha + 0.04);

    // 目標に向かう（バネ）
    const dx = p.tx - p.x;
    const dy = p.ty - p.y;
    p.vx = p.vx * 0.7 + dx * 0.14;
    p.vy = p.vy * 0.7 + dy * 0.14;
    p.x += p.vx;
    p.y += p.vy;

    // 前の人との衝突回避（押されすぎない）
    if (i > 0) {
      const prev = people[i - 1];
      const ddx = p.x - prev.x;
      const ddy = p.y - prev.y;
      const dist = Math.sqrt(ddx * ddx + ddy * ddy);
      const minDist = PERSON_R * 2.1;
      if (dist < minDist && dist > 0.01) {
        const push = (minDist - dist) / dist * 0.15;
        p.x += ddx * push;
        p.y += ddy * push;
      }
    }
  });

  // 退場者の更新
  for (let i = waitingToLeave.length - 1; i >= 0; i--) {
    const p = waitingToLeave[i];
    p.wobble += p.wobbleSpeed;
    p.legPhase += 0.15;
    const dx = p.tx - p.x;
    const dy = p.ty - p.y;
    p.vx = p.vx * 0.75 + dx * 0.1;
    p.vy = p.vy * 0.75 + dy * 0.1;
    p.x += p.vx;
    p.y += p.vy;
    // 画面外に出たら消す、またはフェードアウト
    if (p.x > W + 60 || p.x < -60 || p.alpha < 0.01) {
      waitingToLeave.splice(i, 1);
    } else {
      // 窓口から少し離れたらフェードアウト
      const distFromWindow = Math.abs(p.x - WINDOW_X);
      if (distFromWindow > 120) {
        p.alpha = Math.max(0, p.alpha - 0.015);
      }
    }
  }

  // ランダムに列に追加（自動補充）
  if (frame % 110 === 0 && people.length < 10) {
    addPerson();
  }
}

// ---- 描画ループ ----
function draw() {
  requestAnimationFrame(draw);
  update();

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#f2f1ee';
  ctx.fillRect(0, 0, W, H);

  drawQueueLine();
  drawWindow();

  // 退場者を描画（列の背後）
  waitingToLeave.forEach(drawPerson);

  // 列の人を後ろから前の順に描画
  for (let i = people.length - 1; i >= 0; i--) {
    drawPerson(people[i]);
  }

  // 処理済み人数表示（控えめに）
  ctx.fillStyle = 'rgba(100,90,82,0.35)';
  ctx.font = '11px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(`${servedCount}`, W - 20, H - 20);
  ctx.textAlign = 'left';
}

draw();

// ---- インタラクション ----
canvas.addEventListener('click', () => {
  if (people.length < 14) addPerson();
});

</script>

<script>
window.SKETCH_META = {
  num:    '230',
  title:  'Line Up',
  detail: 'クリックすると画面の端から人が歩いてきて列に加わります。列の先頭は一定間隔でサービスを受けて退場します。後ろの人は自然に前に詰めます。人物は円と線だけで表現しています。'
};
</script>
<script src="../../js/sketch-ui.js"></script>
</body>
</html>
