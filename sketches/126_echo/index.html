<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
const HISTORY_LEN = 300;
const LAYERS = 6;
const LAYER_DELAY = 28;

let history = [];
let historyHead = 0;
let hasRealMouse = false;
let demoT = -3.0; // start offset so echoes are spread across canvas at capture time

function pushHistory(x, y) {
  if (history.length < HISTORY_LEN) {
    history.push({ x, y });
  } else {
    history[historyHead] = { x, y };
    historyHead = (historyHead + 1) % HISTORY_LEN;
  }
}

function getHistorical(stepsBack) {
  const len = history.length;
  if (len === 0) return null;
  const idx = (historyHead - 1 - stepsBack + len * 2) % len;
  return history[idx] || null;
}

function setup() {
  createCanvas(windowWidth, windowHeight);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

function mouseMoved() {
  hasRealMouse = true;
  pushHistory(mouseX, mouseY);
}

function draw() {
  background('#F5F3EE');

  // Auto-demo: Lissajous figure-8 when no real mouse
  if (!hasRealMouse) {
    demoT += 0.018;
    const cx = width / 2, cy = height / 2;
    const rx = min(width, height) * 0.28;
    const ry = min(width, height) * 0.16;
    pushHistory(cx + sin(demoT) * rx, cy + sin(demoT * 2) * ry);
  }

  // Draw echo layers from oldest to newest
  for (let l = LAYERS - 1; l >= 0; l--) {
    const delay = l * LAYER_DELAY;
    const alphaRatio = 1 - l / LAYERS;
    const a = alphaRatio * 0.75 + 0.12;
    const radius = 4 + l * 5;

    const pos = getHistorical(delay);
    if (!pos) continue;

    // Fill
    noStroke();
    fill(42, 42, 42, a * 0.15 * 255);
    ellipse(pos.x, pos.y, radius * 2);

    // Stroke ring
    noFill();
    stroke(42, 42, 42, a * 255);
    strokeWeight(0.8 + alphaRatio * 1.2);
    ellipse(pos.x, pos.y, radius * 2);
  }

  // Connecting lines between echo positions
  for (let l = LAYERS - 1; l >= 1; l--) {
    const p1 = getHistorical(l * LAYER_DELAY);
    const p2 = getHistorical((l - 1) * LAYER_DELAY);
    if (!p1 || !p2) continue;

    const a = (1 - l / LAYERS) * 0.2;
    stroke(42, 42, 42, a * 255);
    strokeWeight(0.5);
    line(p1.x, p1.y, p2.x, p2.y);
  }
}
</script>
