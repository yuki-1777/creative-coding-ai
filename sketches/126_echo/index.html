<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Ring buffer of mouse positions
const HISTORY_LEN = 300;
const history = [];
let historyHead = 0;
let historyCount = 0;

let mx = W / 2, my = H / 2;
let mouseIn = false;
let hasRealMouse = false;

canvas.addEventListener('mousemove', e => {
  mx = e.clientX;
  my = e.clientY;
  mouseIn = true;
  hasRealMouse = true;
  pushHistory(mx, my);
});
canvas.addEventListener('mouseleave', () => { mouseIn = false; });
canvas.addEventListener('mouseenter', () => { mouseIn = true; });

// Auto-demo: simulate a gentle figure-8 path when no mouse
let demoT = 0;
function updateDemo() {
  if (hasRealMouse) return;
  demoT += 0.018;
  const cx = W / 2, cy = H / 2;
  const rx = Math.min(W, H) * 0.28;
  const ry = Math.min(W, H) * 0.16;
  // Lissajous figure-8
  const dx = Math.sin(demoT) * rx;
  const dy = Math.sin(demoT * 2) * ry;
  pushHistory(cx + dx, cy + dy);
}

function pushHistory(x, y) {
  if (history.length < HISTORY_LEN) {
    history.push({ x, y });
  } else {
    history[historyHead] = { x, y };
    historyHead = (historyHead + 1) % HISTORY_LEN;
  }
  historyCount = Math.min(historyCount + 1, HISTORY_LEN);
}

// Number of echo layers
const LAYERS = 6;
// Delay in frames between each layer
const LAYER_DELAY = 28;

function getHistorical(stepsBack) {
  const len = history.length;
  if (len === 0) return null;
  const idx = (historyHead - 1 - stepsBack + len * 2) % len;
  return history[idx] || null;
}

let frame = 0;

function draw() {
  requestAnimationFrame(draw);
  frame++;

  ctx.fillStyle = '#F5F3EE';
  ctx.fillRect(0, 0, W, H);

  // Auto-demo runs if no real mouse
  updateDemo();

  if (!mouseIn && historyCount === 0 && hasRealMouse) {
    // Idle hint (only shown if real mouse was previously detected and left)
    ctx.fillStyle = 'rgba(42, 42, 42, 0.15)';
    ctx.font = '13px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('move mouse', W / 2, H / 2);
    return;
  }

  // Draw from oldest to newest layer (so newest is on top)
  for (let l = LAYERS - 1; l >= 0; l--) {
    const delay = l * LAYER_DELAY;
    // How far back in history for this layer
    const alphaRatio = 1 - l / LAYERS;
    const alpha = alphaRatio * 0.75 + 0.12;
    const radius = 4 + l * 5;

    const pos = getHistorical(delay);
    if (!pos) continue;

    ctx.beginPath();
    ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(42, 42, 42, ${alpha * 0.15})`;
    ctx.fill();
    ctx.strokeStyle = `rgba(42, 42, 42, ${alpha})`;
    ctx.lineWidth = 0.8 + alphaRatio * 1.2;
    ctx.stroke();
  }

  // Draw path between echo positions
  for (let l = LAYERS - 1; l >= 1; l--) {
    const delay1 = l * LAYER_DELAY;
    const delay2 = (l - 1) * LAYER_DELAY;
    const p1 = getHistorical(delay1);
    const p2 = getHistorical(delay2);
    if (!p1 || !p2) continue;

    const alpha = (1 - l / LAYERS) * 0.2;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.strokeStyle = `rgba(42, 42, 42, ${alpha})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
}

draw();
</script>
