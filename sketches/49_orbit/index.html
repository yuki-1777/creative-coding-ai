  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #F5F3EE; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    let bodies = [];
    let trails = [];
    const TRAIL_LEN = 600;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      background('#F5F3EE');
      initSystem();
    }

    function initSystem() {
      bodies = [];
      trails = [];

      let cx = width / 2;
      let cy = height / 2;

      // 中心の大きな重力源（描画しない）
      bodies.push({
        x: cx, y: cy,
        vx: 0, vy: 0,
        mass: 8000,
        r: 5,
        fixed: true
      });

      // 周回する小さな天体
      let orbitCount = 7;
      for (let i = 0; i < orbitCount; i++) {
        let orbitR = random(60, min(width, height) * 0.38);
        let angle = random(TWO_PI);
        let x = cx + orbitR * cos(angle);
        let y = cy + orbitR * sin(angle);

        // 円軌道の速度を計算（v = sqrt(GM/r)）
        let speed = sqrt(8000 / orbitR) * random(0.85, 1.15);
        // 軌道に垂直な速度
        let vx = -sin(angle) * speed;
        let vy = cos(angle) * speed;

        bodies.push({
          x, y, vx, vy,
          mass: random(1, 3),
          r: random(2, 4),
          fixed: false,
          trail: []
        });
        trails.push([]);
      }
    }

    function draw() {
      background('#F5F3EE');

      // 物理演算（小天体のみ）
      for (let i = 1; i < bodies.length; i++) {
        let b = bodies[i];
        // 中心重力
        let center = bodies[0];
        let dx = center.x - b.x;
        let dy = center.y - b.y;
        let r2 = dx * dx + dy * dy;
        let r = sqrt(r2);
        let force = center.mass / r2;
        b.vx += (dx / r) * force * 0.1;
        b.vy += (dy / r) * force * 0.1;

        b.vx *= 0.9995;
        b.vy *= 0.9995;
        b.x += b.vx;
        b.y += b.vy;

        // 軌跡の記録
        trails[i - 1].push({ x: b.x, y: b.y });
        if (trails[i - 1].length > TRAIL_LEN) trails[i - 1].shift();
      }

      // 軌跡の描画
      noFill();
      for (let i = 0; i < trails.length; i++) {
        let t = trails[i];
        for (let j = 1; j < t.length; j++) {
          let alpha = map(j, 0, t.length, 0, 100);
          let w = map(j, 0, t.length, 0.3, 0.9);
          stroke(42, 42, 42, alpha);
          strokeWeight(w);
          line(t[j - 1].x, t[j - 1].y, t[j].x, t[j].y);
        }
      }

      // 天体の描画
      noStroke();
      for (let i = 1; i < bodies.length; i++) {
        let b = bodies[i];
        fill(42, 42, 42, 180);
        circle(b.x, b.y, b.r * 2);
      }

      // 中心点（小さく）
      fill(42, 42, 42, 80);
      circle(bodies[0].x, bodies[0].y, 6);
    }

    function mousePressed() {
      // クリックした位置から新しい天体を追加
      let cx = width / 2;
      let cy = height / 2;
      let dx = cx - mouseX;
      let dy = cy - mouseY;
      let r = sqrt(dx * dx + dy * dy);
      if (r < 30) {
        initSystem();
        return;
      }
      let speed = sqrt(8000 / r) * random(0.9, 1.1);
      let angle = atan2(mouseY - cy, mouseX - cx);
      let vx = -sin(angle) * speed;
      let vy = cos(angle) * speed;

      bodies.push({
        x: mouseX, y: mouseY,
        vx, vy,
        mass: random(1, 3),
        r: random(2, 4),
        fixed: false
      });
      trails.push([]);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      initSystem();
    }
  </script>
  <script>
  window.SKETCH_META = {
    num:   '49',
    title: 'Orbit',
    desc:  '7つの点が中心を周回している。軌跡を長くしたら、螺旋が見えてきた。引力だけで動いている。クリックで天体を増やせる。',
    detail: '目に見えない巨大な重力源が中心にあり、7つの小さな天体がそのまわりをそれぞれ異なる軌道で周回している。引力の計算だけで動いており、それぞれの軌跡が螺旋のような縞模様を描く。クリックすると新しい天体がその位置から軌道に乗って加わる。中心付近をクリックするとリセットされる。'
  };
  </script>
