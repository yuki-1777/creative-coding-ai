<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>145 — Ribbon</title>
  <meta name="description" content="風に揺れるリボンを描いたら、結べなかった。">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #F5F3EE; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0xF5F3EE);
    document.body.appendChild(renderer.domElement);

    // リボンを複数の薄いTubeGeometryで表現
    const RIBBON_COUNT = 3;
    const SEGMENTS = 120;
    const ribbons = [];

    const colors = [0x2A2826, 0x2A2826, 0x8A7055];
    const opacities = [0.55, 0.35, 0.45];
    const offsets = [0, Math.PI * 0.4, Math.PI * 0.8];
    const widths = [0.018, 0.012, 0.010];

    // カスタムCurvePath
    class RibbonCurve extends THREE.Curve {
      constructor(offset, amplitude, freq) {
        super();
        this.offset = offset;
        this.amplitude = amplitude;
        this.freq = freq;
        this.time = 0;
      }
      getPoint(t) {
        const x = (t - 0.5) * 7;
        const y = Math.sin(t * Math.PI * this.freq + this.offset + this.time) * this.amplitude
                + Math.sin(t * Math.PI * this.freq * 0.5 + this.offset * 1.3 + this.time * 0.7) * this.amplitude * 0.4;
        const z = Math.cos(t * Math.PI * this.freq * 0.8 + this.offset * 0.7 + this.time * 0.5) * this.amplitude * 0.5;
        return new THREE.Vector3(x, y, z);
      }
    }

    const curves = [];
    for (let i = 0; i < RIBBON_COUNT; i++) {
      const amp = 1.2 - i * 0.15;
      const freq = 2 + i * 0.5;
      const curve = new RibbonCurve(offsets[i], amp, freq);
      curves.push(curve);

      const geo = new THREE.TubeGeometry(curve, SEGMENTS, widths[i], 4, false);
      const mat = new THREE.MeshBasicMaterial({
        color: colors[i],
        transparent: true,
        opacity: opacities[i],
        side: THREE.DoubleSide,
        wireframe: false,
      });
      const mesh = new THREE.Mesh(geo, mat);
      scene.add(mesh);
      ribbons.push({ mesh, curve, geo });
    }

    // マウス追跡
    const mouse = { x: 0, y: 0 };
    window.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
      mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
    });

    let time = 0;

    function animate() {
      requestAnimationFrame(animate);
      time += 0.008;

      // 各リボンのカーブを更新
      for (let i = 0; i < RIBBON_COUNT; i++) {
        const { mesh, curve, geo } = ribbons[i];
        curve.time = time + mouse.x * 0.5;
        curve.amplitude = (1.2 - i * 0.15) + mouse.y * 0.3;

        // ジオメトリを再生成
        const newGeo = new THREE.TubeGeometry(curve, SEGMENTS, widths[i], 4, false);
        mesh.geometry.dispose();
        mesh.geometry = newGeo;
        ribbons[i].geo = newGeo;
      }

      // シーン全体を少し傾ける
      scene.rotation.y = mouse.x * 0.25;
      scene.rotation.x = mouse.y * 0.1;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
  <script>
  window.SKETCH_META = {
    num:   '145',
    title: 'Ribbon',
    detail: '3本のリボンが空中を漂っている。マウスを左右に動かすとリボンの揺れ方が変わり、上下に動かすと振れ幅が広がったり縮んだりする。リボンは互いに交差しながら、別々のリズムで波打っている。'
  };
  </script>
  <script src="../../js/sketch-ui.js"></script>
</body>
</html>
