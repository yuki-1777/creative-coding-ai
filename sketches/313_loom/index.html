<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>313 – Loom</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f2efe8;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; }
    #start-overlay {
      position: fixed;
      inset: 0;
      background: rgba(242,239,232,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      cursor: pointer;
      z-index: 100;
    }
    #start-overlay p {
      font-family: 'Georgia', serif;
      font-size: 14px;
      color: #555;
      letter-spacing: 0.05em;
    }
    #start-overlay .hint { font-size: 12px; color: #999; }
  </style>
</head>
<body>

<div id="start-overlay">
  <p>カメラとマイクへのアクセスが必要です</p>
  <p class="hint">クリックして開始</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<script>
// ===== Loom =====
// カメラ映像の輝度をスキャンしてTone.jsのオシレーターを操作し、
// 生成された音波の振幅で映像の各スキャンラインを横方向にずらす。
// 静かなときは正確な鏡。音が起きると鏡面が縦波のように揺れる。

const CANVAS_W = 640;
const CANVAS_H = 480;
const SCAN_ROWS = 48;
const NUM_OSC = 6;

let video = null;
let oscillators = [];
let warpBuffer = [];
let audioStarted = false;
let useCamera = false;

// Tone.js nodes
let toneWaveform;
let reverb;
let gainNode;

// demo mode: 擬似シルエット用ノイズバッファ
let demoPixels = null;
let demoT = 0;

let oscScanRows = [];

function setup() {
  const cnv = createCanvas(CANVAS_W, CANVAS_H);
  cnv.parent(document.body);
  noSmooth();
  pixelDensity(1);

  for (let i = 0; i < CANVAS_H; i++) warpBuffer.push(0);
  for (let i = 0; i < NUM_OSC; i++) {
    oscScanRows.push(Math.floor((i / NUM_OSC) * SCAN_ROWS));
  }

  // デモ用静的ノイズシルエットを生成
  buildDemoPixels();
}

function buildDemoPixels() {
  // ノイズでシルエット風のグレー映像を生成
  demoPixels = new Uint8Array(CANVAS_W * CANVAS_H * 4);
  for (let y = 0; y < CANVAS_H; y++) {
    for (let x = 0; x < CANVAS_W; x++) {
      // 中央に人物っぽい明るい領域を作る
      const cx = CANVAS_W / 2;
      const cy = CANVAS_H * 0.45;
      const dx = (x - cx) / (CANVAS_W * 0.18);
      const dy = (y - cy) / (CANVAS_H * 0.38);
      const dist = Math.sqrt(dx * dx + dy * dy);
      // シルエット：中心が明るく周縁は紙色に近い明るさ
      let base = Math.exp(-dist * dist * 0.7) * 160 + 80;
      // パーリン風ノイズ（簡易版）
      const n = noise(x * 0.015, y * 0.015) * 60 - 30;
      let gray = Math.min(240, Math.max(20, Math.round(base + n)));
      // セピア
      const idx = (y * CANVAS_W + x) * 4;
      demoPixels[idx]     = Math.min(255, gray + 8);
      demoPixels[idx + 1] = Math.min(255, gray + 3);
      demoPixels[idx + 2] = Math.max(0,   gray - 8);
      demoPixels[idx + 3] = 255;
    }
  }
}


async function startWithCamera() {
  // Tone.js 音声起動（ユーザージェスチャー後に必ず先に呼ぶ）
  await Tone.start();

  // Tone.js ノード初期化
  try {
    // Freeverb は同期で使えるリバーブ（Reverb と異なり await 不要）
    reverb = new Tone.Freeverb({ roomSize: 0.6, dampening: 3000 }).toDestination();
    gainNode = new Tone.Gain(0.8).connect(reverb);
    toneWaveform = new Tone.Waveform(512);
    gainNode.connect(toneWaveform);

    const baseFreqs = [220, 330, 440, 550, 660, 880];
    for (let i = 0; i < NUM_OSC; i++) {
      const osc = new Tone.Oscillator({
        frequency: baseFreqs[i],
        type: 'triangle',
        volume: -18
      }).connect(gainNode);
      osc.start();
      oscillators.push(osc);
    }
    audioStarted = true;
    console.log('Tone.js OK, oscillators:', oscillators.length);
  } catch (e) {
    audioStarted = false;
    console.error('Tone.js init failed:', e);
  }

  // カメラ取得試行
  try {
    video = createCapture(VIDEO, () => {
      video.size(CANVAS_W, CANVAS_H);
      video.hide();
    });
    useCamera = true;
  } catch (e) {
    useCamera = false;
  }
}

document.getElementById('start-overlay').addEventListener('click', async () => {
  document.getElementById('start-overlay').style.display = 'none';
  await startWithCamera();
});

// ===== 輝度スキャン（カメラまたはデモ） =====
function computeRowBrightness(srcPx, vw, vh) {
  const rowBrightness = new Float32Array(SCAN_ROWS);
  const rowHeight = Math.floor(vh / SCAN_ROWS);
  for (let r = 0; r < SCAN_ROWS; r++) {
    const yStart = r * rowHeight;
    const yEnd = Math.min(yStart + rowHeight, vh);
    let sumBright = 0;
    let count = 0;
    const xStart = Math.floor(vw * 0.1);
    const xEnd = Math.floor(vw * 0.9);
    const step = 4;
    for (let y = yStart; y < yEnd; y += step) {
      for (let x = xStart; x < xEnd; x += step) {
        const idx = (y * vw + x) * 4;
        sumBright += 0.299 * srcPx[idx] + 0.587 * srcPx[idx + 1] + 0.114 * srcPx[idx + 2];
        count++;
      }
    }
    rowBrightness[r] = count > 0 ? sumBright / count / 255 : 0.5;
  }
  return rowBrightness;
}

function draw() {
  background(242, 239, 232);

  // デモモード：時間でゆっくりノイズをアニメ
  demoT += 0.005;

  // ===== ソースピクセル取得 =====
  let srcPx = null;
  let vw = CANVAS_W;
  let vh = CANVAS_H;

  if (useCamera && video && video.width > 0) {
    video.loadPixels();
    if (video.pixels && video.pixels.length > 0) {
      srcPx = video.pixels;
      vw = video.width;
      vh = video.height;
    }
  }

  if (!srcPx) {
    // デモモード：ノイズで揺れるシルエット
    if (!demoPixels) return;
    // 時間変化でデモ輝度を更新
    srcPx = new Uint8Array(CANVAS_W * CANVAS_H * 4);
    for (let y = 0; y < CANVAS_H; y++) {
      for (let x = 0; x < CANVAS_W; x++) {
        const base_idx = (y * CANVAS_W + x) * 4;
        // ゆっくり揺れるノイズを加算
        const wiggle = (noise(x * 0.012 + demoT, y * 0.012 + demoT * 0.7) - 0.5) * 50;
        const r_val = Math.min(255, Math.max(0, demoPixels[base_idx]     + wiggle * 0.4));
        const g_val = Math.min(255, Math.max(0, demoPixels[base_idx + 1] + wiggle * 0.3));
        const b_val = Math.min(255, Math.max(0, demoPixels[base_idx + 2] + wiggle * 0.2));
        srcPx[base_idx]     = r_val;
        srcPx[base_idx + 1] = g_val;
        srcPx[base_idx + 2] = b_val;
        srcPx[base_idx + 3] = 255;
      }
    }
  }

  const rowBrightness = computeRowBrightness(srcPx, vw, vh);

  // ===== オシレーター更新 =====
  if (audioStarted && oscillators.length > 0) {
    for (let i = 0; i < NUM_OSC; i++) {
      const row = oscScanRows[i];
      const bright = rowBrightness[row];
      const baseFreqs2 = [220, 330, 440, 550, 660, 880];
      const baseFreq = baseFreqs2[i];
      oscillators[i].frequency.rampTo(baseFreq + bright * baseFreq * 0.15, 0.1);
      const brightness01 = Math.abs(bright - 0.5) * 2;
      oscillators[i].volume.rampTo(-24 + (1 - brightness01) * 18, 0.1);
    }

    let meanBright = 0;
    for (let r = 0; r < SCAN_ROWS; r++) meanBright += rowBrightness[r];
    meanBright /= SCAN_ROWS;
    let variance = 0;
    for (let r = 0; r < SCAN_ROWS; r++) {
      variance += (rowBrightness[r] - meanBright) ** 2;
    }
    variance /= SCAN_ROWS;
    const contrast = Math.sqrt(variance) * 4;

    // デモモードではゲインを小さく保つ（カメラ接続後に上げる）
    if (!useCamera) {
      // デモ：ノイズで擬似的に音波形をアニメさせる
      // gainNode.gain は 0 のまま（音は出ない）
    }
  }

  // ===== ウープバッファ計算 =====
  // デモモードでは時間ベースのサイン波でワープを生成
  const warpStrength = useCamera ? 30 : 18;

  if (!useCamera) {
    // デモ：複数サイン波の合成でゆらぎを作る
    for (let y = 0; y < CANVAS_H; y++) {
      const t = demoT * 2;
      const wave = Math.sin(y * 0.04 + t) * 0.5 +
                   Math.sin(y * 0.011 + t * 1.3) * 0.3 +
                   Math.sin(y * 0.022 + t * 0.7) * 0.2;
      const target = wave * warpStrength;
      warpBuffer[y] = warpBuffer[y] * 0.7 + target * 0.3;
    }
  } else if (toneWaveform) {
    const waveform = toneWaveform.getValue();
    for (let y = 0; y < CANVAS_H; y++) {
      const wIdx = Math.floor((y / CANVAS_H) * waveform.length);
      const wave = waveform[Math.min(wIdx, waveform.length - 1)];
      const target = wave * warpStrength;
      warpBuffer[y] = warpBuffer[y] * 0.6 + target * 0.4;
    }
  }

  // ===== ワープ付き描画（グレースケール） =====
  loadPixels();
  const dstPx = pixels;

  for (let y = 0; y < CANVAS_H; y++) {
    const offsetX = Math.round(warpBuffer[y]);
    for (let x = 0; x < CANVAS_W; x++) {
      const sx = vw - 1 - x + offsetX; // 左右ミラー + オフセット
      const sy = y;
      const dstIdx = (y * CANVAS_W + x) * 4;
      if (sx < 0 || sx >= vw || sy < 0 || sy >= vh) {
        dstPx[dstIdx]     = 242;
        dstPx[dstIdx + 1] = 239;
        dstPx[dstIdx + 2] = 232;
        dstPx[dstIdx + 3] = 255;
      } else {
        const srcIdx = (sy * vw + sx) * 4;
        const rv = srcPx[srcIdx];
        const gv = srcPx[srcIdx + 1];
        const bv = srcPx[srcIdx + 2];
        const gray = Math.round(0.299 * rv + 0.587 * gv + 0.114 * bv);
        // セピア寄りグレー
        dstPx[dstIdx]     = Math.min(255, gray + 8);
        dstPx[dstIdx + 1] = Math.min(255, gray + 3);
        dstPx[dstIdx + 2] = Math.max(0,   gray - 8);
        dstPx[dstIdx + 3] = 255;
      }
    }
  }
  updatePixels();

  // ===== スキャンライン強調 =====
  noFill();
  strokeWeight(0.5);
  for (let y = 0; y < CANVAS_H; y += 2) {
    const warp = Math.abs(warpBuffer[y]);
    if (warp > 2) {
      const alpha = map(warp, 2, warpStrength, 0, 20);
      stroke(60, 55, 45, alpha);
      line(0, y, CANVAS_W, y);
    }
  }
}
</script>

<script>
window.SKETCH_META = {
  num:    '313',
  title:  'Loom',
  detail: 'カメラとマイクへのアクセスを許可してから「クリックして開始」を押してください。カメラに映った映像の明暗を読み取り、6つの音の高さと大きさに変換します。その音の波形が映像の各行を横方向にずらし、鏡のように映る自分の像が縦波のように揺れます。カメラに近づいたり動いたりすると音が変わり、鏡面の歪み方も変わります。'
};
</script>
<script src="../../js/sketch-ui.js"></script>
</body>
</html>
