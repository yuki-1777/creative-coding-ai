  <title>117 — Flock</title>
  <meta name="description" content="群れは個体のルールの合計ではない。">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #F5F3EE; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 0, 28);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0xF5F3EE);
    document.body.appendChild(renderer.domElement);

    const COUNT = 120;
    const BOUNDS = 10;

    // Boids パラメータ
    const SEPARATION_RADIUS = 1.5;
    const ALIGNMENT_RADIUS  = 3.0;
    const COHESION_RADIUS   = 4.0;
    const W_SEPARATION = 1.8;
    const W_ALIGNMENT  = 1.0;
    const W_COHESION   = 0.9;
    const MAX_SPEED    = 0.12;
    const MAX_FORCE    = 0.006;
    const FLEE_RADIUS  = 4.0;
    const W_FLEE       = 2.5;

    // 個体の状態
    const pos = [];
    const vel = [];
    const acc = [];

    for (let i = 0; i < COUNT; i++) {
      pos.push(new THREE.Vector3(
        (Math.random() - 0.5) * BOUNDS * 2,
        (Math.random() - 0.5) * BOUNDS * 2,
        (Math.random() - 0.5) * BOUNDS * 0.5
      ));
      const angle = Math.random() * Math.PI * 2;
      vel.push(new THREE.Vector3(
        Math.cos(angle) * MAX_SPEED * 0.5,
        Math.sin(angle) * MAX_SPEED * 0.5,
        0
      ));
      acc.push(new THREE.Vector3());
    }

    // 矢印型のシェイプ（小さな三角形）
    function makeBirdGeometry() {
      const shape = new THREE.Shape();
      shape.moveTo(0, 0.28);
      shape.lineTo(-0.13, -0.16);
      shape.lineTo(0,  -0.06);
      shape.lineTo(0.13, -0.16);
      shape.closePath();
      const geo = new THREE.ShapeGeometry(shape);
      return geo;
    }

    const birdGeo = makeBirdGeometry();
    const birdMat = new THREE.MeshBasicMaterial({ color: 0x2A2826 });

    const meshes = [];
    for (let i = 0; i < COUNT; i++) {
      const m = new THREE.Mesh(birdGeo, birdMat);
      scene.add(m);
      meshes.push(m);
    }

    // マウス位置（3D平面上）
    const mousePos3D = new THREE.Vector3(9999, 9999, 0);
    const raycaster = new THREE.Raycaster();
    const mouse2D = new THREE.Vector2();
    const floorPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(200, 200),
      new THREE.MeshBasicMaterial({ visible: false })
    );
    scene.add(floorPlane);

    window.addEventListener('mousemove', e => {
      mouse2D.x =  (e.clientX / window.innerWidth)  * 2 - 1;
      mouse2D.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse2D, camera);
      const hits = raycaster.intersectObject(floorPlane);
      if (hits.length > 0) mousePos3D.copy(hits[0].point);
    });

    function limit(v, max) {
      if (v.length() > max) {
        v.normalize().multiplyScalar(max);
      }
    }

    const tmpVec = new THREE.Vector3();

    function boids() {
      for (let i = 0; i < COUNT; i++) {
        const sep = new THREE.Vector3();
        const ali = new THREE.Vector3();
        const coh = new THREE.Vector3();
        let sepCount = 0, aliCount = 0, cohCount = 0;

        for (let j = 0; j < COUNT; j++) {
          if (i === j) continue;
          const d = pos[i].distanceTo(pos[j]);
          if (d < SEPARATION_RADIUS && d > 0) {
            tmpVec.copy(pos[i]).sub(pos[j]).normalize().divideScalar(d);
            sep.add(tmpVec);
            sepCount++;
          }
          if (d < ALIGNMENT_RADIUS) {
            ali.add(vel[j]);
            aliCount++;
          }
          if (d < COHESION_RADIUS) {
            coh.add(pos[j]);
            cohCount++;
          }
        }

        if (sepCount > 0) { sep.divideScalar(sepCount); limit(sep, MAX_FORCE * W_SEPARATION); }
        if (aliCount > 0) {
          ali.divideScalar(aliCount);
          ali.normalize().multiplyScalar(MAX_SPEED);
          ali.sub(vel[i]);
          limit(ali, MAX_FORCE * W_ALIGNMENT);
        }
        if (cohCount > 0) {
          coh.divideScalar(cohCount);
          coh.sub(pos[i]).normalize().multiplyScalar(MAX_SPEED);
          coh.sub(vel[i]);
          limit(coh, MAX_FORCE * W_COHESION);
        }

        // マウス逃避
        const flee = new THREE.Vector3();
        const mouseDist = pos[i].distanceTo(mousePos3D);
        if (mouseDist < FLEE_RADIUS && mouseDist > 0) {
          flee.copy(pos[i]).sub(mousePos3D).normalize().multiplyScalar(MAX_SPEED);
          flee.sub(vel[i]);
          limit(flee, MAX_FORCE * W_FLEE * (1 - mouseDist / FLEE_RADIUS));
        }

        acc[i].set(0, 0, 0).add(sep).add(ali).add(coh).add(flee);
      }

      for (let i = 0; i < COUNT; i++) {
        vel[i].add(acc[i]);
        limit(vel[i], MAX_SPEED);
        pos[i].add(vel[i]);

        // 境界ラップ
        if (pos[i].x >  BOUNDS) pos[i].x = -BOUNDS;
        if (pos[i].x < -BOUNDS) pos[i].x =  BOUNDS;
        if (pos[i].y >  BOUNDS) pos[i].y = -BOUNDS;
        if (pos[i].y < -BOUNDS) pos[i].y =  BOUNDS;

        // 向きを速度方向に合わせる
        const angle = Math.atan2(vel[i].x, vel[i].y);
        meshes[i].position.copy(pos[i]);
        meshes[i].rotation.z = -angle;
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      boids();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
  <script>
  window.SKETCH_META = {
    num:    '117',
    title:  'Flock',
    desc:   '120個の点に3つのルールを与えた。近すぎたら離れる。隣と同じ向きに揃える。群れの中心に近づく。それだけで群れができた。',
    detail: 'マウスカーソルを近づけると、近くの個体が逃げます。個体どうしは「近すぎたら離れる」「隣に揃える」「中心に寄る」という3つのルールだけで動いています。指示された動きではなく、ルールの合計として群れが生まれています。'
  };
  </script>
  <script src="../../js/sketch-ui.js"></script>
</body>
</html>
