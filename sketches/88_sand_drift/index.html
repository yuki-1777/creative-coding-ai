    body { overflow: hidden; background: #F5F3EE; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2, 7);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0xF5F3EE);
    document.body.appendChild(renderer.domElement);

    // 砂粒のパーティクル
    const COUNT = 8000;
    const RANGE = 4;

    const positions = new Float32Array(COUNT * 3);
    const velocities = new Float32Array(COUNT * 3);
    const phases = new Float32Array(COUNT);

    for (let i = 0; i < COUNT; i++) {
      positions[i * 3]     = (Math.random() - 0.5) * RANGE * 2;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 1.5;
      positions[i * 3 + 2] = (Math.random() - 0.5) * RANGE * 2;
      velocities[i * 3]     = 0;
      velocities[i * 3 + 1] = 0;
      velocities[i * 3 + 2] = 0;
      phases[i] = Math.random() * Math.PI * 2;
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const mat = new THREE.PointsMaterial({
      color: 0x2A2826,
      size: 0.018,
      transparent: true,
      opacity: 0.5,
    });
    const particles = new THREE.Points(geo, mat);
    scene.add(particles);

    // マウス
    const mouse = new THREE.Vector2(0, 0);
    window.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
      mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
    });

    // シンプルなノイズ関数
    function noise(x, y, t) {
      return Math.sin(x * 1.3 + t) * Math.cos(y * 0.8 + t * 0.7) +
             Math.sin(x * 2.1 + y * 1.5 + t * 1.2) * 0.5;
    }

    let time = 0;

    function animate() {
      requestAnimationFrame(animate);
      time += 0.005;

      const windX = mouse.x * 0.3;
      const windZ = mouse.y * 0.3;

      for (let i = 0; i < COUNT; i++) {
        let px = positions[i * 3];
        let py = positions[i * 3 + 1];
        let pz = positions[i * 3 + 2];

        // ノイズによる風
        const nx = noise(px * 0.5, pz * 0.5, time) * 0.003;
        const nz = noise(px * 0.5 + 100, pz * 0.5, time) * 0.003;

        positions[i * 3]     += windX * 0.008 + nx;
        positions[i * 3 + 1] += Math.sin(time * 0.4 + phases[i]) * 0.001;
        positions[i * 3 + 2] += windZ * 0.008 + nz;

        // 境界でループ
        if (positions[i * 3] > RANGE)  positions[i * 3] -= RANGE * 2;
        if (positions[i * 3] < -RANGE) positions[i * 3] += RANGE * 2;
        if (positions[i * 3 + 2] > RANGE)  positions[i * 3 + 2] -= RANGE * 2;
        if (positions[i * 3 + 2] < -RANGE) positions[i * 3 + 2] += RANGE * 2;
      }

      geo.attributes.position.needsUpdate = true;

      // ゆっくり全体を回す
      scene.rotation.y = time * 0.03;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
  <script>
  window.SKETCH_META = {
    num:   '88',
    title: 'Sand Drift',
    desc:  '8000粒の砂に風を当てた。行き先が見えないのに、流れは決まっていく。'
  };
  </script>

</body>
