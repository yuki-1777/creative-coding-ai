<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
let particles = [];
let t = 0;
let phase = 'form'; // 'form' | 'hold' | 'dissolve' | 'reform'
let phaseTimer = 0;
let shapeIndex = 0;

const SHAPES = ['circle', 'square', 'triangle', 'cross'];
const N = 280;

function targetPos(i, shape) {
  const cx = width / 2;
  const cy = height / 2;
  const r = min(width, height) * 0.25;
  const total = N;

  if (shape === 'circle') {
    const angle = (i / total) * TWO_PI;
    return { x: cx + cos(angle) * r, y: cy + sin(angle) * r };
  }
  if (shape === 'square') {
    const perimeter = 4 * r * 2;
    const pos = (i / total) * perimeter;
    const side = r * 2;
    if (pos < side) return { x: cx - r + pos, y: cy - r };
    if (pos < side * 2) return { x: cx + r, y: cy - r + (pos - side) };
    if (pos < side * 3) return { x: cx + r - (pos - side * 2), y: cy + r };
    return { x: cx - r, y: cy + r - (pos - side * 3) };
  }
  if (shape === 'triangle') {
    const angle = (i / total) * TWO_PI + PI / 2;
    const tri = floor((i / total) * 3);
    const frac = ((i / total) * 3) % 1;
    const a0 = PI / 2 + (tri / 3) * TWO_PI;
    const a1 = PI / 2 + ((tri + 1) / 3) * TWO_PI;
    return {
      x: cx + (cos(a0) * (1 - frac) + cos(a1) * frac) * r,
      y: cy + (sin(a0) * (1 - frac) + sin(a1) * frac) * r,
    };
  }
  if (shape === 'cross') {
    const arm = floor((i / total) * 4);
    const frac = ((i / total) * 4) % 1;
    const armLen = r;
    const armW = r * 0.25;
    if (arm === 0) return { x: cx - armLen + frac * armLen * 2, y: cy - armW };
    if (arm === 1) return { x: cx - armLen + frac * armLen * 2, y: cy + armW };
    if (arm === 2) return { x: cx - armW, y: cy - armLen + frac * armLen * 2 };
    return { x: cx + armW, y: cy - armLen + frac * armLen * 2 };
  }
  return { x: cx, y: cy };
}

function initParticles() {
  particles = [];
  for (let i = 0; i < N; i++) {
    const tp = targetPos(i, SHAPES[shapeIndex]);
    particles.push({
      x: random(width * 0.2, width * 0.8),
      y: random(height * 0.2, height * 0.8),
      tx: tp.x,
      ty: tp.y,
      vx: 0,
      vy: 0,
      index: i,
      driftVx: (random() - 0.5) * 0.8,
      driftVy: (random() - 0.5) * 0.8 + 0.3,
      alpha: 255,
    });
  }
  phase = 'form';
  phaseTimer = 0;
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(RGB);
  initParticles();
}

function draw() {
  background(245, 243, 238, 25);
  t++;
  phaseTimer++;

  if (phase === 'form' && phaseTimer > 180) {
    phase = 'hold';
    phaseTimer = 0;
  } else if (phase === 'hold' && phaseTimer > 100) {
    phase = 'dissolve';
    phaseTimer = 0;
  } else if (phase === 'dissolve' && phaseTimer > 200) {
    shapeIndex = (shapeIndex + 1) % SHAPES.length;
    for (let i = 0; i < N; i++) {
      const tp = targetPos(i, SHAPES[shapeIndex]);
      particles[i].tx = tp.x;
      particles[i].ty = tp.y;
      particles[i].x = random(width * 0.1, width * 0.9);
      particles[i].y = random(height * 0.1, height * 0.9);
      particles[i].vx = 0;
      particles[i].vy = 0;
    }
    phase = 'form';
    phaseTimer = 0;
  }

  for (const p of particles) {
    if (phase === 'form' || phase === 'hold') {
      // Attract toward target
      const dx = p.tx - p.x;
      const dy = p.ty - p.y;
      const k = phase === 'form' ? 0.06 : 0.04;
      p.vx += dx * k;
      p.vy += dy * k;

      // Noise wobble
      const nx = noise(p.x * 0.006, p.y * 0.006, t * 0.015);
      p.vx += (nx - 0.5) * 0.2;
      p.vy += (noise(p.x * 0.006 + 200, p.y * 0.006, t * 0.015) - 0.5) * 0.2;

      p.vx *= 0.85;
      p.vy *= 0.85;
    } else {
      // Dissolve: drift away with noise
      const nx = noise(p.x * 0.008, p.y * 0.008, t * 0.02);
      p.vx += (nx - 0.5) * 0.4 + p.driftVx * 0.04;
      p.vy += (noise(p.x * 0.008 + 300, p.y * 0.008, t * 0.02) - 0.5) * 0.4 + p.driftVy * 0.04;
      p.vx *= 0.97;
      p.vy *= 0.97;
    }

    p.x += p.vx;
    p.y += p.vy;

    // Alpha based on phase
    let alpha;
    if (phase === 'form') {
      alpha = map(phaseTimer, 0, 80, 40, 120);
    } else if (phase === 'hold') {
      alpha = 130;
    } else {
      alpha = map(phaseTimer, 0, 200, 120, 10);
    }

    noStroke();
    fill(52, 48, 42, alpha);
    const size = phase === 'hold' ? 2.2 : 1.8;
    circle(p.x, p.y, size);
  }

  // Shape name hint
  if (phase === 'hold') {
    noStroke();
    fill(42, 42, 42, map(phaseTimer, 0, 30, 0, 28));
    textSize(11);
    textAlign(CENTER, TOP);
    text(SHAPES[shapeIndex], width / 2, height * 0.72);
  }
}

function mousePressed() {
  initParticles();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background('#F5F3EE');
}
</script>

};
</script>
