<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strata</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f2f1ee; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const gl = canvas.getContext('webgl', { preserveDrawingBuffer: true });
if (!gl) { document.body.innerHTML = 'WebGL not supported'; }

const VS = `
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
`;

const FS = `
precision highp float;
uniform vec2  u_res;
uniform float u_time;
uniform vec2  u_mouse;

float hash(float n) {
  return fract(sin(n) * 43758.5453123);
}

float noise1d(float x) {
  float i = floor(x);
  float f = fract(x);
  float u = f * f * (3.0 - 2.0 * f);
  return mix(hash(i), hash(i + 1.0), u);
}

// Fractal 1D noise for layer boundary
float fbm1d(float x) {
  float v = 0.0;
  float a = 0.5;
  float freq = 1.0;
  for (int i = 0; i < 5; i++) {
    v += a * noise1d(x * freq);
    freq *= 2.1;
    a *= 0.5;
  }
  return v;
}

void main() {
  vec2 uv = gl_FragCoord.xy / u_res;

  // Mouse: x = horizontal shift, y = compression factor
  float mx = u_mouse.x / u_res.x;
  float my = 1.0 - u_mouse.y / u_res.y;
  float compression = 0.5 + my * 1.2; // 0.5 - 1.7 range

  // Number of strata layers
  float NUM_LAYERS = 14.0;

  // Slow horizontal drift
  float drift = u_time * 0.015;

  // Strata deformation: x-varying layer boundaries
  // uv.y compressed/stretched by compression factor
  float y = pow(uv.y, compression);

  // Layer index
  float layerY = y * NUM_LAYERS;

  // Each layer boundary has fbm noise
  float li = floor(layerY);
  float lf = fract(layerY);

  // Boundary shape: narrow band = the "line" between layers
  float boundary = fbm1d(uv.x * 3.0 + li * 7.43 + drift) * 0.5;
  boundary += fbm1d(uv.x * 1.4 + li * 3.21 - drift * 0.7) * 0.3;
  boundary = boundary / 0.8; // normalize roughly

  // Layer color: alternating tones in graphite + one warm accent
  // Layer 0, 2, 4... -> light gray
  // Layer 1, 3, 5... -> medium gray
  // Special layers: warm sepia tint
  float isWarm = step(0.5, hash(li * 0.37 + 91.23));
  float isWarm2 = step(0.8, hash(li * 0.11 + 17.77));

  float baseLight = 0.85 + hash(li * 0.23) * 0.08;
  vec3 layerColor;
  if (isWarm2 > 0.5) {
    // Sepia accent layer
    layerColor = vec3(baseLight * 0.88, baseLight * 0.84, baseLight * 0.72);
  } else {
    float v = baseLight - hash(li * 0.13) * 0.15;
    layerColor = vec3(v, v * 0.99, v * 0.97);
  }

  // Border line at each layer transition
  float borderWidth = 0.03 + hash(li * 0.71) * 0.02;
  float distToBorder = abs(lf - boundary);
  float border = smoothstep(borderWidth, 0.0, distToBorder);

  // Border color: dark graphite
  vec3 borderColor = vec3(0.22, 0.20, 0.19);

  // Subtle texture within layer
  float tex = fbm1d(uv.x * 12.0 + li * 2.3 + drift * 0.3) * 0.025;
  layerColor += vec3(tex * 0.5, tex * 0.4, tex * 0.3);

  vec3 col = mix(layerColor, borderColor, border * 0.9);
  col = clamp(col, 0.0, 1.0);

  gl_FragColor = vec4(col, 1.0);
}
`;

function makeShader(gl, type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
  }
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, makeShader(gl, gl.VERTEX_SHADER, VS));
gl.attachShader(prog, makeShader(gl, gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uRes = gl.getUniformLocation(prog, 'u_res');
const uTime = gl.getUniformLocation(prog, 'u_time');
const uMouse = gl.getUniformLocation(prog, 'u_mouse');

let mx = canvas.width / 2, my = canvas.height / 2;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

let t = 0;
function render() {
  requestAnimationFrame(render);
  t += 0.016;
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, t);
  gl.uniform2f(uMouse, mx, my);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);
});

render();
</script>

<script>
window.SKETCH_META = {
  num:    '223',
  title:  'Strata',
  detail: '存在しない地層の断面図を描きました。14層の縞がゆっくり横に流れています。マウスを上下に動かすと地層が圧縮・伸張し、形が変わります。境界線は1D フラクタルノイズで曲がっています。グラファイトと微量のセピア色だけ使いました。'
};
</script>
<script src="../../js/sketch-ui.js"></script>
</body>
</html>
