<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>184 – Bubble</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f4f0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
let bubbles = [];

class Bubble {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.r = random(20, 80);
    this.vx = random(-0.4, 0.4);
    this.vy = random(-1.2, -0.3);
    this.life = 1.0;
    this.decayRate = random(0.003, 0.008);
    this.phase = random(TWO_PI);
    this.wobble = random(0.02, 0.06);
    this.popping = false;
    this.popProgress = 0;
    this.popFragments = [];
  }

  pop() {
    if (this.popping) return;
    this.popping = true;
    // 割れた破片を作る
    let count = floor(random(8, 14));
    for (let i = 0; i < count; i++) {
      let angle = (TWO_PI / count) * i + random(-0.3, 0.3);
      this.popFragments.push({
        x: this.x,
        y: this.y,
        vx: cos(angle) * random(1, 3),
        vy: sin(angle) * random(1, 3),
        len: random(8, 20),
        life: 1.0
      });
    }
  }

  update() {
    if (this.popping) {
      this.popProgress += 0.05;
      for (let f of this.popFragments) {
        f.x += f.vx;
        f.y += f.vy;
        f.life -= 0.06;
        f.vy += 0.05;
      }
      if (this.popProgress >= 1.0) this.life = 0;
      return;
    }
    this.x += this.vx + sin(frameCount * 0.02 + this.phase) * 0.5;
    this.y += this.vy;
    this.life -= this.decayRate;
    this.r += 0.1;
    // 画面外や寿命切れで割れる
    if (this.life <= 0.1 || this.y - this.r < 0) {
      this.pop();
    }
  }

  draw() {
    if (this.popping) {
      // 破片を描く
      for (let f of this.popFragments) {
        if (f.life <= 0) continue;
        let a = f.life * 0.6;
        stroke(80, 80, 80, a * 255);
        strokeWeight(0.8);
        let nx = f.x + cos(atan2(f.vy, f.vx)) * f.len * (1 - f.life);
        let ny = f.y + sin(atan2(f.vy, f.vx)) * f.len * (1 - f.life);
        line(f.x - cos(atan2(f.vy, f.vx)) * 2, f.y - sin(atan2(f.vy, f.vx)) * 2, nx, ny);
      }
      return;
    }

    let alpha = this.life * 255;
    noFill();

    // 外側の輪
    strokeWeight(0.8);
    stroke(120, 120, 120, alpha * 0.7);
    ellipse(this.x, this.y, this.r * 2);

    // 虹色の薄い膜（1〜2本の弧で暗示）
    let shimmerAngle = frameCount * 0.015 + this.phase;
    let hue1 = (shimmerAngle * 30) % 360;
    colorMode(HSB, 360, 100, 100, 255);
    stroke(hue1, 30, 70, alpha * 0.5);
    strokeWeight(1.5);
    arc(this.x, this.y, this.r * 1.85, this.r * 1.85,
        shimmerAngle, shimmerAngle + PI * 0.6);
    stroke((hue1 + 60) % 360, 25, 65, alpha * 0.4);
    arc(this.x, this.y, this.r * 1.7, this.r * 1.7,
        shimmerAngle + PI, shimmerAngle + PI + PI * 0.5);
    colorMode(RGB, 255);

    // ハイライト（小さな白い弧）
    stroke(255, 255, 255, alpha * 0.6);
    strokeWeight(1.2);
    arc(this.x - this.r * 0.25, this.y - this.r * 0.3,
        this.r * 0.5, this.r * 0.4,
        -PI * 0.8, -PI * 0.1);
  }
}

function setup() {
  let c = createCanvas(600, 600);
  c.parent(document.body);
  // 最初から画面全体に泡を配置（グリッド的に分散）
  let positions = [
    [80, 100], [200, 150], [380, 80], [500, 130],
    [130, 280], [310, 250], [470, 300], [60, 400],
    [220, 380], [400, 420], [540, 350], [150, 520],
    [340, 510], [490, 480]
  ];
  for (let pos of positions) {
    let b = new Bubble(pos[0] + random(-20, 20), pos[1] + random(-20, 20));
    // 浮上速度をほぼゼロに（サムネイル時点でほぼ静止）
    b.vy = random(-0.1, -0.05);
    b.vx = random(-0.05, 0.05);
    b.life = random(0.5, 0.95);
    bubbles.push(b);
  }
}

function draw() {
  background(245, 244, 240);

  // たまに自動生成
  if (frameCount % 90 === 0) {
    bubbles.push(new Bubble(random(80, 520), random(480, 570)));
  }

  for (let i = bubbles.length - 1; i >= 0; i--) {
    bubbles[i].update();
    bubbles[i].draw();
    if (bubbles[i].life <= 0) {
      bubbles.splice(i, 1);
    }
  }
}

function mousePressed() {
  bubbles.push(new Bubble(mouseX, mouseY));
}
</script>

<script>
window.SKETCH_META = {
  num:   '184',
  title: 'Bubble',
  detail: 'クリックするとシャボン玉が生まれる。浮かんでいるうちに薄い膜が虹色にきらめき、やがて割れて細かな破片になる。90フレームごとに自動でも生まれる。'
};
</script>
<script src="../../js/sketch-ui.js"></script>
</body>
</html>
