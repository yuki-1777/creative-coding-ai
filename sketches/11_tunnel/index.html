<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Tunnel</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.06);

const camera = new THREE.PerspectiveCamera(80, innerWidth / innerHeight, 0.1, 100);

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

function buildPath() {
  const points = [];
  const N = 20;
  for (let i = 0; i <= N; i++) {
    const t = i / N;
    const angle = t * Math.PI * 6;
    const radius = 2.5;
    points.push(new THREE.Vector3(
      Math.cos(angle) * radius * 0.3,
      Math.sin(angle * 0.7) * 0.8,
      -t * 60
    ));
  }
  return new THREE.CatmullRomCurve3(points, false, 'catmullrom', 0.5);
}

const path = buildPath();

const tubeGeo = new THREE.TubeGeometry(path, 300, 1.8, 12, false);
const tubeMat = new THREE.MeshBasicMaterial({
  color: 0x0033ff,
  side: THREE.BackSide,
  wireframe: true,
  transparent: true,
  opacity: 0.25,
});
const tube = new THREE.Mesh(tubeGeo, tubeMat);
scene.add(tube);

const tubeSolidMat = new THREE.MeshPhongMaterial({
  color: 0x000511,
  emissive: 0x000022,
  side: THREE.BackSide,
  shininess: 60,
  specular: 0x0044ff,
  transparent: true,
  opacity: 0.5,
});
const tubeSolid = new THREE.Mesh(tubeGeo, tubeSolidMat);
scene.add(tubeSolid);

const ringCount = 80;
for (let i = 0; i < ringCount; i++) {
  const t = i / ringCount;
  const pos = path.getPoint(t);
  const tangent = path.getTangent(t);

  const ringGeo = new THREE.RingGeometry(1.6, 1.85, 32);
  const ringMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color().setHSL(t, 1.0, 0.6),
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0.5,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.copy(pos);
  ring.lookAt(pos.clone().add(tangent));
  scene.add(ring);
}

const particleCount = 2000;
const pPos = new Float32Array(particleCount * 3);
const pCol = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  const t = Math.random();
  const pt = path.getPoint(t);
  const angle = Math.random() * Math.PI * 2;
  const r = 0.3 + Math.random() * 1.3;
  pPos[i * 3]     = pt.x + Math.cos(angle) * r;
  pPos[i * 3 + 1] = pt.y + Math.sin(angle) * r;
  pPos[i * 3 + 2] = pt.z;
  const c = new THREE.Color().setHSL(t, 1.0, 0.7);
  pCol[i * 3]     = c.r;
  pCol[i * 3 + 1] = c.g;
  pCol[i * 3 + 2] = c.b;
}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
pGeo.setAttribute('color', new THREE.BufferAttribute(pCol, 3));
const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({
  size: 0.04,
  vertexColors: true,
  sizeAttenuation: true,
  transparent: true,
  opacity: 0.8,
}));
scene.add(particles);

const l1 = new THREE.PointLight(0x4444ff, 4, 12);
scene.add(l1);
const l2 = new THREE.PointLight(0xff44aa, 3, 10);
scene.add(l2);

const TUNNEL_LENGTH = 60;
const SPEED = 4.0;

let frameCount = 0;
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  const progress = ((t * SPEED) % TUNNEL_LENGTH) / TUNNEL_LENGTH;
  const safeProgress = Math.min(progress, 0.98);

  const camPos = path.getPoint(safeProgress);
  const lookAhead = path.getPoint(Math.min(safeProgress + 0.02, 0.99));

  camera.position.copy(camPos);
  camera.lookAt(lookAhead);

  const sway = 0.15;
  camera.position.x += Math.sin(t * 1.1) * sway;
  camera.position.y += Math.cos(t * 0.9) * sway * 0.5;

  l1.position.copy(camPos).add(new THREE.Vector3(
    Math.cos(t * 2) * 1.2,
    Math.sin(t * 1.5) * 0.8,
    1.5
  ));
  l2.position.copy(camPos).add(new THREE.Vector3(
    Math.cos(t * 1.3 + Math.PI) * 1.0,
    Math.sin(t * 2.1) * 0.6,
    -2
  ));

  renderer.render(scene, camera);

  frameCount++;
  if (frameCount === 60) {
    try {
      renderer.render(scene, camera);
      localStorage.setItem('thumb_11', renderer.domElement.toDataURL());
    } catch (e) {}
  }
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

animate();
</script>
<script>
window.SKETCH_META = {
  num:   '11',
  title: 'Tunnel',
  desc:  'Three.jsで構築したトンネル飛行シミュレーション。TubeGeometryとカメラパスアニメーションを組み合わせ、無限に続くように見えるサイバースペース的な空間を表現している。'
};
</script>
<script src="../../js/sketch-ui.js"></script>
</body>
</html>
