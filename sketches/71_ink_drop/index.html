<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>71 — Ink Drop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #F5F3EE; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const drops = [];

class InkDrop {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.rings = [];
    this.age = 0;
    this.maxAge = 220 + Math.random() * 80;
    // Generate ink spread petals
    const numPetals = 6 + Math.floor(Math.random() * 5);
    for (let i = 0; i < numPetals; i++) {
      const angle = (i / numPetals) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
      const dist = 5 + Math.random() * 20;
      const size = 8 + Math.random() * 16;
      this.rings.push({ angle, dist, size, phase: Math.random() * Math.PI * 2 });
    }
    this.maxRadius = 30 + Math.random() * 40;
  }

  draw(t) {
    this.age++;
    const progress = this.age / this.maxAge;
    if (progress > 1) return false;

    const eased = 1 - Math.pow(1 - Math.min(progress * 2, 1), 3);
    const fadeOut = progress > 0.6 ? 1 - (progress - 0.6) / 0.4 : 1;
    const alpha = 0.08 * fadeOut;

    // central ink blob
    const blobR = this.maxRadius * eased * 0.4;
    ctx.beginPath();
    ctx.arc(this.x, this.y, blobR, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(42, 42, 42, ${alpha * 1.5})`;
    ctx.fill();

    // spreading rings
    for (const ring of this.rings) {
      const rx = this.x + Math.cos(ring.angle) * ring.dist * eased;
      const ry = this.y + Math.sin(ring.angle) * ring.dist * eased;
      const r = ring.size * eased;
      ctx.beginPath();
      ctx.arc(rx, ry, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(42, 42, 42, ${alpha})`;
      ctx.fill();
    }

    // outer diffuse ring
    const outerR = this.maxRadius * eased;
    if (outerR > 2) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, outerR, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(42, 42, 42, ${alpha * 0.5})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }

    return progress < 1;
  }
}

// Auto-generate drops periodically
let autoTimer = 0;

function autoSpawn() {
  const margin = 80;
  const x = margin + Math.random() * (canvas.width - margin * 2);
  const y = margin + Math.random() * (canvas.height - margin * 2);
  drops.push(new InkDrop(x, y));
}

canvas.addEventListener('click', e => {
  drops.push(new InkDrop(e.clientX, e.clientY));
  // add a couple satellite drops
  for (let i = 0; i < 2; i++) {
    const angle = Math.random() * Math.PI * 2;
    const d = 10 + Math.random() * 30;
    drops.push(new InkDrop(
      e.clientX + Math.cos(angle) * d,
      e.clientY + Math.sin(angle) * d
    ));
  }
});

function draw(t) {
  requestAnimationFrame(draw);

  // Gentle fade trail
  ctx.fillStyle = 'rgba(245, 243, 238, 0.015)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  autoTimer++;
  if (autoTimer % 60 === 0) {
    autoSpawn();
  }

  for (let i = drops.length - 1; i >= 0; i--) {
    const alive = drops[i].draw(t);
    if (!alive) drops.splice(i, 1);
  }
}

// Initial drops
for (let i = 0; i < 4; i++) {
  setTimeout(() => autoSpawn(), i * 400);
}

draw(0);
</script>
<script>
window.SKETCH_META = {
  num:   '71',
  title: 'Ink Drop',
  desc:  'クリックするとインクが落ちる。少しずつ広がって、滲んで、消えていく。水に落ちたインクを見ていると、止まれない。'
};
</script>
<script src="../../js/sketch-ui.js"></script>
</body>
</html>
