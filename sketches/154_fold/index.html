<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>154 — Fold</title>
  <meta name="description" content="紙を折ろうとしたら、折り目が増えた。">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #F5F3EE; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0xF5F3EE);
    document.body.appendChild(renderer.domElement);

    // 正方形の紙をワイヤーフレームで表現し、折り変形を与える
    const SEGS = 28;
    const SIZE = 5;

    const geo = new THREE.PlaneGeometry(SIZE, SIZE, SEGS, SEGS);
    const posAttr = geo.attributes.position;
    const vertCount = posAttr.count;

    // 元の位置（XZ平面）を保存
    const base = new Float32Array(vertCount * 3);
    for (let i = 0; i < vertCount; i++) {
      base[i * 3]     = posAttr.getX(i);
      base[i * 3 + 1] = posAttr.getY(i);
      base[i * 3 + 2] = posAttr.getZ(i);
    }

    // ワイヤーフレーム
    const wireGeo = new THREE.WireframeGeometry(geo);
    const wireMat = new THREE.LineBasicMaterial({
      color: 0x2A2826,
      transparent: true,
      opacity: 0.3,
    });
    const wire = new THREE.LineSegments(wireGeo, wireMat);
    scene.add(wire);

    // 折り目線（アクセント）
    const foldLines = [];
    const FOLD_COUNT = 5;
    for (let f = 0; f < FOLD_COUNT; f++) {
      const positions = new Float32Array((SEGS + 1) * 3);
      const geo2 = new THREE.BufferGeometry();
      geo2.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const mat = new THREE.LineBasicMaterial({
        color: f === 0 ? 0x8A7055 : 0x2A2826,
        transparent: true,
        opacity: f === 0 ? 0.65 : 0.4,
      });
      const line = new THREE.Line(geo2, mat);
      scene.add(line);
      foldLines.push({ line, positions, foldIndex: f });
    }

    // マウス
    const mouse = { x: 0, y: 0 };
    window.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
      mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
    });

    let time = 0;

    // 紙の折り変形：複数の折り目
    function foldY(x, y, t) {
      // 複数の折り目（サインのスタッキング）
      const fold1 = Math.sin(x * 1.2 + t) * 0.5 * Math.cos(t * 0.3);
      const fold2 = Math.sin(y * 1.0 + t * 0.7) * 0.4 * Math.sin(t * 0.5);
      const fold3 = Math.sin((x + y) * 0.8 + t * 1.1) * 0.3;
      const mouseInfluence = Math.sin(x * mouse.x * 0.5 + y * mouse.y * 0.5 + t) * 0.25;
      return fold1 + fold2 + fold3 + mouseInfluence;
    }

    function animate() {
      requestAnimationFrame(animate);
      time += 0.007;

      // 頂点の高さ更新（XY平面 → 3D折り紙）
      for (let i = 0; i < vertCount; i++) {
        const x = base[i * 3];
        const y = base[i * 3 + 1];
        posAttr.setZ(i, foldY(x, y, time));
      }
      posAttr.needsUpdate = true;

      // ワイヤーフレーム再生成
      wire.geometry.dispose();
      wire.geometry = new THREE.WireframeGeometry(geo);

      // 折り目線（各行の中央列を通る縦ライン）
      foldLines.forEach(({ line, positions, foldIndex }) => {
        const step = SIZE / FOLD_COUNT;
        const xVal = -SIZE / 2 + step * foldIndex + step * 0.5;
        for (let j = 0; j <= SEGS; j++) {
          const yVal = -SIZE / 2 + (j / SEGS) * SIZE;
          const zVal = foldY(xVal, yVal, time);
          positions[j * 3]     = xVal;
          positions[j * 3 + 1] = yVal;
          positions[j * 3 + 2] = zVal;
        }
        line.geometry.attributes.position.needsUpdate = true;
      });

      // シーン回転
      scene.rotation.y = time * 0.05 + mouse.x * 0.3;
      scene.rotation.x = -0.3 + mouse.y * 0.2;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
  <script>
  window.SKETCH_META = {
    num:   '154',
    title: 'Fold',
    detail: '四角い紙が、複数の折り目に沿って変形し続けている。折り目は波のように動いて、紙が生き物のようにうねる。マウスを動かすと折り目の方向が変わり、違う形に折れる。'
  };
  </script>
  <script src="../../js/sketch-ui.js"></script>
</body>
</html>
