<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
<title>Morph</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

const SEGMENTS = 64;
const COUNT = (SEGMENTS + 1) * (SEGMENTS + 1);

function spherePositions() {
  const pos = new Float32Array(COUNT * 3);
  let idx = 0;
  for (let i = 0; i <= SEGMENTS; i++) {
    for (let j = 0; j <= SEGMENTS; j++) {
      const phi = (i / SEGMENTS) * Math.PI;
      const theta = (j / SEGMENTS) * Math.PI * 2;
      pos[idx++] = Math.sin(phi) * Math.cos(theta) * 1.5;
      pos[idx++] = Math.cos(phi) * 1.5;
      pos[idx++] = Math.sin(phi) * Math.sin(theta) * 1.5;
    }
  }
  return pos;
}

function torusPositions() {
  const pos = new Float32Array(COUNT * 3);
  const R = 1.2, r = 0.5;
  let idx = 0;
  for (let i = 0; i <= SEGMENTS; i++) {
    for (let j = 0; j <= SEGMENTS; j++) {
      const u = (i / SEGMENTS) * Math.PI * 2;
      const v = (j / SEGMENTS) * Math.PI * 2;
      pos[idx++] = (R + r * Math.cos(v)) * Math.cos(u);
      pos[idx++] = r * Math.sin(v);
      pos[idx++] = (R + r * Math.cos(v)) * Math.sin(u);
    }
  }
  return pos;
}

function knotPositions() {
  const pos = new Float32Array(COUNT * 3);
  let idx = 0;
  for (let i = 0; i <= SEGMENTS; i++) {
    for (let j = 0; j <= SEGMENTS; j++) {
      const u = (i / SEGMENTS) * Math.PI * 4;
      const v = (j / SEGMENTS) * Math.PI * 2;
      const r = 0.3 + 0.15 * Math.cos(1.5 * u);
      const x = r * Math.cos(u);
      const y = r * Math.sin(u);
      const z = 0.2 * Math.sin(1.5 * u);
      const tx = -1.5 * Math.sin(u) * r;
      const ty = 1.5 * Math.cos(u) * r;
      const tz = 0.3 * Math.cos(1.5 * u);
      const len = Math.sqrt(tx * tx + ty * ty + tz * tz) || 1;
      const nx = tx / len, ny = ty / len, nz = tz / len;
      const bx = ny * 0 - nz * 1, by = nz * 0 - nx * 0, bz = nx * 1 - ny * 0;
      const bl = Math.sqrt(bx * bx + by * by + bz * bz) || 1;
      pos[idx++] = x + 0.35 * (Math.cos(v) * (ny * bz - nz * by) / bl + Math.sin(v) * bx / bl);
      pos[idx++] = y + 0.35 * (Math.cos(v) * (nz * bx - nx * bz) / bl + Math.sin(v) * by / bl);
      pos[idx++] = z + 0.35 * (Math.cos(v) * (nx * by - ny * bx) / bl + Math.sin(v) * bz / bl);
    }
  }
  return pos;
}

const shapes = [spherePositions(), torusPositions(), knotPositions()];
const geo = new THREE.BufferGeometry();
const initPos = new Float32Array(shapes[0]);
geo.setAttribute('position', new THREE.BufferAttribute(initPos, 3));

for (let i = 0; i < shapes.length; i++) {
  geo.setAttribute(`morphTarget${i}`, new THREE.BufferAttribute(shapes[i], 3));
}

const mat = new THREE.MeshStandardMaterial({
  color: 0x8844ff,
  emissive: 0x220055,
  roughness: 0.3,
  metalness: 0.8,
  wireframe: false,
});

const mesh = new THREE.Mesh(geo, mat);
scene.add(mesh);

const wireMat = new THREE.MeshBasicMaterial({
  color: 0xcc88ff,
  wireframe: true,
  transparent: true,
  opacity: 0.2,
});
const wireMesh = new THREE.Mesh(geo, wireMat);
scene.add(wireMesh);

scene.add(new THREE.AmbientLight(0x221133, 2));
const l1 = new THREE.PointLight(0xaa44ff, 5, 15);
l1.position.set(3, 3, 3);
scene.add(l1);
const l2 = new THREE.PointLight(0x4488ff, 3, 15);
l2.position.set(-3, -2, -3);
scene.add(l2);

const posAttr = geo.getAttribute('position');
const posArr = posAttr.array;

function easeInOut(t) {
  return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
}

let frameCount = 0;
const clock = new THREE.Clock();
const PHASE_DUR = 3.0;

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  const total = shapes.length;
  const phase = (t / PHASE_DUR) % total;
  const fromIdx = Math.floor(phase) % total;
  const toIdx = (fromIdx + 1) % total;
  const alpha = easeInOut(phase - Math.floor(phase));

  const from = shapes[fromIdx];
  const to = shapes[toIdx];
  for (let i = 0; i < COUNT * 3; i++) {
    posArr[i] = from[i] + (to[i] - from[i]) * alpha;
  }
  posAttr.needsUpdate = true;
  geo.computeVertexNormals();

  mesh.rotation.y = t * 0.2;
  mesh.rotation.x = Math.sin(t * 0.15) * 0.3;
  wireMesh.rotation.copy(mesh.rotation);

  l1.position.x = Math.cos(t * 0.5) * 4;
  l1.position.z = Math.sin(t * 0.5) * 4;

  controls.update();
  renderer.render(scene, camera);

  frameCount++;
  if (frameCount === 60) {
    try {
      renderer.render(scene, camera);
      localStorage.setItem('thumb_09', renderer.domElement.toDataURL());
    } catch (e) {}
  }
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

animate();
</script>
</body>
</html>
