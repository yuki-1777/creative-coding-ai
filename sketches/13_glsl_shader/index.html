<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>GLSL Shader Art</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const gl = canvas.getContext('webgl');

const vert = `
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
`;

const frag = `
precision highp float;
uniform float u_time;
uniform vec2 u_res;

#define PI 3.14159265358979

float sdBox(vec3 p, vec3 b) {
  vec3 q = abs(p) - b;
  return length(max(q, 0.0)) + min(max(q.x, max(q.y, q.z)), 0.0);
}

vec2 cmul(vec2 a, vec2 b) {
  return vec2(a.x*b.x - a.y*b.y, a.x*b.y + a.y*b.x);
}

float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  vec2 shift = vec2(100.0);
  mat2 rot = mat2(cos(0.5), sin(0.5), -sin(0.5), cos(0.5));
  for (int i = 0; i < 6; i++) {
    float n = 0.0;
    vec2 q = floor(p);
    vec2 f = fract(p);
    f = f*f*(3.0-2.0*f);
    float a1 = fract(sin(dot(q,vec2(127.1,311.7)))*43758.5);
    float b1 = fract(sin(dot(q+vec2(1,0),vec2(127.1,311.7)))*43758.5);
    float c1 = fract(sin(dot(q+vec2(0,1),vec2(127.1,311.7)))*43758.5);
    float d1 = fract(sin(dot(q+vec2(1,1),vec2(127.1,311.7)))*43758.5);
    n = mix(mix(a1,b1,f.x),mix(c1,d1,f.x),f.y);
    v += a * n;
    p = rot * p * 2.0 + shift;
    a *= 0.5;
  }
  return v;
}

vec3 palette(float t) {
  vec3 a = vec3(0.5, 0.5, 0.5);
  vec3 b = vec3(0.5, 0.5, 0.5);
  vec3 c = vec3(1.0, 1.0, 1.0);
  vec3 d = vec3(0.00, 0.33, 0.67);
  return a + b * cos(2.0 * PI * (c * t + d));
}

void main() {
  vec2 uv = (gl_FragCoord.xy * 2.0 - u_res) / min(u_res.x, u_res.y);
  float t = u_time * 0.3;

  vec2 z = uv * 1.5;
  vec2 c = vec2(0.355 + sin(t*0.7)*0.1, 0.355 + cos(t*0.5)*0.1);

  float iter = 0.0;
  float smooth_iter = 0.0;
  const int MAX = 120;
  for (int i = 0; i < MAX; i++) {
    z = cmul(z, z) + c;
    if (dot(z, z) > 256.0) {
      smooth_iter = float(i) - log2(log2(dot(z,z))) + 4.0;
      iter = float(i);
      break;
    }
    iter = float(MAX);
    smooth_iter = float(MAX);
  }

  float n = smooth_iter / float(MAX);

  vec3 col = vec3(0.0);
  if (iter < float(MAX)) {
    float f1 = fbm(uv * 2.0 + vec2(t * 0.1, t * 0.07));
    col = palette(n * 2.5 + t * 0.2 + f1 * 0.3);
    col *= 0.8 + 0.2 * sin(n * 30.0 + t);
    col = pow(col, vec3(0.8));
  } else {
    float glow = fbm(uv * 1.5 + vec2(t*0.05, t*0.03));
    col = vec3(0.01, 0.02, 0.05) + vec3(0.0, 0.01, 0.03) * glow;
  }

  float vignette = 1.0 - 0.4 * dot(uv*0.6, uv*0.6);
  col *= vignette;

  gl_FragColor = vec4(col, 1.0);
}
`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, vert));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, frag));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'u_time');
const uRes = gl.getUniformLocation(prog, 'u_res');

let start = performance.now();

function render() {
  const t = (performance.now() - start) / 1000;
  gl.uniform1f(uTime, t);
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}

render();

setTimeout(() => {
  try { localStorage.setItem('thumb_13', canvas.toDataURL()); } catch(e) {}
}, 2000);
</script>
</body>
</html>
