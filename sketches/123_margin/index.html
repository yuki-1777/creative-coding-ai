  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #F5F3EE; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// One horizontal line that breathes vertically
// Constraint: only one moving element, only one visual element

let t = 0;
let mouseX = -1;
let mouseY = -1;

canvas.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});
canvas.addEventListener('mouseleave', () => {
  mouseX = -1;
  mouseY = -1;
});

// The line is a polyline that follows a slow sine wave
// but also responds to mouse proximity — the line curves toward or away from the cursor

const SEGMENTS = 200;

function getLineY(x, t, mouseX, mouseY) {
  const baseY = H * 0.5;

  // Breathing: slow sine
  const breath = Math.sin(t * 0.008) * H * 0.04;

  // Secondary slow oscillation
  const secondary = Math.sin(t * 0.003 + x * 0.002) * H * 0.012;

  let y = baseY + breath + secondary;

  // Mouse influence: if mouse is near the line, push it away
  if (mouseX >= 0) {
    const dist = Math.abs(x - mouseX);
    const influence = Math.exp(-dist * dist / (W * W * 0.003));
    const pushDir = (y > mouseY) ? 1 : -1;
    const pushStrength = H * 0.12 * influence;
    y += pushDir * pushStrength;
  }

  return y;
}

function tick() {
  requestAnimationFrame(tick);
  t++;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#F5F3EE';
  ctx.fillRect(0, 0, W, H);

  // Draw the single line
  const margin = W * 0.1;
  const segW = (W - margin * 2) / SEGMENTS;

  ctx.beginPath();
  for (let i = 0; i <= SEGMENTS; i++) {
    const x = margin + i * segW;
    const y = getLineY(x, t, mouseX, mouseY);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = 'rgba(42, 42, 42, 0.7)';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // Draw two small endpoint dots
  const x0 = margin;
  const xN = margin + SEGMENTS * segW;
  const y0 = getLineY(x0, t, mouseX, mouseY);
  const yN = getLineY(xN, t, mouseX, mouseY);

  ctx.beginPath();
  ctx.arc(x0, y0, 1.5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(42, 42, 42, 0.45)';
  ctx.fill();

  ctx.beginPath();
  ctx.arc(xN, yN, 1.5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(42, 42, 42, 0.45)';
  ctx.fill();
}

tick();
</script>

};
</script>
