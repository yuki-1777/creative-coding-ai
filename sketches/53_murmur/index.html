<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0xF5F3EE);
    document.body.appendChild(renderer.domElement);

    const N = 300;

    // 粒子データ
    const positions = new Float32Array(N * 3);
    const velocities = [];
    const phases = new Float32Array(N);

    for (let i = 0; i < N; i++) {
      // 球の表面近くに初期配置
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 1.5 + (Math.random() - 0.5) * 0.5;
      positions[i * 3 + 0] = r * Math.sin(phi) * Math.cos(theta);
      positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      positions[i * 3 + 2] = r * Math.cos(phi);

      velocities.push(new THREE.Vector3(
        (Math.random() - 0.5) * 0.02,
        (Math.random() - 0.5) * 0.02,
        (Math.random() - 0.5) * 0.02,
      ));
      phases[i] = Math.random() * Math.PI * 2;
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const mat = new THREE.PointsMaterial({
      color: 0x2A2826,
      size: 0.025,
      sizeAttenuation: true,
      transparent: true,
      opacity: 0.7,
    });

    const points = new THREE.Points(geo, mat);
    scene.add(points);

    // マウスで引力点を動かす
    const mouseWorld = new THREE.Vector3(0, 0, 0);
    const raycaster = new THREE.Raycaster();
    const mousePx = new THREE.Vector2(0, 0);

    window.addEventListener('mousemove', e => {
      mousePx.x = (e.clientX / window.innerWidth) * 2 - 1;
      mousePx.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    let time = 0;

    function animate() {
      requestAnimationFrame(animate);
      time += 0.01;

      // マウス位置をワールド座標に変換（z=0平面）
      raycaster.setFromCamera(mousePx, camera);
      const t = -raycaster.ray.origin.z / raycaster.ray.direction.z;
      mouseWorld.copy(raycaster.ray.origin).addScaledVector(raycaster.ray.direction, t);

      const pos = geo.attributes.position;

      for (let i = 0; i < N; i++) {
        const px = pos.getX(i);
        const py = pos.getY(i);
        const pz = pos.getZ(i);

        // 中心への引力
        const cx = 0, cy = 0, cz = 0;
        const dx = cx - px;
        const dy = cy - py;
        const dz = cz - pz;
        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) + 0.001;

        // 中心から少し離れた距離（1.2）に収束する
        const targetDist = 1.2;
        const force = (dist - targetDist) * 0.002;

        velocities[i].x += dx/dist * force;
        velocities[i].y += dy/dist * force;
        velocities[i].z += dz/dist * force;

        // マウスへの応答（近すぎると逃げる、少し遠いと引き寄せられる）
        const mx = mouseWorld.x - px;
        const my = mouseWorld.y - py;
        const mz = mouseWorld.z - pz;
        const md = Math.sqrt(mx*mx + my*my + mz*mz) + 0.001;
        if (md < 0.8) {
          // 近すぎ→逃げる（群れが散る瞬間）
          velocities[i].x -= mx/md * 0.004;
          velocities[i].y -= my/md * 0.004;
          velocities[i].z -= mz/md * 0.004;
        } else if (md < 2.5) {
          // 少し遠い→引き寄せられる
          velocities[i].x += mx/md * 0.0008;
          velocities[i].y += my/md * 0.0008;
          velocities[i].z += mz/md * 0.0008;
        }

        // 個別のノイズ（漂い）
        velocities[i].x += Math.sin(time * 0.7 + phases[i]) * 0.0004;
        velocities[i].y += Math.cos(time * 0.5 + phases[i] * 1.3) * 0.0004;
        velocities[i].z += Math.sin(time * 0.9 + phases[i] * 0.7) * 0.0003;

        // 減衰
        velocities[i].multiplyScalar(0.97);

        pos.setXYZ(i,
          px + velocities[i].x,
          py + velocities[i].y,
          pz + velocities[i].z,
        );
      }

      pos.needsUpdate = true;

      // 全体をゆっくり回転
      points.rotation.y = time * 0.05;
      points.rotation.x = Math.sin(time * 0.03) * 0.15;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>

  window.SKETCH_META = {

    desc:  '300個の点が、ひとつの球になろうとしている。近づきすぎると散らばる。少し遠いと引き寄せられる。群れはそうやって形を保っている。',
    detail: '300個の点が球の表面付近に漂い、中心に向かう引力で全体としては球の形を保っている。各点は個別にわずかにぶれながら動くため、生き物の群れのようなざわめきが生まれる。マウスカーソルを近づけると、近い点は逃げ、少し離れた点は引き寄せられる。群れを触れるような感覚がある。'
  };
  </script>
