<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Cellular Automaton</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <style>
    body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const CELL = 8;
let cols, rows;
let grid, next;
let gen = 0;
let hueOffset = 0;
let ages;

function setup() {
  createCanvas(800, 800);
  colorMode(HSB, 360, 100, 100, 100);
  cols = floor(width / CELL);
  rows = floor(height / CELL);
  grid = makeGrid(false);
  ages = makeGrid(0);
  next = makeGrid(false);
  randomize();
  frameRate(12);
}

function makeGrid(val) {
  let g = [];
  for (let i = 0; i < cols; i++) {
    g[i] = [];
    for (let j = 0; j < rows; j++) {
      g[i][j] = val;
    }
  }
  return g;
}

function randomize() {
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      grid[i][j] = random() > 0.65 ? true : false;
      ages[i][j] = grid[i][j] ? floor(random(1, 20)) : 0;
    }
  }
  gen = 0;
}

function countNeighbors(g, x, y) {
  let sum = 0;
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      if (dx === 0 && dy === 0) continue;
      let nx = (x + dx + cols) % cols;
      let ny = (y + dy + rows) % rows;
      if (g[nx][ny]) sum++;
    }
  }
  return sum;
}

function draw() {
  background(0, 0, 4);
  hueOffset += 0.4;

  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      let n = countNeighbors(grid, i, j);
      if (grid[i][j]) {
        next[i][j] = n === 2 || n === 3;
        ages[i][j] = next[i][j] ? ages[i][j] + 1 : 0;
      } else {
        next[i][j] = n === 3;
        if (next[i][j]) ages[i][j] = 1;
        else ages[i][j] = 0;
      }
    }
  }

  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      if (grid[i][j]) {
        let age = ages[i][j];
        let hue = (hueOffset + i * 1.2 + j * 0.8) % 360;
        let sat = map(age, 0, 60, 60, 90);
        let bri = map(age, 0, 60, 95, 70);
        let alpha = map(age, 0, 5, 40, 100);
        fill(hue, sat, bri, alpha);

        let glow = map(age, 0, 60, 3, 0);
        if (glow > 0) {
          noStroke();
          fill(hue, sat * 0.5, 100, 20);
          rect(i * CELL - glow, j * CELL - glow, CELL + glow * 2, CELL + glow * 2, 2);
        }

        noStroke();
        fill(hue, sat, bri, alpha);
        rect(i * CELL + 1, j * CELL + 1, CELL - 2, CELL - 2, 1);
      } else {
        let hue = (hueOffset + i * 1.2 + j * 0.8) % 360;
        fill(hue, 30, 12, 80);
        noStroke();
        rect(i * CELL + 1, j * CELL + 1, CELL - 2, CELL - 2, 1);
      }
    }
  }

  let tmp = grid;
  grid = next;
  next = tmp;
  gen++;

  if (gen > 500) randomize();

  if (frameCount === 60) {
    try {
      localStorage.setItem('thumb_05', document.querySelector('canvas').toDataURL());
    } catch(e) {}
  }
}

function mousePressed() {
  randomize();
}

function mouseDragged() {
  let i = floor(mouseX / CELL);
  let j = floor(mouseY / CELL);
  if (i >= 0 && i < cols && j >= 0 && j < rows) {
    grid[i][j] = true;
    ages[i][j] = 1;
    for (let dx = -1; dx <= 1; dx++) {
      for (let dy = -1; dy <= 1; dy++) {
        let ni = (i + dx + cols) % cols;
        let nj = (j + dy + rows) % rows;
        if (random() > 0.4) {
          grid[ni][nj] = true;
          ages[ni][nj] = 1;
        }
      }
    }
  }
}
</script>
</body>
</html>
