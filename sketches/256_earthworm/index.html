<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>256 – Earthworm</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0ece4; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
const SEG = 20;       // segments per worm
const WORMS = 16;

let worms = [];

function setup() {
  const sz = min(windowWidth, windowHeight);
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  for (let i = 0; i < WORMS; i++) {
    worms.push(new Worm());
  }
}

function draw() {
  background(36, 12, 94);

  for (let w of worms) {
    w.update();
    w.draw();
  }
}

class Worm {
  constructor() {
    this.reset();
  }

  reset() {
    let x = random(width * 0.05, width * 0.95);
    let y = random(height * 0.05, height * 0.95);
    this.segments = [];
    this.angle = random(TWO_PI);
    for (let i = 0; i < SEG; i++) {
      this.segments.push(createVector(x - cos(this.angle) * i * 11, y - sin(this.angle) * i * 11));
    }
    this.speed = random(0.8, 1.8);
    this.wander = random(0.02, 0.06);
    this.fleeing = false;
    this.fleeTimer = 0;
    this.thickness = random(5.5, 10.0);
    this.hue = random(22, 42);
    this.sat = random(30, 55);
    this.bri = random(35, 52);
    // peristalsis phase
    this.phase = random(TWO_PI);
  }

  update() {
    let head = this.segments[0];
    let mx = mouseX, my = mouseY;
    let d = dist(head.x, head.y, mx, my);

    // flee from mouse
    if (d < 120) {
      this.fleeing = true;
      this.fleeTimer = 60;
    }
    if (this.fleeTimer > 0) this.fleeTimer--;
    else this.fleeing = false;

    if (this.fleeing) {
      let away = atan2(head.y - my, head.x - mx);
      this.angle = lerp(this.angle, away, 0.15);
    } else {
      this.angle += random(-this.wander, this.wander);
    }

    let sp = this.fleeing ? this.speed * 2.4 : this.speed;
    let newHead = createVector(head.x + cos(this.angle) * sp, head.y + sin(this.angle) * sp);
    this.segments.unshift(newHead);
    this.segments.pop();

    this.phase += 0.12;

    // wrap edges
    if (newHead.x < -30) { for (let s of this.segments) s.x += width + 60; }
    if (newHead.x > width + 30) { for (let s of this.segments) s.x -= width + 60; }
    if (newHead.y < -30) { for (let s of this.segments) s.y += height + 60; }
    if (newHead.y > height + 30) { for (let s of this.segments) s.y -= height + 60; }
  }

  draw() {
    noFill();
    // draw body as series of circles with peristaltic thickness variation
    for (let i = SEG - 1; i >= 0; i--) {
      let seg = this.segments[i];
      // peristalsis: thickness pulses like a wave along body
      let wave = sin(this.phase - i * 0.45) * 0.3 + 0.7;
      let r = this.thickness * wave;
      // taper towards tail
      let taper = map(i, 0, SEG - 1, 1.0, 0.35);
      r *= taper;

      let alpha = map(i, 0, SEG - 1, 85, 30);
      let bri = this.bri + (i === 0 ? 8 : 0);

      fill(this.hue, this.sat, bri, alpha);
      noStroke();
      ellipse(seg.x, seg.y, r * 2, r * 2);

      // ring lines on body segments
      if (i % 2 === 0 && i > 0 && i < SEG - 1) {
        let next = this.segments[min(i + 1, SEG - 1)];
        let a = atan2(next.y - seg.y, next.x - seg.x);
        stroke(this.hue, this.sat + 10, this.bri - 15, alpha * 0.5);
        strokeWeight(0.4);
        let px = seg.x + cos(a + HALF_PI) * r;
        let py = seg.y + sin(a + HALF_PI) * r;
        let qx = seg.x + cos(a - HALF_PI) * r;
        let qy = seg.y + sin(a - HALF_PI) * r;
        line(px, py, qx, qy);
        noStroke();
      }
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>

<script>
window.SKETCH_META = {
  num:    '256',
  title:  'Earthworm',
  detail: 'ミミズたちが土の中を這い回っています。マウスを近づけると逃げます。体節が収縮・伸長しながら動く「蠕動運動」をコードで再現しました。'
};
</script>
<script src="../../js/sketch-ui.js"></script>
</body>
</html>
