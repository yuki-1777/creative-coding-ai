<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Julia Set</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 800;
canvas.width = W;
canvas.height = H;

const imgData = ctx.createImageData(W, H);
const data = imgData.data;

const MAX_ITER = 200;
const ZOOM_BASE = 1.8;

let zoom = ZOOM_BASE;
let cx = -0.7269, cy = 0.1889;
let animFrame = 0;
let thumbSaved = false;

const palettes = [
  t => [
    Math.floor(9*(1-t)*t*t*t*255),
    Math.floor(15*(1-t)*(1-t)*t*t*255),
    Math.floor(8.5*(1-t)*(1-t)*(1-t)*t*255)
  ],
  t => {
    const r = 0.5 + 0.5*Math.cos(2*Math.PI*(t + 0.0));
    const g = 0.5 + 0.5*Math.cos(2*Math.PI*(t + 0.33));
    const b = 0.5 + 0.5*Math.cos(2*Math.PI*(t + 0.67));
    return [Math.floor(r*255), Math.floor(g*255), Math.floor(b*255)];
  },
  t => {
    const r = 0.5 + 0.5*Math.cos(2*Math.PI*(1.0*t + 0.00));
    const g = 0.5 + 0.5*Math.cos(2*Math.PI*(0.8*t + 0.15));
    const b = 0.5 + 0.5*Math.cos(2*Math.PI*(0.6*t + 0.30));
    return [Math.floor(r*255), Math.floor(g*255), Math.floor(b*255)];
  }
];

function drawJulia(cx, cy, zoom) {
  const palIdx = Math.floor(animFrame / 180) % palettes.length;
  const pal = palettes[palIdx];

  for (let py = 0; py < H; py++) {
    for (let px = 0; px < W; px++) {
      let zx = (px - W/2) / (W * 0.5 / zoom);
      let zy = (py - H/2) / (H * 0.5 / zoom);

      let iter = 0;
      let smooth = 0;
      while (zx*zx + zy*zy <= 256 && iter < MAX_ITER) {
        const tmp = zx*zx - zy*zy + cx;
        zy = 2*zx*zy + cy;
        zx = tmp;
        iter++;
      }

      const i = (py * W + px) * 4;
      if (iter === MAX_ITER) {
        data[i] = 0; data[i+1] = 0; data[i+2] = 0; data[i+3] = 255;
      } else {
        smooth = iter + 1 - Math.log2(Math.log2(zx*zx + zy*zy));
        const t = smooth / MAX_ITER;
        const t2 = t * 4 % 1;
        const [r,g,b] = pal(t2);
        data[i]   = r;
        data[i+1] = g;
        data[i+2] = b;
        data[i+3] = 255;
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

const cParams = [
  { cx: -0.7269, cy: 0.1889 },
  { cx: -0.4,    cy: 0.6    },
  { cx: 0.285,   cy: 0.013  },
  { cx: -0.8,    cy: 0.156  },
  { cx: -0.7269, cy: 0.1889 },
];

let paramIdx = 0;
let interpT = 0;

function lerp(a, b, t) { return a + (b-a)*t; }

function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

function loop() {
  const totalFrames = 180;
  interpT = (animFrame % totalFrames) / totalFrames;

  const from = cParams[Math.floor(animFrame / totalFrames) % cParams.length];
  const to   = cParams[(Math.floor(animFrame / totalFrames)+1) % cParams.length];
  const et   = easeInOut(interpT);

  const curCx = lerp(from.cx, to.cx, et);
  const curCy = lerp(from.cy, to.cy, et);

  const zoomPulse = ZOOM_BASE * (1.0 + 0.08 * Math.sin(animFrame * 0.015));

  drawJulia(curCx, curCy, zoomPulse);

  if (!thumbSaved && animFrame >= 60) {
    try { localStorage.setItem('thumb_16', canvas.toDataURL()); } catch(e) {}
    thumbSaved = true;
  }

  animFrame++;
  requestAnimationFrame(loop);
}

loop();

setTimeout(() => {
  try { localStorage.setItem('thumb_16', canvas.toDataURL()); } catch(e) {}
}, 2000);
</script>
</body>
</html>
