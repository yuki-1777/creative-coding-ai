<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Voronoi</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 800;
canvas.width = W;
canvas.height = H;

const N = 28;
const sites = [];
const vel = [];
const palette = [
  '#0d1b2a','#1b2838','#16213e','#0f3460','#1a1a2e',
  '#162447','#1f4068','#1b262c','#0a3d62','#182747',
  '#2c3e50','#1a3c5e','#0e2744','#243447','#1c3a5a',
  '#0b3d5e','#153552','#0d2137','#1e3a5f','#25435c',
  '#112d42','#1d3557','#0c2340','#14304a','#1f3a51',
  '#0e2c43','#183348','#0f2b40'
];

for (let i = 0; i < N; i++) {
  sites.push({ x: Math.random() * W, y: Math.random() * H, color: palette[i % palette.length] });
  vel.push({ vx: (Math.random() - 0.5) * 1.2, vy: (Math.random() - 0.5) * 1.2 });
}

let mx = W / 2, my = H / 2;
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const sx = W / r.width, sy = H / r.height;
  mx = (e.clientX - r.left) * sx;
  my = (e.clientY - r.top) * sy;
});

const imgData = ctx.createImageData(W, H);
const data = imgData.data;

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}
const rgb = palette.map(hexToRgb);

const EDGE_COLOR = [180, 200, 220];

let frame = 0;

function draw() {
  sites[0].x = mx;
  sites[0].y = my;

  for (let i = 1; i < N; i++) {
    sites[i].x += vel[i].vx;
    sites[i].y += vel[i].vy;
    if (sites[i].x < 0 || sites[i].x > W) vel[i].vx *= -1;
    if (sites[i].y < 0 || sites[i].y > H) vel[i].vy *= -1;
    sites[i].x = Math.max(0, Math.min(W, sites[i].x));
    sites[i].y = Math.max(0, Math.min(H, sites[i].y));
  }

  for (let py = 0; py < H; py++) {
    for (let px = 0; px < W; px++) {
      let minD = Infinity, secondD = Infinity, minIdx = 0;
      for (let i = 0; i < N; i++) {
        const dx = px - sites[i].x, dy = py - sites[i].y;
        const d = dx * dx + dy * dy;
        if (d < minD) { secondD = minD; minD = d; minIdx = i; }
        else if (d < secondD) { secondD = d; }
      }
      const idx = (py * W + px) * 4;
      const edge = Math.sqrt(secondD) - Math.sqrt(minD);
      if (edge < 1.8) {
        const t = edge / 1.8;
        const c = rgb[minIdx % rgb.length];
        data[idx]   = c[0] * t + EDGE_COLOR[0] * (1 - t);
        data[idx+1] = c[1] * t + EDGE_COLOR[1] * (1 - t);
        data[idx+2] = c[2] * t + EDGE_COLOR[2] * (1 - t);
      } else {
        const c = rgb[minIdx % rgb.length];
        const bright = 1 + 0.15 * Math.exp(-minD / 8000);
        data[idx]   = Math.min(255, c[0] * bright);
        data[idx+1] = Math.min(255, c[1] * bright);
        data[idx+2] = Math.min(255, c[2] * bright);
      }
      data[idx+3] = 255;
    }
  }
  ctx.putImageData(imgData, 0, 0);

  for (let i = 0; i < N; i++) {
    const glow = ctx.createRadialGradient(sites[i].x, sites[i].y, 0, sites[i].x, sites[i].y, 8);
    glow.addColorStop(0, 'rgba(200,220,255,0.9)');
    glow.addColorStop(1, 'rgba(200,220,255,0)');
    ctx.beginPath();
    ctx.arc(sites[i].x, sites[i].y, 8, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(sites[i].x, sites[i].y, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = '#c8dcff';
    ctx.fill();
  }

  frame++;
  requestAnimationFrame(draw);
}

draw();

setTimeout(() => {
  try { localStorage.setItem('thumb_12', canvas.toDataURL()); } catch(e) {}
}, 2000);
</script>
</body>
</html>
