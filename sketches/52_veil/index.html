<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>52 — Veil</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #F5F3EE; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0xF5F3EE);
    document.body.appendChild(renderer.domElement);

    // 薄い曲面メッシュ（PlaneGeometry を細かく分割）
    const W = 60;
    const H = 60;
    const geo = new THREE.PlaneGeometry(4, 4, W, H);

    // ワイヤーフレームで表現
    const edges = new THREE.EdgesGeometry(geo);
    const mat = new THREE.LineBasicMaterial({
      color: 0x2A2826,
      transparent: true,
      opacity: 0.35,
    });
    const mesh = new THREE.LineSegments(edges, mat);
    scene.add(mesh);

    // 位置バッファへの参照を保持
    const posAttr = geo.attributes.position;
    const count = posAttr.count;

    // 各頂点の初期XY位置とノイズオフセットを保存
    const baseX = new Float32Array(count);
    const baseY = new Float32Array(count);
    const noiseOffset = new Float32Array(count);
    for (let i = 0; i < count; i++) {
      baseX[i] = posAttr.getX(i);
      baseY[i] = posAttr.getY(i);
      noiseOffset[i] = Math.random() * Math.PI * 2;
    }

    // シンプルな擬似ノイズ（軽量）
    function smoothNoise(x, y, t) {
      return Math.sin(x * 1.5 + t) * Math.cos(y * 1.2 + t * 0.7)
           + Math.sin(x * 0.8 + y * 0.9 + t * 1.3) * 0.5
           + Math.cos(x * 2.1 - y * 1.1 + t * 0.5) * 0.3;
    }

    // マウス
    const mouse = new THREE.Vector2(0, 0);
    window.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
      mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
    });

    // エッジジオメトリの位置バッファ（更新用）
    const edgePos = edges.attributes.position;

    let time = 0;

    function animate() {
      requestAnimationFrame(animate);
      time += 0.007;

      // Planeの頂点を変形
      for (let i = 0; i < count; i++) {
        const x = baseX[i];
        const y = baseY[i];
        const z = smoothNoise(x, y, time) * 0.25;
        posAttr.setZ(i, z);
      }
      posAttr.needsUpdate = true;

      // EdgesGeometryを再計算（PlaneのposAttrから再同期）
      const src = geo.attributes.position;
      const idx = edges.index;
      if (idx) {
        for (let i = 0; i < idx.count; i++) {
          const vi = idx.getX(i);
          edgePos.setXYZ(i, src.getX(vi), src.getY(vi), src.getZ(vi));
        }
        edgePos.needsUpdate = true;
      }

      // ゆるやかな傾き
      mesh.rotation.x = -0.4 + mouse.y * 0.15;
      mesh.rotation.y = mouse.x * 0.2;
      mesh.rotation.z = Math.sin(time * 0.1) * 0.05;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
  <script>
  window.SKETCH_META = {
    num:   '52',
    title: 'Veil',
    desc:  '格子を波打たせたら、薄い布みたいになった。触ると面が傾く。風が当たっているわけではない。'
  };
  </script>
  <script src="../../js/sketch-ui.js"></script>
</body>
</html>
