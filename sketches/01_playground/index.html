<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>p5.js playground</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <style>
    body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
function setup() {
  createCanvas(800, 800);
  background(20);
}

function draw() {
  // ここに書く
  fill(255, 100, 50);
  noStroke();
  ellipse(mouseX, mouseY, 20, 20);

  // 60フレーム後にサムネイルをギャラリーへ保存
  if (frameCount === 60) {
    try {
      localStorage.setItem('thumb_01', document.querySelector('canvas').toDataURL());
    } catch(e) {}
  }
}
</script>
<script>
window.SKETCH_META = {
  num:   '01',
  title: 'Playground',
  desc:  'p5.jsの実験場として作った最初のスケッチ。マウスカーソルの動きに追従する円を描くだけのシンプルな構成だが、以降の全スケッチの土台となるセットアップパターンを確立した場所でもある。'
};
</script>
<script src="../../js/sketch-ui.js"></script>
</body>
</html>
