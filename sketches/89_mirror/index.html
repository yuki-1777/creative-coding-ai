<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 7);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0xF5F3EE);
    document.body.appendChild(renderer.domElement);

    // 中心軸（鏡の線）
    const axisGeo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, -3, 0),
      new THREE.Vector3(0, 3, 0),
    ]);
    const axisMat = new THREE.LineBasicMaterial({ color: 0x8A7055, transparent: true, opacity: 0.4 });
    scene.add(new THREE.Line(axisGeo, axisMat));

    // オリジナルと鏡像のセット
    function createFigure(color, opacity) {
      const group = new THREE.Group();
      const curves = [];

      // 複数の弧からなる形
      const numArcs = 8;
      for (let a = 0; a < numArcs; a++) {
        const pts = [];
        const startY = -1.5 + (a / numArcs) * 3;
        const endY = startY + (3 / numArcs) * 0.9;
        const segCount = 30;
        for (let s = 0; s <= segCount; s++) {
          const t = s / segCount;
          const y = startY + (endY - startY) * t;
          const x = Math.sin(t * Math.PI) * (0.5 + a * 0.18);
          pts.push(new THREE.Vector3(x, y, 0));
        }
        const geo = new THREE.BufferGeometry().setFromPoints(pts);
        const mat = new THREE.LineBasicMaterial({
          color,
          transparent: true,
          opacity: opacity * (0.6 + (a / numArcs) * 0.4),
        });
        const line = new THREE.Line(geo, mat);
        group.add(line);
        curves.push({ line, geo, pts, numArcs, a, startY, endY });
      }

      scene.add(group);
      return { group, curves };
    }

    const original = createFigure(0x2A2826, 0.5);
    const mirror   = createFigure(0x2A2826, 0.3);

    // オリジナルは左寄り
    original.group.position.x = -0.8;
    // 鏡像は右寄り（X軸反転）
    mirror.group.position.x = 0.8;
    mirror.group.scale.x = -1;

    // マウス
    const mouse = new THREE.Vector2(0, 0);
    window.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
      mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
    });

    let time = 0;

    function updateCurves(fig, drift) {
      fig.curves.forEach((c) => {
        const posAttr = c.geo.attributes.position;
        const segCount = 30;
        for (let s = 0; s <= segCount; s++) {
          const t = s / segCount;
          const y = c.startY + (c.endY - c.startY) * t;
          // ドリフト: 鏡像は少しずれる
          const driftAmt = drift * Math.sin(time * 0.3 + c.a * 0.7) * c.a * 0.12;
          const x = Math.sin(t * Math.PI) * (0.5 + c.a * 0.18) + driftAmt;
          posAttr.setXYZ(s, x, y, 0);
        }
        posAttr.needsUpdate = true;
      });
    }

    function animate() {
      requestAnimationFrame(animate);
      time += 0.005;

      updateCurves(original, 0);
      updateCurves(mirror, 1);   // 鏡像はドリフトあり

      // 鏡像がだんだんずれていく（でも完全にはばらけない）
      mirror.group.rotation.z = Math.sin(time * 0.1) * 0.08;

      scene.rotation.y = mouse.x * 0.15;
      scene.rotation.x = mouse.y * 0.1;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>

  window.SKETCH_META = {

    desc:  '左右対称のはずが、時間が経つとずれてくる。鏡が正直すぎると困る。'
  };
  </script>

</body>
