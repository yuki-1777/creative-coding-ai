<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
const GRAVITY = 0.12;
const DAMPING = 0.52;
const FRICTION = 0.86;

let particles = [];
let autoTimer = 0;
const AUTO_INTERVAL = 60;

class Particle {
  constructor(x, y) {
    const angle = random(TWO_PI);
    const speed = random(2, 8);
    this.x = x;
    this.y = y;
    this.vx = cos(angle) * speed;
    this.vy = sin(angle) * speed - 2;
    this.r = random(1.5, 4);
    this.alpha = random(0.4, 0.85);
    this.settled = false;
    this.bounces = 0;
    this.maxBounces = floor(random(1, 5));
  }

  update() {
    if (this.settled) return;

    this.vy += GRAVITY;
    this.x += this.vx;
    this.y += this.vy;

    const ground = height - this.r;
    if (this.y >= ground) {
      this.y = ground;
      this.vy *= -DAMPING;
      this.vx *= FRICTION;
      this.bounces++;
      if (this.bounces >= this.maxBounces || abs(this.vy) < 0.3) {
        this.vy = 0;
        this.vx *= 0.5;
        if (abs(this.vx) < 0.1) {
          this.settled = true;
        }
      }
    }

    if (this.x < this.r) { this.x = this.r; this.vx *= -0.6; }
    if (this.x > width - this.r) { this.x = width - this.r; this.vx *= -0.6; }
  }

  draw() {
    noStroke();
    fill(42, 42, 42, this.alpha * 255);
    ellipse(this.x, this.y, this.r * 2);
  }
}

function scatter(x, y, count) {
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y));
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  // Auto demo bursts
  setTimeout(() => scatter(width * 0.3, height * 0.25, 35), 1000);
  setTimeout(() => scatter(width * 0.7, height * 0.35, 30), 1500);
  setTimeout(() => scatter(width * 0.5, height * 0.20, 40), 2000);
  setTimeout(() => scatter(width * 0.2, height * 0.40, 25), 2500);
  setTimeout(() => scatter(width * 0.8, height * 0.30, 30), 3000);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

function draw() {
  background('#F5F3EE');

  // Ground line
  stroke(42, 42, 42, 20);
  strokeWeight(1);
  line(0, height - 1, width, height - 1);

  for (const p of particles) {
    p.update();
    p.draw();
  }

  if (particles.length === 0) {
    noStroke();
    fill(42, 42, 42, 46);
    textFont('monospace');
    textSize(13);
    textAlign(CENTER, CENTER);
    text('click', width / 2, height / 2);
  }
}

function mousePressed() {
  scatter(mouseX, mouseY, floor(random(30, 50)));
}

function touchStarted() {
  scatter(touches[0].x, touches[0].y, floor(random(30, 50)));
  return false;
}
</script>
