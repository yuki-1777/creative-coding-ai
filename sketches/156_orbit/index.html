<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Orbit: multiple small spheres orbit around invisible centers at different radii and speeds.
// Their trails are drawn as fading line segments.
// Mouse drag rotates the camera.

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0xF5F3EE);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 12);

// Orbiters config
const ORBITERS = [
  { radius: 1.0, speed: 0.008, phase: 0,           tilt: 0.0,  color: 0x2a2a2a },
  { radius: 1.6, speed: 0.005, phase: Math.PI/3,   tilt: 0.6,  color: 0x4a4a4a },
  { radius: 2.2, speed: 0.0035,phase: Math.PI*2/3, tilt: 1.1,  color: 0x2a2a2a },
  { radius: 2.9, speed: 0.0022,phase: Math.PI,     tilt: -0.5, color: 0x5a5a5a },
  { radius: 3.5, speed: 0.0015,phase: Math.PI*4/3, tilt: 1.7,  color: 0x3a3a3a },
];

const TRAIL_LEN = 300;

// Create sphere geometry for each orbiter
const sphereGeo = new THREE.SphereGeometry(0.04, 8, 8);

const orbiters = ORBITERS.map((cfg, idx) => {
  const mat = new THREE.MeshBasicMaterial({ color: cfg.color });
  const mesh = new THREE.Mesh(sphereGeo, mat);
  scene.add(mesh);

  // Trail: LineSegments with fading alpha via vertex colors
  const trailPositions = new Float32Array(TRAIL_LEN * 3);
  const trailGeo = new THREE.BufferGeometry();
  trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
  trailGeo.setDrawRange(0, 0);

  const trailMat = new THREE.LineBasicMaterial({ color: cfg.color, transparent: true, opacity: 0.35 });
  const trail = new THREE.Line(trailGeo, trailMat);
  scene.add(trail);

  return {
    ...cfg,
    mesh,
    trail,
    trailPositions,
    history: [],
    angle: cfg.phase,
  };
});

// Camera rotation via mouse drag
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let rotX = 0.4, rotY = 0.3;
let autoRotY = 0;

renderer.domElement.addEventListener('mousedown', (e) => {
  isDragging = true;
  prevMouse = { x: e.clientX, y: e.clientY };
});
renderer.domElement.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  rotY += dx * 0.005;
  rotX += dy * 0.005;
  prevMouse = { x: e.clientX, y: e.clientY };
});
renderer.domElement.addEventListener('mouseup', () => { isDragging = false; });
renderer.domElement.addEventListener('mouseleave', () => { isDragging = false; });

renderer.domElement.addEventListener('touchstart', (e) => {
  isDragging = true;
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
renderer.domElement.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  const dx = e.touches[0].clientX - prevMouse.x;
  const dy = e.touches[0].clientY - prevMouse.y;
  rotY += dx * 0.005;
  rotX += dy * 0.005;
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
renderer.domElement.addEventListener('touchend', () => { isDragging = false; }, { passive: true });

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Orbit group rotated by mouse
const group = new THREE.Group();
scene.add(group);
orbiters.forEach(o => { group.add(o.mesh); group.add(o.trail); });

// Pre-simulate to fill trails before first render
function preSim(steps) {
  for (let s = 0; s < steps; s++) {
    orbiters.forEach(o => {
      o.angle += o.speed;
      const x = Math.cos(o.angle) * o.radius;
      const y = Math.sin(o.angle * 0.7 + o.tilt) * o.radius * 0.3;
      const z = Math.sin(o.angle) * o.radius;
      o.history.push({ x, y, z });
      if (o.history.length > TRAIL_LEN) o.history.shift();
    });
  }
}
preSim(TRAIL_LEN);

function animate() {
  requestAnimationFrame(animate);

  if (!isDragging) autoRotY += 0.002;
  group.rotation.y = rotY + autoRotY;
  group.rotation.x = rotX;

  orbiters.forEach(o => {
    o.angle += o.speed;
    const x = Math.cos(o.angle) * o.radius;
    const y = Math.sin(o.angle * 0.7 + o.tilt) * o.radius * 0.3;
    const z = Math.sin(o.angle) * o.radius;

    o.mesh.position.set(x, y, z);

    // Update trail
    o.history.push({ x, y, z });
    if (o.history.length > TRAIL_LEN) o.history.shift();

    const pos = o.trailPositions;
    const n = o.history.length;
    for (let i = 0; i < n; i++) {
      pos[i * 3]     = o.history[i].x;
      pos[i * 3 + 1] = o.history[i].y;
      pos[i * 3 + 2] = o.history[i].z;
    }
    o.trail.geometry.attributes.position.needsUpdate = true;
    o.trail.geometry.setDrawRange(0, n);
    // Fade older trail
    o.trail.material.opacity = 0.2 + 0.2 * Math.min(n / TRAIL_LEN, 1);
  });

  renderer.render(scene, camera);
}

animate();
</script>

window.SKETCH_META = {

  detail: '5つの点がそれぞれ異なる軌道を回っている。傾き・速さ・大きさがすべて違う。マウスドラッグで視点を変えると、軌跡が3D空間に広がっているのがわかる。'
};
</script>

</body>
