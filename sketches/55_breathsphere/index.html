<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0xF5F3EE);
    document.body.appendChild(renderer.domElement);

    // 複数の球殻（ワイヤーフレーム）
    const NUM_SPHERES = 6;
    const spheres = [];

    for (let i = 0; i < NUM_SPHERES; i++) {
      const r = 0.4 + i * 0.32;
      const segments = 7 + i * 2;
      const geo = new THREE.SphereGeometry(r, segments, Math.floor(segments * 0.6));
      const edges = new THREE.EdgesGeometry(geo);
      const isAccent = i === 2; // 内から3番目だけアクセント
      const mat = new THREE.LineBasicMaterial({
        color: isAccent ? 0x8A7060 : 0x2A2826,
        transparent: true,
        opacity: 0.35 - i * 0.04, // 内側ほど濃く
      });
      const sphere = new THREE.LineSegments(edges, mat);
      scene.add(sphere);
      spheres.push({
        mesh: sphere,
        baseRadius: r,
        // 内側ほど位相が進んでいる → 波が内から外へ伝わる
        phaseOffset: (i / NUM_SPHERES) * Math.PI * 2,
        rotSpeed: 0.005 - i * 0.0005, // 内側ほど速く回る
      });
    }

    // マウス
    const mouse = new THREE.Vector2(0, 0);
    window.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
      mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
    });

    let time = 0;

    function animate() {
      requestAnimationFrame(animate);
      time += 0.008;

      spheres.forEach((s, i) => {
        // 呼吸（内側から波が外へ伝わる感じ。振幅も大きく）
        const breathe = Math.sin(time * 0.8 + s.phaseOffset) * 0.12;
        const scale = 1 + breathe;
        s.mesh.scale.setScalar(scale);

        // ゆっくり自転（内側ほど速い）
        s.mesh.rotation.y += s.rotSpeed * (1 + mouse.x * 0.5);
        s.mesh.rotation.x += s.rotSpeed * 0.6 * (1 + mouse.y * 0.4);
      });

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
  <script>
  window.SKETCH_META = {
    num:   '55',
    title: 'Breath Sphere',
    desc:  '6層の球殻が、内側から順番に膨らむ。波が核から外へ伝わっていく。',
    detail: '6つの球の殻（ワイヤーフレーム）が入れ子になっており、内側から順に少し遅れて膨らんでは縮む動きを繰り返す。呼吸のような波が中心から外へ伝わっていく。内側の層ほど速く自転し、外側は遅い。マウスを動かすと全体の傾きが変わる。'
  };
  </script>
