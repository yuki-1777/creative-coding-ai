<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>55 — Breath Sphere</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #F5F3EE; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0xF5F3EE);
    document.body.appendChild(renderer.domElement);

    // 複数の球殻（ワイヤーフレーム）
    const NUM_SPHERES = 5;
    const spheres = [];

    for (let i = 0; i < NUM_SPHERES; i++) {
      const r = 0.5 + i * 0.35;
      const segments = 8 + i * 2;
      const geo = new THREE.SphereGeometry(r, segments, Math.floor(segments * 0.6));
      const edges = new THREE.EdgesGeometry(geo);
      const isAccent = i === 2; // 中間の球だけアクセント
      const mat = new THREE.LineBasicMaterial({
        color: isAccent ? 0x8A7060 : 0x2A2826,
        transparent: true,
        opacity: 0.15 + (NUM_SPHERES - i) * 0.07,
      });
      const sphere = new THREE.LineSegments(edges, mat);
      scene.add(sphere);
      spheres.push({
        mesh: sphere,
        baseRadius: r,
        phaseOffset: (i / NUM_SPHERES) * Math.PI * 2,
        rotSpeed: 0.003 + i * 0.002,
      });
    }

    // マウス
    const mouse = new THREE.Vector2(0, 0);
    window.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
      mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
    });

    let time = 0;

    function animate() {
      requestAnimationFrame(animate);
      time += 0.008;

      spheres.forEach((s, i) => {
        // 呼吸（位相をずらして膨縮）
        const breathe = Math.sin(time * 0.6 + s.phaseOffset) * 0.06;
        const scale = 1 + breathe;
        s.mesh.scale.setScalar(scale);

        // ゆっくり自転（各層で速さが違う）
        s.mesh.rotation.y += s.rotSpeed * (1 + mouse.x * 0.3);
        s.mesh.rotation.x += s.rotSpeed * 0.5 * (1 + mouse.y * 0.3);
      });

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
  <script>
  window.SKETCH_META = {
    num:   '55',
    title: 'Breath Sphere',
    desc:  '5層の球が、少しずつ位相をずらして膨縮している。中心から外へ、波が伝わっているみたいだった。'
  };
  </script>
  <script src="../../js/sketch-ui.js"></script>
</body>
</html>
