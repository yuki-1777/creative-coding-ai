<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Reaction Diffusion</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 400, H = 400;
canvas.width = W;
canvas.height = H;
canvas.style.width = '800px';
canvas.style.height = '800px';
canvas.style.imageRendering = 'pixelated';

const DA = 1.0, DB = 0.5;
const F = 0.055, K = 0.062;

let curr = new Float32Array(W * H * 2);
let next = new Float32Array(W * H * 2);

function idx(x, y) {
  x = (x + W) % W;
  y = (y + H) % H;
  return (y * W + x) * 2;
}

for (let i = 0; i < W * H; i++) {
  curr[i * 2]     = 1.0;
  curr[i * 2 + 1] = 0.0;
}

function seed(cx, cy, r) {
  for (let dy = -r; dy <= r; dy++) {
    for (let dx = -r; dx <= r; dx++) {
      if (dx*dx + dy*dy <= r*r) {
        const i = idx(cx+dx, cy+dy);
        curr[i]   = 0.5 + (Math.random() - 0.5) * 0.1;
        curr[i+1] = 0.25 + (Math.random() - 0.5) * 0.1;
      }
    }
  }
}

seed(W/2, H/2, 12);
seed(W/4, H/4, 8);
seed(3*W/4, H/4, 8);
seed(W/4, 3*H/4, 8);
seed(3*W/4, 3*H/4, 8);
seed(W/2, H/4, 6);
seed(W/2, 3*H/4, 6);
seed(W/4, H/2, 6);
seed(3*W/4, H/2, 6);

const imgData = ctx.createImageData(W, H);
const pixels = imgData.data;

function step(n) {
  for (let s = 0; s < n; s++) {
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const c = idx(x, y);
        const a = curr[c], b = curr[c+1];

        const lapA =
          curr[idx(x-1,y)] + curr[idx(x+1,y)] +
          curr[idx(x,y-1)] + curr[idx(x,y+1)] +
          0.05*(curr[idx(x-1,y-1)] + curr[idx(x+1,y-1)] + curr[idx(x-1,y+1)] + curr[idx(x+1,y+1)]) -
          4.2 * a;

        const lapB =
          curr[idx(x-1,y)+1] + curr[idx(x+1,y)+1] +
          curr[idx(x,y-1)+1] + curr[idx(x,y+1)+1] +
          0.05*(curr[idx(x-1,y-1)+1] + curr[idx(x+1,y-1)+1] + curr[idx(x-1,y+1)+1] + curr[idx(x+1,y+1)+1]) -
          4.2 * b;

        const ab2 = a * b * b;
        next[c]   = Math.max(0, Math.min(1, a + DA * lapA - ab2 + F * (1 - a)));
        next[c+1] = Math.max(0, Math.min(1, b + DB * lapB + ab2 - (K + F) * b));
      }
    }
    const tmp = curr; curr = next; next = tmp;
  }
}

function colorize(t) {
  t = Math.max(0, Math.min(1, t));
  const r = Math.pow(t, 0.5);
  const stops = [
    [0.02, 0.05, 0.15],
    [0.05, 0.12, 0.35],
    [0.08, 0.30, 0.55],
    [0.15, 0.55, 0.70],
    [0.60, 0.85, 0.70],
    [0.95, 0.95, 0.80],
  ];
  const pos = t * (stops.length - 1);
  const i = Math.min(Math.floor(pos), stops.length - 2);
  const f = pos - i;
  return [
    (stops[i][0] + f * (stops[i+1][0] - stops[i][0])) * 255,
    (stops[i][1] + f * (stops[i+1][1] - stops[i][1])) * 255,
    (stops[i][2] + f * (stops[i+1][2] - stops[i][2])) * 255,
  ];
}

function render() {
  for (let i = 0; i < W * H; i++) {
    const a = curr[i*2], b = curr[i*2+1];
    const t = 1.0 - Math.max(0, Math.min(1, a - b));
    const [r, g, bl] = colorize(t);
    pixels[i*4]   = r;
    pixels[i*4+1] = g;
    pixels[i*4+2] = bl;
    pixels[i*4+3] = 255;
  }
  ctx.putImageData(imgData, 0, 0);
}

let frameCount = 0;

function loop() {
  step(8);
  render();
  frameCount++;
  requestAnimationFrame(loop);
}

loop();

setTimeout(() => {
  try { localStorage.setItem('thumb_14', canvas.toDataURL()); } catch(e) {}
}, 3000);
</script>
</body>
</html>
